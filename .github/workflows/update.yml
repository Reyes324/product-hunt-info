name: Update PH Leaderboard

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: update-ph
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate index.html (retry on transient failure)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          for i in 1 2 3; do
            if node fetch_ph.mjs; then
              exit 0
            fi
            echo "第 $i 次失败，15 秒后重试..."
            sleep 15
          done
          echo "三次都失败，保留上一次成功的 index.html，不覆盖"
          exit 1

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: 自动更新 PH 榜单 $(date -u +%Y-%m-%d)"
          git push
