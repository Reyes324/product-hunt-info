<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月20日</span>
        <span class="updated">更新于 10:28</span>

    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-21","updatedAt":"10:28","yesterday":[{"rank":1,"name":"Fuzzy AI","zhName":"Fuzzy AI","url":"https://producthunt.com/products/fuzzy-ai-2","desc":"We warm your prospects before reaching out","zhDesc":"We warm your prospects before reaching out","tags":[],"upvotes":82,"icon":"https://ph-files.imgix.net/2ee5bc35-54be-4e1c-ac23-b791bb72f837.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Cold outreach gets ignored because prospects do not know you yet. Fuzzy warms them before you ever reach out by finding people already engaging in your market, helping you stay visible through content and thoughtful comments, then launching personalised LinkedIn and email campaigns in your voice. Research, enrichment, sequences, replies and team workflows live in one place. Customers call it intuitive, seamless and more comprehensive than the tools they used before.","zhDetail":"Fuzzy AI 是一款面向销售和营销团队的外联预热工具，帮助你在正式联系潜在客户之前，通过识别市场中已有活跃行为的人群，提前建立认知。它通过内容互动、有洞察的评论以及个性化LinkedIn和邮件序列，以你的风格持续保持可见度，并将调研、数据丰富、跟进序列、回复管理和团队协作整合在一个平台中。用户评价它比以往使用的工具更直观、无缝且全面。"},{"rank":2,"name":"Nautis","zhName":"Nautis","url":"https://producthunt.com/products/nautis","desc":"The AI-native Operating System for founders.","zhDesc":"The AI-native Operating System for founders.","tags":[],"upvotes":92,"icon":"https://ph-files.imgix.net/53e039da-64e9-4358-92e5-bbdd3b71035f.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Nautis is the AI-native Operating System for founders. Manage fundraising, planning, finance, documents, meetings, CRM, hiring, and daily operations from one connected workspace. Unlike disconnected SaaS tools, every module shares one AI brain, giving you context-aware automation, smarter insights, and a Chief of Staff that understands your business—not just one app. Spend less time managing tools and more time building.","zhDetail":"Nautis 是为创业者打造的 AI 原生操作系统，将融资、规划、财务、文档、会议、客户管理、招聘及日常运营整合在一个互联工作空间中。与零散的 SaaS 工具不同，其所有模块共享同一个 AI 大脑，提供上下文感知的自动化与更智能的洞察，相当于一个真正理解你业务的“AI 参谋长”，让你少花时间管理工具，多花时间打造产品。"},{"rank":3,"name":"Loova Ads Studio","zhName":"Loova Ads Studio","url":"https://producthunt.com/products/loova-agents","desc":"Create AI ads that convert, not just look good","zhDesc":"Create AI ads that convert, not just look good","tags":[],"upvotes":67,"icon":"https://ph-files.imgix.net/058eaf05-8041-4782-a657-e567a7da18e8.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Congrats on the launch. The ability to produce more creative variations without adding a lot of cost is useful, especially for smaller ecommerce teams that cannot keep feeding an agency brief every week. I’d be curious about how Loova handles brand consistency. Can it learn a company’s visual style, tone and creative rules, or does each ad still need a fair amount of manual cleanup? Also, when you clone a winning format, how do you stop the output from feeling too similar to everything else already running in the market?","zhDetail":"Loova Ads Studio 专为小型电商团队设计，帮助他们在不增加大量成本的前提下快速生成多种广告创意变体。通过克隆成功广告格式并学习品牌的视觉风格、语调与创意规则，Loova 能保持品牌一致性，同时避免输出内容与市场上已有广告过于雷同。"},{"rank":4,"name":"Replay QA","zhName":"Replay QA","url":"https://producthunt.com/products/replayio","desc":"Replay QA tells you what is broken before your users do","zhDesc":"Replay QA tells you what is broken before your users do","tags":[],"upvotes":91,"icon":"https://ph-files.imgix.net/d8f4eeb7-b351-4cd4-8a98-0e68afe73b96.gif?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","detail":"Add your GitHub repo for continuous testing, or drop in a URL for a one-time check. Replay QA explores your app, records every session, finds real bugs, and gives your coding agent the root cause and fix. Try for free: qa.replay.io","zhDetail":"Replay QA 是一款面向开发者和测试团队的自动化质量检测工具。你只需接入 GitHub 仓库即可实现持续测试，或输入一个 URL 进行一次性检查；它能自动探索你的应用、记录每一次会话、发现真实 bug，并直接为你的编码助手提供根因分析和修复建议。"},{"rank":5,"name":"Skippr AI","zhName":"Skippr AI","url":"https://producthunt.com/products/skippr-3","desc":"The live AI employee inside your product, serving every user","zhDesc":"The live AI employee inside your product, serving every user","tags":[],"upvotes":53,"icon":"https://ph-files.imgix.net/0614f939-eaa1-4fdc-8a4a-6b56e3aeebbb.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Real-time agents that see, talk, and operate software. They onboard, activate, and unblock your users. On their own. Skippr agents keep agenda and memory across full sessions, speak 10 languages, and act on screen with built-in browser automation. Fully self-serve: spin up an agent in minutes, embed with 2 lines of code, or share a meeting link. Trained on your knowledge, styled to your brand. 200 free credits to start, no card required. Talk to me for the deeper enterprise version.","zhDetail":"Skippr AI 是为软件产品团队打造的实时智能代理，能够自主帮助用户完成上手引导、功能激活和问题解决。它通过“看到”屏幕、对话交互和内置浏览器自动化来操作软件，支持10种语言，并能在整个会话中保持任务记忆。用户只需两行代码即可嵌入，或分享会议链接快速启用，无需信用卡即可获得200次免费试用额度。"},{"rank":6,"name":"Inkling","zhName":"Inkling","url":"https://producthunt.com/products/tinker-2","desc":"Open weights 975B multimodal model built for fine-tuning","zhDesc":"Open weights 975B multimodal model built for fine-tuning","tags":[],"upvotes":11,"icon":"https://ph-files.imgix.net/641f1365-3f13-46e0-97d2-f13d75a72b5f.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Inkling is Thinking Machines’ first open-weights model, a 975B MoE with 41B active parameters, 1M context, native reasoning across text, images, and audio, and controllable thinking effort. Fine-tune it on Tinker or download the Apache 2.0 weights.","zhDetail":"Inkling 是 Thinking Machines 推出的首个开放权重模型，专为需要处理多模态数据（文本、图像、音频）并具备深度推理能力的开发者和研究者设计。它拥有 975B 参数（41B 活跃参数）和 100 万上下文窗口，支持可控思考深度，用户可通过 Tinker 平台微调或直接下载 Apache 2.0 许可的权重，从而高效解决复杂跨模态理解与推理任务。"},{"rank":7,"name":"Creed","zhName":"Creed","url":"https://producthunt.com/products/creed-2","desc":"Your personal context file for every agent.","zhDesc":"Your personal context file for every agent.","tags":[],"upvotes":25,"icon":"https://ph-files.imgix.net/528bd105-5ed5-45fe-bc6c-3d313d86b1e7.vnd.microsoft.icon?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Connor, the thing I re-explain most isn't who I am — it's my domain. I do research-heavy work, and every new agent has to be re-taught my field's vocabulary, which sources I actually trust, and the shorthand I use, before it's useful. So the tool I'd most want plugged in first is my knowledge base (Obsidian / Zotero / NotebookLM), because that's where the real \"how I think\" lives, not my chat history. One design question: do you separate stable identity context (role, preferences) from fast-moving project context? The first I set once; the second changes weekly, and I'd worry a single flat file quietly blurs the two together.","zhDetail":"Creed 是一款面向重度研究型用户的智能知识管理工具，解决的是每次切换 AI 代理时都要重新教它你的专业词汇、信任源和思维习惯的痛点。它通过将你的个人知识库（如 Obsidian、Zotero、NotebookLM）直接接入 AI 工作流，并区分稳定的身份上下文与快速变化的项目上下文，让 AI 真正理解“你如何思考”，而非仅仅依赖聊天记录。"},{"rank":8,"name":"LayerProof Mylar","zhName":"LayerProof Mylar","url":"https://producthunt.com/products/layerproof-social-content-generation","desc":"Create launch-ready motion videos for your products","zhDesc":"Create launch-ready motion videos for your products","tags":[],"upvotes":36,"icon":"https://ph-files.imgix.net/245d17d1-e4c9-43d7-a717-24ae154481d1.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"LayerProof Motion's AI agent turns a product page, doc, or prompt into a full motion video - script, scenes, and voiceover included. Regenerate any scene, refine every keyframe, and export for multiple channels. Launch-ready product video in minutes.","zhDetail":"LayerProof Mylar 是一款面向营销人员、产品经理和内容创作者的AI视频生成工具，能将产品页面、文档或简单提示快速转化为完整的动态视频。它自动生成脚本、场景和配音，用户可逐帧精修并导出适配多平台的成品，几分钟内即可获得可发布的宣传视频。"},{"rank":9,"name":"Backdrop","zhName":"Backdrop","url":"https://producthunt.com/products/backdrop","desc":"AI Coworkers that run your projects and operations","zhDesc":"AI Coworkers that run your projects and operations","tags":[],"upvotes":48,"icon":"https://ph-files.imgix.net/d3a50aaf-6578-4428-a13b-7be10a05e680.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"AI made execution faster. The bottleneck has shifted to deciding what to build while the knowledge behind those decisions is scattered across people, tools, and AI chats. Backdrop provides AI coworkers for projects and operations that understand your company, work with your team,and build shared company context. Across Slack, GitHub, Linear, Notion, Asana, Google Workspace and more, they synthesize customer feedback, create plans and specs, manage tickets, draft documents, and keep work moving.","zhDetail":"Backdrop 为项目和运营提供了解你公司、能与团队协作并构建共享企业背景的 AI 同事。它整合 Slack、GitHub、Linear、Notion、Asana、Google Workspace 等工具，自动合成客户反馈、制定计划与规格、管理任务、起草文档，帮助团队将决策瓶颈转化为高效执行。"},{"rank":10,"name":"Scriptyard","zhName":"Scriptyard","url":"https://producthunt.com/products/scriptyard","desc":"A free visual story development workspace","zhDesc":"A free visual story development workspace","tags":[],"upvotes":35,"icon":"https://ph-files.imgix.net/d398d6cf-ad49-4234-8826-bc7bf9392f84.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Scriptyard is a spatial story-planning tool built for screenwriters and storytellers. Map characters, locations, scenes and structure on an infinite canvas, then export to Markdown, Fountain, or Final Draft.","zhDetail":"Scriptyard 是一款专为编剧和故事创作者打造的空间化故事规划工具。它通过无限画布让用户直观地映射角色、地点、场景与故事结构，并支持导出为 Markdown、Fountain 或 Final Draft 格式，帮助创作者更高效地梳理复杂叙事。"},{"rank":11,"name":"Kogvio","zhName":"Kogvio","url":"https://producthunt.com/products/kogvio","desc":"Understand anything online without leaving the page.","zhDesc":"Understand anything online without leaving the page.","tags":[],"upvotes" r ultrawide or high-res screen on Mac","zhDesc":"Share a portion of your ultrawide or high-res screen on Mac","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/55e1d0e7-9254-4a0a-bf6c-b23b85458698.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"I built RegionMirror out of the need to find a solution to share my 49\" Ultrawide screen with colleagues using Teams, Slack, and other meeting platforms. Sharing the entire screen with someone not rocking a monster-sized screen on the receiving end of the screen share makes the content very small and unreadable. Prior to RegionMirror, sharing just a single window was how I worked around it, but that became annoying and disruptive to my flow when having to switch back and forth between applications.","zhDetail":"RegionMirror 专为使用超宽屏显示器的用户设计，解决了在 Teams、Slack 等会议平台共享屏幕时，对方因屏幕较小而看不清内容的问题。它允许用户仅共享屏幕的特定区域，而非整个屏幕或单个窗口，从而避免频繁切换应用带来的干扰，让协作更流畅高效。"},{"rank":4,"name":"tterm","zhName":"tterm","url":"https://www.producthunt.com/products/tterm","desc":"A terminal, a real browser, and Claude Code under one roof","zhDesc":"A terminal, a real browser, and Claude Code under one roof","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/b113e096-48fc-4d08-9147-f72a6d6651e2.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"tterm is a macOS cockpit for working with Claude Code. Every project is a row of explorer, Claude, and file viewer. Stack as many as you're juggling. A real Chromium browser lives inside, and there's no editor on purpose: you review diffs hunk by hunk and commit. It even rebuilds itself. Ask the Claude pane for a feature and the running app hot-reloads with it. No account, no telemetry. Free for hobbyists, on Apple silicon.","zhDetail":"tterm 是一款专为 macOS 打造的 Claude Code 操作台，面向使用 Claude 进行代码开发的开发者。它将每个项目以“资源管理器 + Claude 对话面板 + 文件查看器”的行式布局呈现，支持同时管理多个项目；内置真实 Chromium 浏览器，并刻意不集成编辑器，让用户逐块审查差异并提交。你甚至可以直接在 Claude 面板中请求新功能，正在运行的应用便会热加载实现，无需注册、无遥测，对个人爱好者免费，支持 Apple Silicon。"},{"rank":5,"name":"ArachStudio","zhName":"ArachStudio","url":"https://www.producthunt.com/products/arachstudio","desc":"Live-edit your GitHub components directly in the browser","zhDesc":"Live-edit your GitHub components directly in the browser","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/e9dfde51-738b-4d18-87a6-ece961b648b8.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Hi Product Hunt! 👋 ArachStudio helps designers & developers live-edit codebases & components online. How it works: Connect GitHub via access token. Scan & load your project path. Make real-time style edits in the visual preview (desktop/mobile). Export the final product! Help us decide: We are testing two different demo versions. Try both links and tell us which experience you prefer in the comments!","zhDetail":"ArachStudio 是一款面向设计师和开发者的在线代码实时编辑工具。它通过 GitHub 访问令牌连接项目，扫描并加载代码路径，让用户在可视化预览中（支持桌面端和移动端）实时调整样式，最终导出成品，从而解决团队协作中代码与设计脱节、调试效率低的问题。"},{"rank":6,"name":"Routebase","zhName":"Routebase","url":"https://www.producthunt.com/products/routebase","desc":"Catch API drift before your customers do","zhDesc":"Catch API drift before your customers do","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/4c2886c2-edee-42b3-864c-d7f96f2053da.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The unannounced direction is handled by Monitoring, not the spec pipeline. You bind a monitor to an endpoint and set schema validation to Warn or Strict. It then hits the live URL on an interval (as tight as every 30s), validates the _actual_ response body against that endpoint's response schema, and raises a Schema Drift alert when the shape diverges — no publish, nobody touching the spec. The deploy that quietly reshapes a 200 is precisely what it's there to catch.","zhDetail":"Routebase 是一款面向后端开发者和 API 团队的实时监控工具，用于自动检测生产环境中 API 响应结构的意外变化。它通过将监控绑定到指定端点、设置模式验证级别（警告或严格），并定期（最短每30秒）访问真实 URL 来比对实际响应与预期模式，一旦发现结构偏离即触发“模式漂移”告警，无需发布或手动修改规范即可捕捉静默破坏性变更。"},{"rank":7,"name":"Wispr Flow: Dictation That Works Everywhere","zhName":"Wispr Flow: 随处可用的语音输入工具","url":"https://www.producthunt.com/products/wisprflow","desc":"Stop typing. Start speaking. 4x faster.","zhDesc":"Stop typing. Start speaking. 4x faster.","tags":[],"upvotes":null,"icon":null,"detail":"Wispr Flow turns your voice into perfectly formatted text across every app on your device. Speak naturally and Flow handles the rest: real-time auto-edits, tone matching, and context-aware formatting so you never rewrite a single word. Works in 100+ languages including mixed-language dictation like Hinglish. Available on Mac, Windows, iPhone, and Android. One intelligent voice system, every device. Write 4x faster by just talking.","zhDetail":"Wispr Flow 是一款跨设备智能语音输入工具，专为需要高效写作的用户设计。它能将你的语音实时转化为格式完美的文字，并自动进行编辑、匹配语气和调整上下文格式，支持超过100种语言（包括印地语-英语混合输入），让你在Mac、Windows、iPhone和Android设备上都能通过说话实现4倍速写作，彻底告别手动修改。"},{"rank":8,"name":"Skim","zhName":"Skim","url":"https://www.producthunt.com/products/skim-5","desc":"Free, open-source AI email client for Windows","zhDesc":"Free, open-source AI email client for Windows","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/4ee1f586-405d-4141-ad23-b30bb0c5251c.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"> 1.   **Gmail uses the installed-app flow (loopback + PKCE), where the \"client secret\" isn't actually a secret.**Google's own docs say the client secret for installed apps \"is obviously not treated as a secret\" — a distributed desktop app can't keep one confidential, so security comes from PKCE (S256) and the 127.0.0.1 loopback redirect, not from a secret. There's no server in the middle; the token exchange goes straight from your machine to Google.","zhDetail":"Skim 是一款面向 Gmail 用户的邮件摘要工具，帮助您快速从冗长邮件中提取关键信息，无需逐字阅读。它通过本地 OAuth 流程直接连接您的 Gmail 账户，利用 PKCE 安全协议在您自己的设备上完成邮件内容分析，既保护隐私又提升效率。"},{"rank":9,"name":"BUD","zhName":"BUD","url":"https://www.producthunt.com/products/bud-voice-canvas","desc":"Voice-first canvas for sketchnoting and whiteboarding","zhDesc":"Voice-first canvas for sketchnoting and whiteboarding","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/9a57597b-0864-42d8-bac7-67fc82db66e0.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Ideate, sketch, and edit diagrams in real time on a voice-first canvas. Speak naturally to build system architectures, flowcharts, and turn ideas into visuals.","zhDetail":"BUD 是一款面向设计师、工程师和产品经理的语音优先绘图工具。用户只需自然说话，就能实时构思、绘制和编辑系统架构图、流程图等，将想法快速转化为可视化图表，无需手动拖拽或打字。"},{"rank":10,"name":"ditto.site","zhName":"ditto.site","url":"https://www.producthunt.com/products/ditto-site","desc":"Clone any website into clean code. Free & open source","zhDesc":"Clone any website into clean code. Free & open source","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/7321b58f-7419-433c-9ad8-9c86ff907331.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Point Ditto at any public URL and get a faithful copy as clean, componentized Next.js or Vite code, in minutes. It's fully deterministic, so it's fast, cheap, and consistent. Components, tokens, interactions & hover states included. Free REST API + MCP server, open source.","zhDetail":"ditto.site 是一款面向开发者的网页克隆工具，能够将任意公开 URL 快速转换为干净、组件化的 Next.js 或 Vite 代码。它通过确定性算法确保输出一致、快速且低成本，并完整保留组件、设计令牌、交互和悬停状态，同时提供免费的 REST API 和 MCP 服务器，且开源可用。"},{"rank":11,"name":"DualStream","zhName":"DualStream","url":"https://www.producthunt.com/products/dualstream","desc":"Simultaneous desktop and mobile streaming, the easy way.","zhDesc":"Simultaneous desktop and mobile streaming, the easy way.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/bf1f199a-03d7-4cb8-85e0-66cc3e9a1f50.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"DualStream 是一款面向直播主播和内容创作者的桌面与移动端同步推流工具。它解决了传统直播中需要多设备分别操作、画面切换繁琐的问题，让用户能够轻松实现电脑和手机画面的同时直播，大幅提 let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
