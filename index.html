<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月13日</span>
        <span class="updated">更新于 02:17</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-14","updatedAt":"02:17","yesterday":[{"rank":1,"name":"Osaurus","zhName":"Osaurus","url":"https://www.producthunt.com/products/osaurus","desc":"Open source agents that run 100% locally on your Mac","zhDesc":"Open source agents that run 100% locally on your Mac","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c784cd19-34af-4e58-bca7-584c59e1a47b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"We started as [Dinoki](https://dinoki.ai/), a 5MB desktop dinosaur, and grew into a full agent platform through open source community feedback. Now at **7K+ GitHub stars and 175K+ downloads** — all by word of mouth.","zhDetail":"Osaurus 是一款面向开发者和技术团队的智能代理平台，最初以5MB的桌面小恐龙工具起步，通过开源社区的反馈逐步成长为完整的代理解决方案。它帮助用户高效构建和部署自动化任务，目前已获得超过7000个GitHub星标和17.5万次下载，完全依靠口碑传播。"},{"rank":2,"name":"AgentKey","zhName":"AgentKey","url":"https://www.producthunt.com/products/agentkey","desc":"One-stop live data marketplace for your agent","zhDesc":"One-stop live data marketplace for your agent","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/32195c39-aa7c-4a77-ab44-99d4b66f866e.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The part I'd actually push on: once there are 20+ capabilities behind one marketplace, and the agent is choosing between several plausible tools for a given task, what happens when it picks a plausible-but-wrong one? Not a crash, just a confidently wrong choice that still returns a result. Is that visible anywhere today, or does it just look like a normal successful call downstream? That's usually where these marketplace-of-tools systems get hard, once the agent is choosing on your behalf instead of you wiring the one specific tool you already knew you wanted.","zhDetail":"AgentKey 是一款面向开发者和 AI 应用团队的智能工具市场平台。当 AI 智能体在超过 20 个工具中自主选择时，它可能做出看似合理但实际错误的调用，导致下游误以为成功。AgentKey 能让你清晰追踪这些“自信但错误”的选择，避免工具调用黑箱化，确保智能体决策过程透明可控。"},{"rank":4,"name":"Loomal","zhName":"Loomal","url":"https://www.producthunt.com/products/loomal","desc":"Monetize any MCP server in 5 minutes with no % skim.","zhDesc":"Monetize any MCP server in 5 minutes with no % skim.","tags":[],"upvotes":null,"icon":null,"detail":"Loomal lets you charge for what you sell online — API calls, tools, digital products, or your whole store. One line of code (or a Shopify/WooCommerce plugin) adds an agent-ready paywall: AI agents pay you in USDC, settled in about 2 seconds, and you keep 100% of your revenue — no percentage cut, ever. Free to start, no card; flat monthly plans as you grow. Every paid listing appears on the Loomal Index, where agents discover and pay. Launch offer: first 500 sellers get 1,000 transactions free.","zhDetail":"Loomal 让在线销售变得简单——无论是 API 调用、工具、数字产品还是整个店铺，只需一行代码或安装 Shopify/WooCommerce 插件，即可添加一个支持 AI 代理的支付墙。AI 代理用 USDC 支付，约 2 秒完成结算，且你保留 100% 的收入，平台不抽成。免费启动，无需绑定银行卡，随着业务增长可选择固定月费套餐；每笔付费商品还会出现在 Loomal 索引中，供 AI 代理发现和购买。"},{"rank":5,"name":"Playground","zhName":"Playground","url":"https://www.producthunt.com/products/nyx-4","desc":"Earn $100K+ in weekly rewards for hacking AI agents.","zhDesc":"Earn $100K+ in weekly rewards for hacking AI agents.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/7db6ae83-50cf-4635-adee-236755a1014a.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Our first challenge, **The Gatekeeper**, is live now. Kai is an assistant guarding a classified access code. You can start playing without an account, but you’ll need to sign in for a successful break to count toward the weekly leaderboard. We review every submission ourselves. The player with the most approved breaks each week wins, and we publish a new challenge every Monday.","zhDetail":"Playground 是一款面向黑客与解谜爱好者的 AI 挑战平台。它通过每周发布一个由 AI 助手“Kai”守护的密码破解任务，让玩家在无需注册即可试玩，但需登录才能将成功破解计入每周排行榜。团队会人工审核每次破解，每周一更新挑战，获胜者由破解次数最多者夺得。"},{"rank":9,"name":"UnitPay","zhName":"UnitPay","url":"https://www.producthunt.com/products/unitpay","desc":"Price, bill, and prove value for your AI product","zhDesc":"Price, bill, and prove value for your AI product","tags":[],"upvotes":null,"icon":null,"detail":"UnitPay is the monetization OS for AI companies. Design pricing, run usage-based billing, track inference costs and margins in real time, and show every customer the value they're actually getting — all in one system. Built ground-up for AI-native products: credits, hybrid pricing, per-token metering, cost tracking. Free until you hit $500K ARR.","zhDetail":"UnitPay 是专为AI公司打造的商业化操作系统，帮助它们设计定价策略、运行基于使用量的计费系统，并实时追踪推理成本与利润率，让每位客户都能清晰看到自己实际获得的价值。该系统从零构建，原生支持AI产品所需的积分、混合定价、按Token计量和成本追踪等功能，且在年经常性收入达到50万美元前完全免费。"},{"rank":10,"name":"Fudge MCP","zhName":"Fudge MCP","url":"https://www.producthunt.com/products/fudge-mcp","desc":"Give your AI agents design taste from existing websites","zhDesc":"Give your AI agents design taste from existing websites","tags":[],"upvotes":null,"icon":null,"detail":"the part I'd want to be careful with is how close \"measured design evidence\" gets to a specific real company's actual brand identity versus generic patterns. pulling fonts/colors/layout from a category of sites as inspiration is fine, but if the agent leans hard on one particular close visual match, the output could end up looking like a clone of that specific brand rather than \"good taste\" in general. is there anything nudging toward blending multiple references instead of over-indexing on the single best match","zhDetail":"Fudge MCP 是一款面向设计师与产品团队的 AI 设计灵感工具，帮助用户从同类网站中提取字体、色彩与布局模式，避免过度模仿单一品牌。它通过混合多个参考源来生成具有“普遍好品味”的设计方案，而非简单克隆某个特定品牌。"},{"rank":11,"name":"NoMac.app","zhName":"NoMac.app","url":"https://www.producthunt.com/products/nomac","desc":"The headless iOS app publishing pipeline for AI agents.","zhDesc":"The headless iOS app publishing pipeline for AI agents.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/980bf961-166a-4d55-b832-f19c6f740421.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Me and my friends moved our whole AI agent setup from my Mac to Hetzner. But we still kept getting stuck on the MacBook whenever working on native iOS apps. We didn’t want to pay $100+/month for a cloud Mac, and Mac Minis were out of stock. So we built this: NoMac.app - let your AI agents build and publish native iOS apps without a Mac.","zhDetail":"NoMac.app 专为 AI 开发者与 iOS 应用构建者设计，解决了在无 Mac 设备时无法构建和发布原生 iOS 应用的痛点。它通过云端虚拟化技术，让 AI 代理直接完成 iOS 应用的编译与发布流程，无需购买实体 Mac 或支付高昂的云 Mac 订阅费用。"},{"rank":12,"name":"TailMux","zhName":"TailMux","url":"https://www.producthunt.com/products/tailmux","desc":"Multiple Tailscale tailnets at once, no switching + no VM","zhDesc":"Multiple Tailscale tailnets at once, no switching + no VM","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/724918fc-d508-43f9-91c5-5af9c55f124f.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"the fail-closed approach to ambiguous routes is the right instinct, most tools would guess and silently leak traffic down the wrong tunnel. one thing I'm curious about given it's running isolated embedded nodes per tailnet - what's the permission footprint on macOS, does it need a persistent background helper with elevated network privileges, and is it notarized/signed properly given how much trust you're asking for on the network stack","zhDetail":"TailMux 面向需要管理复杂网络路由的运维人员或高级用户，解决了在模糊路由场景下传统工具会错误猜测并静默泄露流量的问题。它采用“故障关闭”策略，确保在路由不明确时直接阻断流量而非盲目转发，同时通过为每个 tailnet 运行隔离的嵌入式节点来增强安全性。"}],"today":[{"rank":1,"name":"1. Osaurus","zhName":"Osaurus","url":"https://www.producthunt.com/products/osaurus","desc":"Open source agents that run 100% locally on your Mac","zhDesc":"Open source agents that run 100% locally on your Mac","tags":[],"upvotes":null,"icon":null,"detail":"We started as [Dinoki](https://dinoki.ai/), a 5MB desktop dinosaur, and grew into a full agent platform through open source community feedback. Now at **7K+ GitHub stars and 175K+ downloads** — all by word of mouth.","zhDetail":"Osaurus 是一款面向开发者和技术团队的开源智能体平台，帮助用户通过自然语言指令自动执行复杂桌面任务。它从轻量级桌面工具起步，借助社区反馈成长为功能完整的代理平台，已获得超过 7000 个 GitHub 星标和 17.5 万次下载。"},{"rank":2,"name":"2. AgentKey","zhName":"AgentKey","url":"https://www.producthunt.com/products/agentkey","desc":"One-stop live data marketplace for your agent","zhDesc":"One-stop live data marketplace for your agent","tags":[],"upvotes":null,"icon":null,"detail":"The part I'd actually push on: once there are 20+ capabilities behind one marketplace, and the agent is choosing between several plausible tools for a given task, what happens when it picks a plausible-but-wrong one? Not a crash, just a confidently wrong choice that still returns a result. Is that visible anywhere today, or does it just look like a normal successful call downstream? That's usually where these marketplace-of-tools systems get hard, once the agent is choosing on your behalf instead of you wiring the one specific tool you already knew you wanted.","zhDetail":"AgentKey 面向需要管理多个 AI 工具与代理的企业团队，解决代理在工具市场中误选“看似合理但实际错误”的工具时难以察觉的问题。它通过提供透明的决策追踪机制，让用户清晰看到代理的每一步选择与结果，避免错误被误认为正常成功调用。"},{"rank":3,"name":"4. Loomal","zhName":"Loomal","url":"https://www.producthunt.com/products/loomal","desc":"Monetize any MCP server in 5 minutes with no % skim.","zhDesc":"Monetize any MCP server in 5 minutes with no % skim.","tags":[],"upvotes":null,"icon":null,"detail":"Loomal lets you charge for what you sell online — API calls, tools, digital products, or your whole store. One line of code (or a Shopify/WooCommerce plugin) adds an agent-ready paywall: AI agents pay you in USDC, settled in about 2 seconds, and you keep 100% of your revenue — no percentage cut, ever. Free to start, no card; flat monthly plans as you grow. Every paid listing appears on the Loomal Index, where agents discover and pay. Launch offer: first 500 sellers get 1,000 transactions free.","zhDetail":"Loomal 让在线销售 API 调用、工具、数字产品或整个商店的卖家能够轻松收费。只需一行代码或安装 Shopify/WooCommerce 插件，即可添加支持 AI 代理的支付墙：AI 代理用 USDC 支付，约 2 秒内 t background helper with elevated network privileges, and is it notarized/signed properly given how much trust you're asking for on the network stack","zhDetail":"TailMux 面向需要管理复杂网络路由的技术用户，解决了传统工具在模糊路由场景下可能静默泄露流量的问题。它采用“故障闭合”策略，通过在每个 tailnet 中运行隔离的嵌入式节点，确保流量不会误入错误隧道，从而提升网络的安全性与可控性。"},{"rank":9,"name":"1. Miora","zhName":"Miora","url":"https://www.producthunt.com/products/miora-2","desc":"Scale your creativity on editable canvas with agent memory","zhDesc":"Scale your creativity on editable canvas with agent memory","tags":[],"upvotes":null,"icon":null,"detail":"Memory is the part we most want to dig into. As you work, Miora quietly remembers your style and each project's rules, and it's no black box: you can view, edit and add to any of it. So the first brief generates; every one after is continuous creation built on your context. The deeper you go, the more it gets you.","zhDetail":"Miora 是一款面向创意工作者和内容创作者的智能记忆助手，它能默默记录你的工作风格和每个项目的规则，并让你随时查看、编辑或补充这些记忆。通过持续积累上下文，Miora 让每一次创作都建立在已有基础上，从第一份初稿到后续迭代，越用越懂你。"},{"rank":10,"name":"2. JustVibe","zhName":"JustVibe","url":"https://www.producthunt.com/products/justvibe","desc":"The search engine for doing, with apps built for you","zhDesc":"The search engine for doing, with apps built for you","tags":[],"upvotes":null,"icon":null,"detail":"JustVibe is a free search engine, built to help get things done. Search \"plan my 5 day trip to tokyo\" and instantly receive a fully functional and interactive trip planner, perfectly set up for Tokyo and running directly in your browser. If your perfect app doesn't exist yet, JustVibe builds a custom one for your exact needs in minutes. Every app is yours to keep forever, with zero code. Chat to customize every detail and share your new app with a single link.","zhDetail":"JustVibe 是一款免费搜索引擎，专为帮你快速完成任务而设计。无论你需要规划“东京五日游”还是其他需求，它都能在浏览器中直接生成一个功能完整、可交互的专属应用，无需编写任何代码。每个应用都可永久保存，你还能通过聊天自由定制细节，并用一个链接轻松分享给他人。"},{"rank":11,"name":"1. AnySearch","zhName":"AnySearch","url":"https://www.producthunt.com/products/anysearch","desc":"Real-time structured search trusted by agents and developers","zhDesc":"Real-time structured search trusted by agents and developers","tags":[],"upvotes":null,"icon":null,"detail":"A search tool for agents, not a search box. AI agents are only as good as the information they receive. When connected to AnySearch, your agent gets filtered, de-duplicated, and structured information from trusted sources searched in parallel, helping it produce more reliable results. Free to start.","zhDetail":"AnySearch 是一款专为 AI 智能体设计的搜索工具，而非传统搜索框。它能帮助智能体从多个可信来源并行搜索，并自动过滤、去重、结构化信息，从而让智能体获得更可靠的数据，输出更准确的结果。适合需要提升 AI 代理信息处理能力的开发者或团队使用。"},{"rank":12,"name":"2. ExploreYC","zhName":"ExploreYC","url":"https://www.producthunt.com/products/yc-company-explorer","desc":"Open-source API for Y Combinator & a16z company data","zhDesc":"Open-source API for Y Combinator & a16z company data","tags":[],"upvotes":null,"icon":null,"detail":"One open-source API for startup data across Y Combinator AND a16z - 6,600+ companies with funding, stage, IPO/M&A exits, and founders. Filter by VC (yc/a16z/all), batch, industry, country, or search. Grab a free API key, read the docs (curl/Node/Python + Swagger), and build in 30 seconds. Plus the full web app: map, analytics, funding data, a live hiring board, and AI tools.","zhDetail":"ExploreYC 是一款面向创业者和投资人的开源 API 工具，整合了 Y Combinator 与 a16z 两大知名加速器及风投的 6600 多家公司数据，涵盖融资、阶段、IPO/并购退出及创始人信息。用户可通过 VC 类型、批次、行业、国家等维度筛选数据，免费获取 API 密钥后 30 秒内即可通过 curl、Node、Python 或 Swagger 文档快速调用，同时提供完整网页应用，包含地图、分析、融资数据、实时招聘看板及 AI 工具。"},{"rank":13,"name":"4. ChatCut","zhName":"ChatCut","url":"https://www.producthunt.com/products/chatcut-ai-video-editor","desc":"Your AI video editor in ChatGPT, desktop, and web","zhDesc":"Your AI video editor in ChatGPT, desktop, and web","tags":[],"upvotes":null,"icon":null,"detail":"ChatCut is a lightweight, professional-grade AI video editor anyone can use, even without editing experience. It’s like having a personal video editing let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
