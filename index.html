<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月15日</span>
        <span class="updated">更新于 02:12</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-16","updatedAt":"02:12","yesterday":[{"rank":1,"name":"Velo 3.0","zhName":"Velo 3.0","url":"https://www.producthunt.com/products/velo-4","desc":"AI video infrastructure to explain, train, and sell faster.","zhDesc":"AI video infrastructure to explain, train, and sell faster.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/5a395b78-27ac-4662-9eac-cb5ce89d165c.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Velo 3.0 is here, our third and biggest launch yet. Start with a screen recording or a prompt. Describe the video you need, and Velo writes the script, narrates it in your own voice, and builds the finished cut. It stays grounded in your company knowledge, from your docs and tools you connect through connectors and MCP. Edit by typing changes. Localize the finished video into 25+ languages in one click. Recording or prompt, Velo turns either into a polished video you can ship anywhere.","zhDetail":"Velo 3.0 是一款面向企业团队和内容创作者的 AI 视频生成工具。你只需录制屏幕或输入一段文字描述，它就能自动撰写脚本、用你的声音进行配音，并完成视频剪辑。视频还能一键本地化为 25 种以上语言，并通过连接公司文档和工具确保内容准确，最终输出可直接发布的成品视频。"},{"rank":2,"name":"V2Fun","zhName":"V2Fun","url":"https://www.producthunt.com/products/v2fun","desc":"Generate 3D character with 8K textures and AI motion capture","zhDesc":"Generate 3D character with 8K textures and AI motion capture","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/1ae953dd-1691-4d3d-8eed-f970b24c8131.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"V2Fun is an AI 3D creation platform built with self-developed 3D modeling and AI motion capture models. It helps creators turn images, prompts, and videos into high-quality 3D models, enhance assets with advanced 8K texture generation, and create motion-ready characters without switching between separate modeling, texturing, and mocap tools. V2Fun also supports image generation through models including Nano Banana and others, so creators can explore visual concepts and bring them into 3D faster.","zhDetail":"V2Fun 是一款基于自研3D建模与AI动作捕捉模型的AI 3D创作平台，帮助创作者将图片、提示词和视频快速转化为高质量3D模型，并支持8K纹理生成与角色动作绑定。它集建模、贴图、动捕于一体，无需在多个工具间切换，同时内置Nano Banana等模型支持图像生成，让创作者能更高效地从视觉概念直达3D成品。"},{"rank":3,"name":"Campus","zhName":"Campus","url":"https://www.producthunt.com/products/flutterflow","desc":"One project space for humans and AI agents","zhDesc":"One project space for humans and AI agents","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/f00d0948-3886-474b-870c-48e89e8b2fb3.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Campus gives builders a shared space to build with teammates and AI agents. Keep your repo, terminal, project knowledge, conversations, and agent work together in one persistent workspace, instead of scattering context across Slack threads, docs, tickets, canvases, and one-off AI chats. Campus is organized around the thing you are building, so humans and agents can pick up where the work left off.","zhDetail":"Campus 为开发者和团队提供一个与队友及 AI 智能体共同构建的共享空间。它将代码仓库、终端、项目知识、对话和智能体工作整合在一个持久的工作区中，避免上下文分散在 Slack 消息、文档、工单、画布和零散的 AI 对话里。围绕你正在构建的项目组织一切，让人和智能体都能无缝接续工作。"},{"rank":4,"name":"Agently","zhName":"Agently","url":"https://www.producthunt.com/products/agently","desc":"Your whole stack, running itself!","zhDesc":"Your whole stack, running itself!","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2c44dbb7-be3c-432f-9138-d2931d70132d.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Short answer: we don't take the source's self-reported time as ground truth, and we don't collapse it into ingestion order either. It's bi-temporal, so both are first-class and stored separately. The source's reported time is treated as a _claim_ (an attribute of the event), and our ingestion order is always retained independently, which is what lets the two disagree without forcing a destructive pick. When a correction supersedes a correction, each one invalidates the prior with a validity interval, so the lineage stays intact even when they land out of order.","zhDetail":"Agently 是一款面向数据工程师和分析师的双时间轴数据管理工具。它解决了数据源自报时间与系统摄入时间不一致时难以追溯和校正的问题，通过将两者作为独立的一等公民分别存储，并引入有效性区间机制，确保数据修正的完整谱系不被破坏。"},{"rank":5,"name":"Crustdata Recruiter","zhName":"Crustdata Recruiter","url":"https://www.producthunt.com/products/crustdata-2","desc":"Claude Skills to turn Claude into a 100x Recruiter","zhDesc":"Claude Skills to turn Claude into a 100x Recruiter","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/86c6a32c-14bc-454a-8d97-b04065d688c9.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"This looks like a great tool - congratulations on the launch. 1 billion profiles is pretty impressive! My question is primarily about the way the data is harnessed and the sustainability of that model. Put simply, if you are pulling candidate data from a job board then you are potentially skipping the need for a recruiter to have a licence for that job board? In which case, there is a future risk to the job board's sustainability commercially. And then, of course, you lose that data source. Is that something you've got covered? If so, how do you compensate your data sources?","zhDetail":"Crustdata Recruiter 是一款面向招聘人员的智能数据工具，帮助他们在无需逐个登录招聘平台的情况下，快速访问超过10亿份候选人资料。它通过整合多个公开数据源，自动抓取并结构化候选人信息，从而大幅提升招聘效率，同时避免因依赖单一平台而带来的数据中断风险。"},{"rank":6,"name":"YAGNI","zhName":"YAGNI","url":"https://www.producthunt.com/products/yagni","desc":"Proactive agent teams you manage like humans","zhDesc":"Proactive agent teams you manage like humans","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ccdfa665-0955-48a5-bf1b-16c5216ff894.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"AI changed my own output more than any tool ever has. But it brought the trust problem back in a new form. More output means a worse signal-to-noise ratio, and the moment you try to put agents to work _inside_ a business you hit a wall: where do you even start? Every tool assumes you'll be directive. Either you prompt each task (\"do this thing\"), or you wire up an if-this-then-that graph and hope you predicted the work correctly. That's not how anyone actually runs a team.","zhDetail":"YAGNI 是一款面向企业团队的人工智能协作工具，旨在解决 AI 输出内容过多导致信噪比下降、以及现有工具无法像真实团队那样灵活协作的问题。它通过让 AI 理解业务上下文并自主判断何时介入、如何执行任务，从而替代传统的逐条指令或预设流程图模式，让 AI 像团队成员一样主动工作。"},{"rank":7,"name":"Flodesk Studio","zhName":"Flodesk Studio","url":"https://www.producthunt.com/products/flodesk-studio","desc":"A place to make beautiful emails.","zhDesc":"A place to make beautiful emails.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/4a2a2457-62cc-4548-b68a-ea5e72716d64.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"We're thrilled to launch Flodesk Studio! Flodesk has always believed that great design should be accessible to anyone. That belief took us to build a brand that looks like nothing else in our space. Flodesk Studio is a place to make beautiful emails, built by the world's top designers, accelerated by AI, finished by you. Describe what you want and Studio brings it to life on-brand, ready to refine in chat or perfect by hand. Use it inside Flodesk, or export to any ESP and send from there. Flodesk studio is free to try while we are in beta. We hope you like it!","zhDetail":"Flodesk Studio 是一款面向营销人员和小型企业主的邮件设计工具，旨在让没有设计经验的人也能轻松创建美观的邮件。它由全球顶尖设计师打造，并借助 AI 加速生成过程：你只需描述需求，Studio 就能自动生成符合品牌风格的邮件设计，之后你可以在聊天中进一步调整或手动完善。目前处于测试阶段，可免费试用，支持在 Flodesk 内使用或导出到其他邮件发送平台。"},{"rank":8,"name":"Tiptap AI Toolkit","zhName":"Tiptap AI Toolkit","url":"https://www.producthunt.com/products/tiptap","desc":"Empower your AI to directly edit documents in real time.","zhDesc":"Empower your AI to directly edit documents in real time.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/7df30036-bdd9-4bf9-b060-c9f3452552f0.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=4 and MCP. Edit by typing changes. Localize the finished video into 25+ languages in one click. Recording or prompt, Velo turns either into a polished video you can ship anywhere.","zhDetail":"Velo 3.0 是一款面向企业和内容创作者的 AI 视频制作工具。你只需录制屏幕或输入一段文字描述，它就能自动撰写脚本、用你的声音进行配音并完成剪辑，同时基于你连接的文档和工具确保内容符合公司知识体系。你还可以通过文字指令直接编辑视频，并一键将成品本地化为 25 种以上语言，大幅提升视频制作效率。"},{"rank":2,"name":"2. V2Fun","zhName":"V2Fun","url":"https://www.producthunt.com/products/v2fun","desc":"Generate 3D character with 8K textures and AI motion capture","zhDesc":"Generate 3D character with 8K textures and AI motion capture","tags":[],"upvotes":null,"icon":null,"detail":"V2Fun is an AI 3D creation platform built with self-developed 3D modeling and AI motion capture models. It helps creators turn images, prompts, and videos into high-quality 3D models, enhance assets with advanced 8K texture generation, and create motion-ready characters without switching between separate modeling, texturing, and mocap tools. V2Fun also supports image generation through models including Nano Banana and others, so creators can explore visual concepts and bring them into 3D faster.","zhDetail":"V2Fun 是一款基于自研3D建模与AI动作捕捉模型的3D创作平台，帮助创作者将图片、文字描述和视频快速转化为高质量3D模型，并支持8K纹理生成与角色动作绑定。它整合了建模、贴图、动捕等工具，让用户无需在多个软件间切换，即可高效完成从概念探索到3化输出的全流程。"},{"rank":3,"name":"3. Campus","zhName":"Campus","url":"https://www.producthunt.com/products/flutterflow","desc":"One project space for humans and AI agents","zhDesc":"One project space for humans and AI agents","tags":[],"upvotes":null,"icon":null,"detail":"Campus gives builders a shared space to build with teammates and AI agents. Keep your repo, terminal, project knowledge, conversations, and agent work together in one persistent workspace, instead of scattering context across Slack threads, docs, tickets, canvases, and one-off AI chats. Campus is organized around the thing you are building, so humans and agents can pick up where the work left off.","zhDetail":"Campus 为开发者团队提供了一个与 AI 智能体协作的共享空间。它将代码仓库、终端、项目知识、对话和智能体工作整合在同一个持久化工作区中，避免上下文散落在 Slack 消息、文档、工单、画布和零散的 AI 对话里。围绕“你正在构建的东西”组织协作，让人类和 AI 智能体都能无缝接续工作进度。"},{"rank":4,"name":"6. YAGNI","zhName":"YAGNI","url":"https://www.producthunt.com/products/yagni","desc":"Proactive agent teams you manage like humans","zhDesc":"Proactive agent teams you manage like humans","tags":[],"upvotes":null,"icon":null,"detail":"AI changed my own output more than any tool ever has. But it brought the trust problem back in a new form. More output means a worse signal-to-noise ratio, and the moment you try to put agents to work _inside_ a business you hit a wall: where do you even start? Every tool assumes you'll be directive. Either you prompt each task (\"do this thing\"), or you wire up an if-this-then-that graph and hope you predicted the work correctly. That's not how anyone actually runs a team.","zhDetail":"YAGNI 是一款面向企业团队的 AI 协作工具，旨在解决 AI 输出内容过多导致信噪比下降、以及现有工具无法像真实团队一样灵活协作的问题。它摒弃了传统“指令式”或“预设流程图”的工作方式，让 AI 能够像团队成员一样主动理解任务边界、自主判断何时介入，从而在真实业务场景中实现更自然、更高效的协作。"},{"rank":5,"name":"13. Keepresso","zhName":"Keepresso","url":"https://www.producthunt.com/products/keepresso","desc":"Keep your Mac awake, on your terms. Free and open source","zhDesc":"Keep your Mac awake, on your terms. Free and open source","tags":[],"upvotes":null,"icon":null,"detail":"What I really wanted was simple to say and surprisingly hard to find. I wanted to close my laptop in the middle of any work, keep it running even on battery with no cable attached, and have the screen stay off inside the closed lid so nothing sat there lit in my bag. And I wanted it to be smart about the other direction too, so that once the job actually finished, the Mac was allowed to sleep instead of burning power all night.","zhDetail":"Keepresso 是一款专为 Mac 用户设计的智能合盖运行工具，解决了合上笔记本后屏幕仍会点亮、机器无法持续工作或无法自动休眠的痛点。它让你在合盖状态下保持 Mac 继续运行（即使仅用电池），同时关闭屏幕以节省电量，并在任务完成后自动让 Mac 进入休眠，避免整夜耗电。"},{"rank":6,"name":"15. Jam-Pod","zhName":"Jam-Pod","url":"https://www.producthunt.com/products/jam-pod","desc":"A player for people who keep their own music collection","zhDesc":"A player for people who keep their own music collection","tags":[],"upvotes":null,"icon":null,"detail":"Hey everyone! Maker here. I built Jam-Pod because I missed the feeling of actually scrolling through my own music, instead of getting fed something an algorithm picked for me. I still have a soft spot for the old click-wheel days, so I rebuilt that feeling with a joystick-driven interface and a monochrome screen — no ads, no recommendations, just your library. It plays your local Apple Music library, hi-res/lossless files (FLAC, WAV, ALAC), the Apple Music catalog, and your podcasts, all in one place. It's still early and in TestFlight, so please be gentle — and even more, please tell me what breaks or what feels off. I read every comment. Thanks for checking it out!","zhDetail":"Jam-Pod 是一款专为怀念纯粹音乐浏览体验的用户设计的播放器。它通过摇杆操控和单色屏幕，让你像当年用 iPod 一样手动翻阅自己的本地音乐库，而非被算法推荐内容淹没。支持 Apple Music 本地库、高解析无损文件（FLAC、WAV、ALAC）以及播客，无广告、无推荐，回归音乐本身。"},{"rank":7,"name":"20. DeskMat 1.3","zhName":"DeskMat 1.3","url":"https://www.producthunt.com/products/deskmat-for-mac","desc":"Now hide individual files + folders for more private desktop","zhDesc":"Now hide individual files + folders for more private desktop","tags":[],"upvotes":null,"icon":null,"detail":"➡️ For a short time, [get 25% off DeskMat for Mac on my web store](https://eternalstorms.at/store/p_checkoutPreflight?productID=pri_01jn3pgbnte5t61sycmx53n0z9&discountCode=DESKMATHUNT726)! (or try it for free for 28 days; download on the [website](https://eternalstorms.at/DeskMat))","zhDetail":"DeskMat 是一款专为Mac用户设计的桌面整理工具，帮助解决窗口布局混乱、多任务切换效率低的问题。它通过直观的拖拽和快捷键操作，让用户快速将窗口对齐到预设网格或自定义位置，从而提升工作流清晰度与操作效率。"},{"rank":8,"name":"1. ClawTeams","zhName":"ClawTeams","url":"https://www.producthunt.com/products/clawteams","desc":"The first goal-driven, proactive AI team for e-commerce","zhDesc":"The first goal-driven, proactive AI team for e-commerce","tags":[],"upvotes":null,"icon":null,"detail":"ClawTeams is an AI employee platform for e-commerce sellers. Instead of hiring specialists—or doing everything yourself—you get a coordinated AI team that thinks, plans, and executes like real employees. One goal. One team. Zero micromanagement. Tell your team lead what you want—\"Increase Q4 revenue by 20%\"—and they break it down, assign specialists, and run the plan. You get updates in Slack or Discord. High-stakes decisions wait for your approval. Everything else just happens.","zhDetail":"ClawTeams 是一个面向电商卖家的 AI 员工平台。你无需聘请专家或亲力亲为，只需向 AI 团队负责人下达目标（如“Q4 收入增长 20%”），系统便会自动拆解任务、分配专业 AI 成员并执行计划。你通过 Slack 或 Discord 接收进度更新，只有关键决策需要你批准，其余工作自动完成。"},{"rank":9,"name":"2. Pazi","zhName":"Pazi","url":"https://www.producthunt.com/products/pazi","desc":"Vibe code business operations","zhDesc":"Vibe code business operations","tags":[],"upvotes":null,"icon":null,"detail":"Pazi is an AI team for that idea you keep coming back to — a book, a shop, an app, a skill you want to sell. Tell Pazi what you're trying to do and it builds a team of agents around your idea and starts making things happen: a website, first outreach, content, the next step. Every time you come back, something has moved. You stay in control; your team does the rest alongside you, one real step at a time. Like vibe coding but for business operations.","zhDetail":"Pazi 是为那些反复萦绕在你脑海中的创意（比如一本书、一家店、一个应用或一项可出售的技能）而生的 AI 团队。你只需告诉 Pazi 你想做什么，它就会围绕你的想法组建一个智能体团队，自动推进建站、首次客户触达、内容制作等下一步行动。每次你回来查看，事情都已向前推进；你始终掌控方向，而你的 AI 团队则与你并肩作战，一步一个脚印地落实执行——就像“氛围编程”之于商业运营。"},{"rank":10,"name":"4. PgDog","zhName":"PgDog","url":"https://www.producthunt.com/products/pgdog","desc":"Scale PostgreSQL without changing your app","zhDesc":"Scale PostgreSQL without changing your app","tags":[],"upvotes":null,"icon":null,"detail":"The \"scale Postgres without changing your app\" framing is the part that matters for teams that can't stop to re-architect — connection pooling plus transparent routing means the app stays naive. My one question as I'd drop this in front of an existing service: how does PgDog handle a single transaction that touches rows on multiple shards — does it coordinate the cross-shard write, or is keeping a transaction inside one shard still the app's job? Curious where the sharding proxy's transparency stops.","zhDetail":"PgDog 是一款面向无法停下重构脚步的团队的 PostgreSQL 扩展工具，通过连接池和透明路由技术，让应用无需修改代码即可实现数据库水平扩展。它解决了传统分库分表方案需要应用层感知分片逻辑的痛点，但跨分片事务仍需应用自行保证数据一致性——代理的透明性止步于单分片内事务。"},{"rank":11,"name":"1. AnySearch","zhName":"AnySearch","url":"https://www.producthunt.com/products/anysearch","desc":"Real-time structured search trusted by agents and developers","zhDesc":"Real-time structured search trusted by agents and developers","tags":[],"upvotes":null,"icon":null,"detail":"A search tool for agents, not a search box. AI agents are only as good as the information they receive. When connected to AnySearch, your agent gets filtered, de-duplicated, and structured information from trusted sources searched in parallel, helping it produce more reliable results. Free to start.","zhDetail":"AnySearch 是一款专为 AI 智能体设计的搜索工具，而非传统搜索框。它能帮助智能体从多个可信来源并行搜索，并自动过滤、去重、结构化信息，从而让智能体获得更可靠的数据，输出更准确的结果。适合需要提升 AI 代理信息质量的开发者和团队使用，免费即可开始。"},{"rank":12,"name":"2. ExploreYC","zhName":"ExploreYC","url":"https://www.producthunt.com/products/yc-company-explorer","desc":"Open-source API for Y Combinator & a16z company data","zhDesc":"Open-source API for Y Combinator & a16z company data","tags":[],"upvotes":null,"icon":null,"zhDetail":"ExploreYC 是一款面向创业者和投资人的开源 API 工具，帮助用户快速获取 Y Combinator 和 a16z 投资公司的结构化数据。通过提供标准化的数据接口，它解决了手动搜集和整理初创公司信息效率低下的问题，让用户能够更便捷地进行市场分析和投资研究。"},{"rank":13,"name":"4. ChatCut","zhName":"ChatCut","url":"https://www.producthunt.com/products/chatcut-ai-video-editor","desc":"Your AI video editor in ChatGPT, desktop, and web","zhDesc":"Your AI video editor in ChatGPT, desktop, and web","tags":[],"upvotes":null,"icon":null,"zhDetail":"ChatCut 是一款集成在 ChatGPT、桌面端和网页端的 AI 视频编辑工具，面向需要快速剪辑视频的内容创作者和普通用户。它让你无需切换软件，直接在对话中完成视频剪辑、片段提取和字幕添加等操作，大幅提升视频处 let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
