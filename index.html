<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月20日</span>
        <span class="updated">更新于 01:26</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-21","updatedAt":"01:26","yesterday":[{"rank":2,"name":"Nautis","zhName":"Nautis","url":"https://www.producthunt.com/products/nautis","desc":"The AI-native Operating System for founders.","zhDesc":"The AI-native Operating System for founders.","tags":[],"upvotes":null,"icon":null,"detail":"Nautis is the AI-native Operating System for founders. Manage fundraising, planning, finance, documents, meetings, CRM, hiring, and daily operations from one connected workspace. Unlike disconnected SaaS tools, every module shares one AI brain, giving you context-aware automation, smarter insights, and a Chief of Staff that understands your business—not just one app. Spend less time managing tools and more time building.","zhDetail":"Nautis 是一款面向创业者的 AI 原生操作系统，帮助创始人从单一工作空间统一管理融资、规划、财务、文档、会议、客户关系、招聘及日常运营。与零散的 SaaS 工具不同，其所有模块共享同一个 AI 大脑，提供上下文感知的自动化与更智能的洞察，相当于一位真正理解你业务全貌的“AI 参谋长”，让你少花时间管理工具，多花时间打造业务。"},{"rank":4,"name":"Replay QA","zhName":"Replay QA","url":"https://www.producthunt.com/products/replayio","desc":"Replay QA tells you what is broken before your users do","zhDesc":"Replay QA tells you what is broken before your users do","tags":[],"upvotes":null,"icon":null,"detail":"Add your GitHub repo for continuous testing, or drop in a URL for a one-time check. Replay QA explores your app, records every session, finds real bugs, and gives your coding agent the root cause and fix. Try for free: qa.replay.io","zhDetail":"Replay QA 是一款面向开发者和测试团队的自动化质量保障工具。你只需接入 GitHub 仓库即可实现持续测试，或输入一个 URL 进行一次性检查；它能自动探索你的应用、记录每次会话、发现真实 Bug，并直接为你的编码助手提供根因分析和修复建议。"},{"rank":5,"name":"Skippr AI","zhName":"Skippr AI","url":"https://www.producthunt.com/products/skippr-3","desc":"The live AI employee inside your product, serving every user","zhDesc":"The live AI employee inside your product, serving every user","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0614f939-eaa1-4fdc-8a4a-6b56e3aeebbb.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Real-time agents that see, talk, and operate software. They onboard, activate, and unblock your users. On their own. Skippr agents keep agenda and memory across full sessions, speak 10 languages, and act on screen with built-in browser automation. Fully self-serve: spin up an agent in minutes, embed with 2 lines of code, or share a meeting link. Trained on your knowledge, styled to your brand. 200 free credits to start, no card required. Talk to me for the deeper enterprise version.","zhDetail":"Skippr AI 为产品团队提供能“看、说、操作软件”的实时智能代理，帮助新用户快速上手、激活功能并解决使用中的卡点。这些代理拥有跨会话的记忆和议程，支持10种语言，并能通过内置浏览器自动化直接操作屏幕。你只需2行代码或一个会议链接即可嵌入，无需信用卡即可获得200次免费试用额度。"},{"rank":6,"name":"Inkling","zhName":"Inkling","url":"https://www.producthunt.com/products/tinker-2","desc":"Open weights 975B multimodal model built for fine-tuning","zhDesc":"Open weights 975B multimodal model built for fine-tuning","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/641f1365-3f13-46e0-97d2-f13d75a72b5f.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Inkling is Thinking Machines’ first open-weights model, a 975B MoE with 41B active parameters, 1M context, native reasoning across text, images, and audio, and controllable thinking effort. Fine-tune it on Tinker or download the Apache 2.0 weights.","zhDetail":"Inkling 是 Thinking Machines 推出的首个开放权重模型，专为需要处理超长上下文（100万token）和多模态推理（文本、图像、音频）的开发者与研究人员设计。它通过975B参数混合专家架构（41B活跃参数）实现高效计算，并支持可控思考深度，用户可在 Tinker 平台上微调或直接下载 Apache 2.0 开源权重。"},{"rank":8,"name":"Creed","zhName":"Creed","url":"https://www.producthunt.com/products/creed-2","desc":"Your personal context file for every agent.","zhDesc":"Your personal context file for every agent.","tags":[],"upvotes":null,"icon":null,"detail":"Connor, the thing I re-explain most isn't who I am — it's my domain. I do research-heavy work, and every new agent has to be re-taught my field's vocabulary, which sources I actually trust, and the shorthand I use, before it's useful. So the tool I'd most want plugged in first is my knowledge base (Obsidian / Zotero / NotebookLM), because that's where the real \"how I think\" lives, not my chat history. One design question: do you separate stable identity context (role, preferences) from fast-moving project context? The first I set once; the second changes weekly, and I'd worry a single flat file quietly blurs the two together.","zhDetail":"Creed 是一款面向重度研究型用户的知识管理工具，解决的是每次切换 AI 代理时都需要重新灌输个人领域术语、可信来源和写作习惯的痛点。它通过将用户的知识库（如 Obsidian、Zotero、NotebookLM）作为核心“身份上下文”接入，并区分稳定的角色偏好与动态的项目上下文，让 AI 真正理解“你如何思考”，而非仅依赖聊天记录。"},{"rank":10,"name":"Backdrop","zhName":"Backdrop","url":"https://www.producthunt.com/products/backdrop","desc":"AI Coworkers that run your projects and operations","zhDesc":"AI Coworkers that run your projects and operations","tags":[],"upvotes":null,"icon":null,"detail":"AI made execution faster. The bottleneck has shifted to deciding what to build while the knowledge behind those decisions is scattered across people, tools, and AI chats. Backdrop provides AI coworkers for projects and operations that understand your company, work with your team,and build shared company context. Across Slack, GitHub, Linear, Notion, Asana, Google Workspace and more, they synthesize customer feedback, create plans and specs, manage tickets, draft documents, and keep work moving.","zhDetail":"Backdrop 为项目和运营提供了解你公司、能与团队协作并构建共享公司上下文的 AI 同事。它整合 Slack、GitHub、Linear、Notion、Asana、Google Workspace 等工具，自动合成客户反馈、制定计划和规格、管理工单、起草文档，帮助团队解决决策知识分散、行动卡在“该做什么”上的瓶颈，让工作持续推进。"},{"rank":11,"name":"Kogvio","zhName":"Kogvio","url":"https://www.producthunt.com/products/kogvio","desc":"Understand anything online without leaving the page.","zhDesc":"Understand anything online without leaving the page.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/b0cdfa2a-602c-47ba-b367-ff328c933a2d.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"As someone who lives in research papers and medical textbooks all day, that copy → open ChatGPT → paste → lose-my-place loop is painfully familiar, so this clicks immediately. Two things I'm curious about: when I highlight a passage in a dense PDF, does Kogvio pull in the surrounding context (or the whole document), or only the exact selection? And for the technical-diagram case like the Kalman filter example in your demo, is it reading the figure itself or the caption and text around it? That's usually where in-page tools fall short for me.","zhDetail":"Kogvio 是一款面向科研人员和医学生的 PDF 阅读辅助工具，解决了在阅读密集文献时频繁复制粘贴到 ChatGPT 导致阅读中断、丢失上下文的问题。它通过直接在 PDF 内选中文本即可调用 AI 解释，并能智能提取选中内容周围的上下文或整篇文档，同时支持对技术图表及其标注进行识别分析，让用户无需离开阅读界面即可获得即时理解。"},{"rank":12,"name":"LnkFlow","zhName":"LnkFlow","url":"https://www.producthunt.com/products/lnkflow","desc":"Agentic click tracking that shows what grows your business","zhDesc":"Agentic click tracking that shows what grows your business","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/70422c8f-331f-4120-90ca-e37f56b9f6ab.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"See which campaigns, channels, and collabs make you money! With reliable, server-side click tracking that counts the visits, ad blockers hide. Turn any URL into a short, branded link tagged by campaign, channel, or creator. Rank creators and platforms by who actually drove clicks, with bots filtered out by default. And it's fully agentic-ready: your AI assistant can create links, tag them, and pull reports in plain language — no dashboard required. Clean links in, clear answers out.","zhDetail":"LnkFlow 是一款面向营销人员、创作者和团队的工具，帮助您精准追踪哪些营销活动、渠道和合作真正带来了收益。它通过可靠的服务器端点击追踪，绕过广告拦截器统计真实访问量，并将任意链接转换为带有活动、渠道或创作者标签的短链。此外，LnkFlow 默认过滤机器人流量，支持 AI 助手以自然语言创建链接、打标签并生成报告，无需操作后台即可获得清晰的数据洞察。"},{"rank":13,"name":"Lunen.ai","zhName":"Lunen.ai","url":"https://www.producthunt.com/products/lunen-ai","desc":"Build AI agents your whole team can run, and control","zhDesc":"Build AI agents your whole team can run, and control","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/80a8a979-cd7a-49a2-94bf-d34a8b50c3f7.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The \"2FA checkpoint\" framing for risky calls is the interesting part to me. Most agent tools either gate everything behind a human click or trust the model fully — you're doing something in between. How is the read vs. write / auto-allow vs. approve line actually drawn? Is that a threshold an admin configures per tool/data source, or does Lunen infer it from the action type itself? And for scheduled agents running unattended — if a write needs approval and nobody's there to click it, does it just sit and wait, or fall back to a pre-set policy?","zhDetail":"Lunen.ai 是一款面向企业团队和开发者的AI代理安全管控工具，主要解决AI代理在自动化执行任务时对敏感操作（如写入数据）缺乏精细权限控制的问题。它通过引入“2FA检查点”机制，在“完全信任模型”与“每次操作都需人工确认”之间取得平衡，允许管理员按工具或数据源配置读写权限阈值，从而在无人值守场景下也能依据预设策略自动处理审批请求。"},{"rank":17,"name":"Rex","zhName":"Rex","url":"https://www.producthunt.com/products/rex-7","desc":"AI agents that run order-to-cash operations","zhDesc":"AI agents that run order-to-cash operations","tags":[],"upvotes":null,"icon":null,"detail":"Hey Product Hunt, I'm Merlin, co-founder of Rex. Lewis and I spent four years building AR software at Sequence. What we kept seeing: someone on the finance team copying data from a portal into a spreadsheet into NetSuite, every single day. Automation tools never fixed it because the work is full of exceptions and judgment calls. So we built Rex to just do the work. Agents plug into your existing stack and run collections, portal uploads, and the AR inbox end to end. Anything sensitive gets routed to your team. Synthesia runs their AR on us today. Ask me anything, including what the agents still get wrong.","zhDetail":"Rex 是一款面向财务团队的 AI 代理工具，专门解决应收账款（AR）流程中因大量例外情况和人工判断而无法被传统自动化工具替代的重复性工作。它通过接入企业现有系统，自动完成收款、门户上传和 AR 收件箱的全流程处理，仅在遇到敏感操作时转交人工团队，从而大幅减少财务人员每日手动搬运数据的负担。"}],"today":[{"rank":1,"name":"2. Nautis","zhName":"Nautis","url":"https://www.producthunt.com/products/nautis","desc":"The AI-native Operating System for founders.","zhDesc":"The AI-native Operating System for founders.","tags":[],"upvotes":null,"icon":null,"detail":"Nautis is the AI-native Operating System for founders. Manage fundraising, planning, finance, documents, meetings, CRM, hiring, and daily operations from one connected workspace. Unlike disconnected SaaS tools, every module shares one AI brain, giving you context-aware automation, smarter insights, and a Chief of Staff that understands your business—not just one app. Spend less time managing tools and more time building.","zhDetail":"Nautis 是为创业者打造的 AI 原生操作系统，将融资、规划、财务、文档、会议、客户管理、招聘及日常运营整合在一个互联工作空间中。与零散的 SaaS 工具不同，其所有模块共享同一个 AI 大脑，提供上下文感知的自动化、更智能的洞察，以及一位理解你整个业务而非单一应用的“AI 参谋长”，让你花更少时间管理工具，更多时间专注创业。"},{"rank":2,"name":"4. Replay QA","zhName":"Replay QA","url":"https://www.producthunt.com/products/replayio","desc":"Replay QA tells you what is broken before your users do","zhDesc":"Replay QA tells you what is broken before your users do","tags":[],"upvotes":null,"icon":null,"detail":"Congrats on the launch, this is a sharp read on where QA broke down — AI cut build time to hours and testing never caught up. We ran into something similar: half our early bugs only showed up after the flows ran a few times, never on the first pass. The GitHub PR flow is the part I keep coming back to — root cause + fix posted right on the PR. How do you handle false positives from apps that behave non-deterministically (race conditions, flaky async UI)? Does Replay QA re-run a failure before flagging it, or does that triage still land on the dev?","zhDetail":"Replay QA 是一款面向开发团队的质量保障工具，专门解决AI加速开发后测试跟不上、缺陷难以复现的痛点。它能自动捕获多次运行后才出现的偶发Bug，并在GitHub PR上直接定位根因与修复建议，同时通过智能重跑机制过滤非确定性错误（如竞态条件、异步UI抖动），减少开发者的无效排查负担。"},{"rank":3,"name":"5. Skippr AI","zhName":"Skippr AI","url":"https://www.producthunt.com/products/skippr-3","desc":"The live AI employee inside your product, serving every user","zhDesc rious about: when I highlight a passage in a dense PDF, does Kogvio pull in the surrounding context (or the whole document), or only the exact selection? And for the technical-diagram case like the Kalman filter example in your demo, is it reading the figure itself or the caption and text around it? That's usually where in-page tools fall short for me.","zhDetail":"Kogvio 是一款面向科研人员和医学从业者的 AI 阅读助手，专为解决在阅读密集 PDF 时频繁切换 ChatGPT 导致思路中断的痛点而设计。它支持在文档中直接高亮段落并获取解释，同时能智能提取选中内容周围的上下文信息，甚至解析技术图表及其相关文字说明，让用户无需离开阅读界面即可获得深度理解。"},{"rank":8,"name":"12. LnkFlow","zhName":"LnkFlow","url":"https://www.producthunt.com/products/lnkflow","desc":"Agentic click tracking that shows what grows your business","zhDesc":"Agentic click tracking that shows what grows your business","tags":[],"upvotes":null,"icon":null,"detail":"See which campaigns, channels, and collabs make you money! With reliable, server-side click tracking that counts the visits, ad blockers hide. Turn any URL into a short, branded link tagged by campaign, channel, or creator. Rank creators and platforms by who actually drove clicks, with bots filtered out by default. And it's fully agentic-ready: your AI assistant can create links, tag them, and pull reports in plain language — no dashboard required. Clean links in, clear answers out.","zhDetail":"LnkFlow 是一款面向营销人员、创作者和电商卖家的链接追踪工具，帮助您精准识别哪些营销活动、渠道和合作方真正带来了收益。它通过可靠的服务器端点击追踪，绕过广告拦截器统计真实访问量，并将任意网址转化为带有活动、渠道或创作者标签的短链接。此外，LnkFlow 默认过滤机器人流量，支持 AI 助手用自然语言创建链接、打标签和生成报告，让您无需操作后台即可获得清晰的数据洞察。"},{"rank":9,"name":"13. Lunen.ai","zhName":"Lunen.ai","url":"https://www.producthunt.com/products/lunen-ai","desc":"Build AI agents your whole team can run, and control","zhDesc":"Build AI agents your whole team can run, and control","tags":[],"upvotes":null,"icon":null,"detail":"The \"2FA checkpoint\" framing for risky calls is the interesting part to me. Most agent tools either gate everything behind a human click or trust the model fully — you're doing something in between. How is the read vs. write / auto-allow vs. approve line actually drawn? Is that a threshold an admin configures per tool/data source, or does Lunen infer it from the action type itself? And for scheduled agents running unattended — if a write needs approval and nobody's there to click it, does it just sit and wait, or fall back to a pre-set policy?","zhDetail":"Lunen.ai 是一款面向企业团队和开发者的AI代理安全管控工具，专门解决高风险操作中“全自动信任”与“人工确认”之间的平衡难题。它通过“2FA检查点”机制，在代理执行敏感写入操作时自动触发审批流程，管理员可按工具或数据源灵活配置阈值，无人值守时则依据预设策略等待或降级处理。"},{"rank":10,"name":"17. Rex","zhName":"Rex","url":"https://www.producthunt.com/products/rex-7","desc":"AI agents that run order-to-cash operations","zhDesc":"AI agents that run order-to-cash operations","tags":[],"upvotes":null,"icon":null,"detail":"Hey Product Hunt, I'm Merlin, co-founder of Rex. Lewis and I spent four years building AR software at Sequence. What we kept seeing: someone on the finance team copying data from a portal into a spreadsheet into NetSuite, every single day. Automation tools never fixed it because the work is full of exceptions and judgment calls. So we built Rex to just do the work. Agents plug into your existing stack and run collections, portal uploads, and the AR inbox end to end. Anything sensitive gets routed to your team. Synthesia runs their AR on us today. Ask me anything, including what the agents still get wrong.","zhDetail":"Rex 是一款面向财务团队的 AI 自动化工具，专门解决应收账款（AR）流程中依赖人工判断的重复性工作。它通过智能代理直接接入企业现有系统，自动完成催款、门户上传和收件箱处理，同时将敏感操作转交人工审核，帮助团队摆脱手动搬运数据的低效困境。"},{"rank":11,"name":"18. Autoplot","zhName":"Autoplot","url":"https://www.producthunt.com/products/autoplot","desc":"Unify data analysis and plotting in one powerful workspace","zhDesc":"Unify data analysis and plotting in one powerful workspace","tags":[],"upvotes":null,"icon":null,"zhDetail":"Autoplot 面向数据科学家和研究人员，将数据分析与绘图功能整合在同一个工作空间中，解决了在多个工具间切换导致的效率低下问题。用户无需离开当前环境即可完成从数据探索到可视化输出的全流程，从而更专注于洞察本身。"},{"rank":12,"name":"19. Deck","zhName":"Deck","url":"https://www.producthunt.com/products/deck-9","desc":"The most capable AI assistant with its own inbox","zhDesc":"The most capable AI assistant with its own inbox","tags":[],"upvotes":null,"icon":null,"zhDetail":"Deck 是一款面向重度 AI 用户的高效助手，它通过内置独立收件箱，解决了 AI 对话碎片化、任务难以追踪的问题。用户可以在统一界面中管理所有 AI 交互、归档关键信息，并像处理邮件一样安排后续操作，从而提升工作流的连贯性与可控性。"},{"rank":13,"name":"22. Reignat","zhName":"Reignat","url":"https://www.producthunt.com/products/reignat","desc":"Privacy-friendly web analytics with realtime AI insights","zhDesc":"Privacy-friendly web analytics with realtime AI insights","tags":[],"upvotes":null,"icon":null,"zhDetail":"Reignat 是一款注重隐私的网站分析工具，面向希望在不侵犯用户数据的前提下获取网站流量洞察的站长和营销人员。它通过实时 AI 分析，帮助用户理解访客行为、优化内容策略，同时确保数据采集符合隐私法规要求。"},{"rank":14,"name":"3. Kobbe","zhName":"Kobbe","url":"https://www.producthunt.com/products/kobbe","desc":"Privacy-friendly web analytics with traffic and revenue.","zhDesc":"Privacy-friendly web analytics with traffic and revenue.","tags":[],"upvotes":null,"icon":null,"zhDetail":"Kobbe 是一款注重隐私的网站分析工具，专为希望了解流量和收入数据但又不想牺牲用户隐私的网站运营者设计。它通过不依赖 Cookie 或个人信息追踪的方式，提供流量来源、页面表现和收入关联分析，帮助你在合规前提下做出数据驱动的决策。"},{"rank":15,"name":"4. BaseRT","zhName":"BaseRT","url":"https://www.producthunt.com/products/basert","desc":"6.4x faster than llama.cpp, 3.9x faster than MLX","zhDesc":"6.4x faster than llama.cpp, 3.9x faster than MLX","tags":[],"upvotes":null,"icon":null,"detail":"curious how much of this gain is specific to M5's tensor cores vs the general Metal 4 tensor API. I'm running an M4 Pro, plenty of people doing local inference haven't upgraded yet - does BaseRT still beat llama.cpp/MLX meaningfully on M4, just with a smaller multiplier, or is most of the win locked to the new hardware?","zhDetail":"BaseRT 是一款面向本地大模型推理用户的性能优化工具，主要解决在 M4 及更早芯片上运行模型时效率不足的问题。它通过适配 Metal 4 张量 API 实现加速，即使没有 M5 的专用张量核心，也能在旧硬件上获得比 llama.cpp 和 MLX 更优的推理性能。"},{"rank":16,"name":"1. ClawTeams","zhName":"ClawTeams","url":"https://www.producthunt.com/products/clawteams","desc":"The first goal-driven, proactive AI team for e-commerce","zhDesc":"The first goal-driven, proactive AI team for e-commerce","tags":[],"upvotes":null,"icon":null,"zhDetail":"ClawTeams 是首个面向电商的目标驱动型主动式 AI 团队，帮助电商运营者自动完成从选品、营销到客服的复杂任务。它通过设定业务目标并主动执行，替代传统被动响应的工具，让团队专注于策略决策而非重复操作。"},{"rank":17,"name":"2. Paradigm","zhName":"Paradigm","url":"https://www.producthunt.com/products/paradigm-3","desc":"Turn any goal into a personalized, adaptive learning path.","zhDesc":"Turn any goal into a personalized, adaptive learning path.","tags":[],"upvotes":null,"icon":null,"detail":"Every interaction is graded as it happens, so what you walk away with is **proof of skill, not a transcript.** Anyone can build a course here; ours currently run from \"Speed-run ICS 31\" (UCI's intro programming, crammed) to \"Let's count to 10!\" (pre-K).","zhDetail":"Paradigm 是一款面向学生和自学者的技能认证平台，它通过实时评分每次互动，让用户获得的是能力证明而非传统成绩单。无论是大学编程速成课还是学龄前数数练习，任何人都能在这里创建课程，并立即看到自己的学习成果被量化验证。"},{"rank":18,"name":"3. Pazi","zhName":"Pazi","url":"https://www.producthunt.com/products/pazi","desc":"Vibe code business operations","zhDesc":"Vibe code business operations","tags":[],"upvotes":null,"icon":null,"detail":"Pazi is an AI team for that idea you keep coming back to — a book, a shop, an app, a skill you want to sell. Tell Pazi what you're trying to do and it builds a team of agents around your idea and starts making things happen: a website, first outreach, content, the next step. Every time you come back, something has moved. You stay in control; your team does the rest alongside you, one real step at a time. Like vibe coding but for business operations.","zhDetail":"Pazi 是为那些反复浮现的创意（如写书、开店、开发应用或出售技能）而设的 AI 团队。你只需告诉它你想做什么，它就会围绕你的想法组建一支智能体团队，自动推进网站搭建、首次客户触达、内容生成等下一步行动。每次你回来，事情都已向前推进，你始终掌控方向，团队则与你并肩一步步落实，堪称“氛围编程”在商业运营上的翻版。"},{"rank":19,"name":"4. V2Fun","zhName":"V2Fun","url":"https://www.producthunt.com/products/v2fun","desc":"Generate 3D character with 8K textures and AI motion capture","zhDesc":"Generate 3D character with 8K textures and AI motion capture","tags":[],"upvotes":null,"icon":null,"zhDetail":"V2Fun 面向游戏开发者、3D 创作者和动画师，帮助他们快速生成带有8K纹理的高质量3D角色，并通过AI动作捕捉技术驱动角色动画，大幅简化从建模到动作制作的全流程。"},{"rank":20,"name":"5. AgentKey","zhName":"AgentKey","url":"https://www.producthunt.com/products/agentkey","desc":"One-stop live data marketplace for your agent","zhDesc":"One-stop live data marketplace for your agent","tags":[],"upvotes":null,"icon":null,"zhDetail":"AgentKey 是一个面向 AI 代理的一站式实时数据市场，帮助开发者快速为智能体接入高质量、动态更新的外部数据源，解决代理因数据滞后或缺失导致的决策不准确问题。通过统一的接口和即用即付模式，用户无需自建数据管道即可让代理实时获取所需信息。"}],"weekly":[{"rank":1,"name":"ClawTeams","zhName":"ClawTeams","url":"https://www.producthunt.com/products/clawteams","desc":"The first goal-driven, proactive AI team for e-commerce","zhDesc":"The first goal-driven, proactive AI team for e-commerce","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/8cf8434d-e4fd-48c3-8654-af7f9e5bc2d5.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"ClawTeams 是首个面向电商的目标驱动型主动式AI团队，帮助电商运营者自动完成从策略制定到执行监控的全流程任务。它通过理解业务目标并主动协调多个AI角色协同工作，解决了传统电商团队人力成本高、响应慢、决策分散的问题。"},{"rank":2,"name":"Paradigm","zhName":"Paradigm","url":"https://www.producthunt.com/products/paradigm-3","desc":"Turn any goal into a personalized, adaptive learning path.","zhDesc":"Turn any goal into a personalized, adaptive learning path.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/7c1bc3e9-098d-4b10-9e5b-704460691d83.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"Paradigm 是一款面向终身学习者和自我提升者的智能学习规划工具，能将任何目标转化为个性化、动态调整的学习路径。它通过分析用户的目标与进度，自动生成并优化学习计划，帮助用户摆脱盲目摸索，高效达成学习或技能提升目标。"},{"rank":3,"name":"Pazi","zhName":"Pazi","url":"https://www.producthunt.com/products/pazi","desc":"Vibe code business operations","zhDesc":"Vibe code business operations","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0cc238aa-08c3-4d44-a509-0289f8806019.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"Pazi 是一款面向企业运营团队的 AI 工具，帮助用户通过“氛围编码”的方式快速搭建和自动化业务流程，无需编写复杂代码即可提升运营效率。"},{"rank":4,"name":"V2Fun","zhName":"V2Fun","url":"https://www.producthunt.com/products/v2fun","desc":"Generate 3D character with 8K textures and AI motion capture","zhDesc":"Generate 3D character with 8K textures and AI motion capture","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/1ae953dd-1691-4d3d-8eed-f970b24c8131.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"V2Fun is an AI 3D creation platform built with self-developed 3D modeling and AI motion capture models. It helps creators turn images, prompts, and videos into high-quality 3D models, enhance assets with advanced 8K texture generation, and create motion-ready characters without switching between separate modeling, texturing, and mocap tools. V2Fun also supports image generation through models including Nano Banana and others, so creators can explore visual concepts and bring them into 3D faster.","zhDetail":"V2Fun 是一款基于自研3D建模与AI动作捕捉模型的AI 3D创作平台，帮助创作者将图片、文字提示和视频快速转化为高质量3D模型，并支持8K纹理生成与角色动作绑定。它集建模、贴图、动捕于一体，无需在多个工具间切换，同时内置Nano Banana等模型支持图像生成，让创作者能更快地将视觉概念带入3D世界。"},{"rank":5,"name":"AgentKey","zhName":"AgentKey","url":"https://www.producthunt.com/products/agentkey","desc":"One-stop live data marketplace for your agent","zhDesc":"One-stop live data marketplace for your agent","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/32195c39-aa7c-4a77-ab44-99d4b66f866e.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Per-provider override is the right call - keeping routing and failover while letting me bring a key for the providers I already pay for is the best of both. Two things I would want to know before wiring it in: if my own key hits a rate limit or 5xx, does failover fall back to the hosted pool for that provider automatically, or does a BYO provider opt out of the pool entirely? And does spend on my own key still surface in the same unified usage view, or split into separate billing I have to reconcile myself?","zhD let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
