<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月14日</span>
        <span class="updated">更新于 10:06</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-15","updatedAt":"10:06","yesterday":[{"rank":1,"name":"ClawTeams","zhName":"ClawTeams","url":"https://www.producthunt.com/products/clawteams","desc":"The first goal-driven, proactive AI team for e-commerce","zhDesc":"The first goal-driven, proactive AI team for e-commerce","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/8cf8434d-e4fd-48c3-8654-af7f9e5bc2d5.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"ClawTeams is an AI employee platform for e-commerce sellers. Instead of hiring specialists—or doing everything yourself—you get a coordinated AI team that thinks, plans, and executes like real employees. One goal. One team. Zero micromanagement. Tell your team lead what you want—\"Increase Q4 revenue by 20%\"—and they break it down, assign specialists, and run the plan. You get updates in Slack or Discord. High-stakes decisions wait for your approval. Everything else just happens.","zhDetail":"ClawTeams 是一款面向电商卖家的 AI 员工平台。你无需雇佣专家或亲力亲为，就能获得一支像真实员工一样思考、规划并执行任务的 AI 团队。只需向团队负责人下达目标（如“Q4 营收增长 20%”），系统便会自动拆解任务、分配专业角色并推进执行，通过 Slack 或 Discord 汇报进展，关键决策等待你批准，其余工作自动完成。"},{"rank":2,"name":"Pazi","zhName":"Pazi","url":"https://www.producthunt.com/products/pazi","desc":"Vibe code business operations","zhDesc":"Vibe code business operations","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0cc238aa-08c3-4d44-a509-0289f8806019.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Pazi is an AI team for that idea you keep coming back to — a book, a shop, an app, a skill you want to sell. Tell Pazi what you're trying to do and it builds a team of agents around your idea and starts making things happen: a website, first outreach, content, the next step. Every time you come back, something has moved. You stay in control; your team does the rest alongside you, one real step at a time. Like vibe coding but for business operations.","zhDetail":"Pazi 是为那些反复萦绕在你脑海中的创意——一本书、一家店、一个应用、一项想出售的技能——而生的 AI 团队。你只需告诉 Pazi 你想做什么，它就会围绕你的想法组建一支智能体团队，自动推进网站搭建、首次对外联络、内容创作等下一步行动。每次你回来查看，事情都已向前推进；你始终掌握控制权，而你的 AI 团队则与你并肩作战，一步一个脚印地落实执行——就像“氛围编程”之于商业运营。"},{"rank":4,"name":"PgDog","zhName":"PgDog","url":"https://www.producthunt.com/products/pgdog","desc":"Scale PostgreSQL without changing your app","zhDesc":"Scale PostgreSQL without changing your app","tags":[],"upvotes":null,"icon":null,"detail":"The \"scale Postgres without changing your app\" framing is the part that matters for teams that can't stop to re-architect — connection pooling plus transparent routing means the app stays naive. My one question as I'd drop this in front of an existing service: how does PgDog handle a single transaction that touches rows on multiple shards — does it coordinate the cross-shard write, or is keeping a transaction inside one shard still the app's job? Curious where the sharding proxy's transparency stops.","zhDetail":"PgDog 是一款面向无法停下重构脚步的团队的 PostgreSQL 扩展工具。它通过连接池与透明路由机制，让应用无需修改代码即可实现数据库的水平扩展。对于跨分片事务，PgDog 仍要求应用自行确保事务不跨分片，其分片代理的透明性在跨分片写入处止步。"},{"rank":6,"name":"Portero","zhName":"Portero","url":"https://www.producthunt.com/products/portero","desc":"Know exactly what's running on every port of your Mac","zhDesc":"Know exactly what's running on every port of your Mac","tags":[],"upvotes":null,"icon":null,"detail":"the plain-english translation is the actual feature here, lsof telling you 'node' on port 3000 is technically correct and completely useless. one thing I didn't see mentioned - does it handle docker-proxy processes sanely? that's usually where this kind of tool falls apart for me, a container's port mapping shows up as some generic docker-proxy pid and you're back to guessing which compose project it belongs to","zhDetail":"Portero 是一款面向开发者的端口管理工具，解决了传统 `lsof` 命令输出信息晦涩难懂、无法快速定位具体进程或容器归属的问题。它通过将底层技术信息翻译为自然语言描述，并智能识别 Docker 代理进程，让你一眼就能知道哪个端口被哪个项目或容器占用。"},{"rank":8,"name":"Branda","zhName":"Branda","url":"https://www.producthunt.com/products/branda-open-source-on-brand-ad-maker","desc":"Turn any domain into on-brand ads, MIT Open Source","zhDesc":"Turn any domain into on-brand ads, MIT Open Source","tags":[],"upvotes":null,"icon":null,"detail":"Branda turns any website URL into scroll-stopping, on-brand ads in seconds. Paste a link and Branda pulls the brand's real logo, colors, and campaign imagery via Context.dev's Brand API, reads the homepage so the copy sounds like the brand, and generates ready-to-ship creatives for LinkedIn and X. No login, no design skills, no assets to upload. Open-source and self-hostable.","zhDetail":"Branda 是一款面向营销人员、创业者和小型企业主的广告创意生成工具。只需粘贴一个网站链接，它就能自动提取品牌真实 Logo、配色和宣传图片，并读取首页内容生成符合品牌语气的文案，在几秒内输出可直接用于 LinkedIn 和 X 平台的广告素材。无需登录、无需设计技能或上传任何素材，开源且支持自部署。"},{"rank":9,"name":"BugShot","zhName":"BugShot","url":"https://www.producthunt.com/products/bugshot-3","desc":"Discover, fix, capture, and report bugs in one shot","zhDesc":"Discover, fix, capture, and report bugs in one shot","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/eb6c8d05-b1a9-494e-a8f5-9374b268986b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"I'm a product designer. My job is to notice when something is four pixels off — and then the hard part starts, because I have to describe it. I'd screenshot the bug, type \"the spacing looks off here\" into a ticket, and a developer would have to guess which property I meant. The rest of the report was clerical work: reproduce it, copy the URL and the browser version, dig through the console, paste it all into a tracker. By the time you're done you've forgotten what you were actually working on.","zhDetail":"BugShot 是一款专为产品设计师和开发者打造的 bug 报告工具，解决了传统 bug 提报流程中描述不清、信息零散、耗时繁琐的问题。它通过一键截图并自动捕获页面 URL、浏览器版本、控制台日志等上下文信息，让设计师能精准标注问题位置，开发者无需猜测即可快速复现和修复。"},{"rank":12,"name":"Flyout","zhName":"Flyout","url":"https://www.producthunt.com/products/flyout","desc":"Rich-text notes that fly out from your Mac's screen edge","zhDesc":"Rich-text notes that fly out from your Mac's screen edge","tags":[],"upvotes":null,"icon":null,"detail":"Nudge your screen edge — or press ⌥⌘N — and a full rich-text editor flies out over whatever you're doing. Checklists, reminders, folders, images, code blocks, iCloud sync. Native macOS, not Electron. Lifetime license, 7-day free trial. Every note is plain Markdown underneath. Your notes never touch our servers.","zhDetail":"Flyout 是一款专为 macOS 用户设计的轻量级笔记工具，让你在任意工作界面下通过屏幕边缘滑动或快捷键 ⌥⌘N 快速唤出一个全功能富文本编辑器。它支持清单、提醒、文件夹、图片、代码块和 iCloud 同步，所有笔记底层均以纯 Markdown 格式存储，且数据完全保存在本地，不会上传至服务器。采用原生 macOS 开发而非 Electron，提供终身授权和 7 天免费试用。"},{"rank":13,"name":"Breva","zhName":"Breva","url":"https://www.producthunt.com/products/breva","desc":"Turn your Mac trackpad into a gentle breathing guide","zhDesc":"Turn your Mac trackpad into a gentle breathing guide","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2b2ac7a9-af3e-4c93-b299-9c75f6bce3e1.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"the haptic tap idea is genuinely clever, using hardware that's already there instead of another screen to stare at. curious about interruptions though - if a Slack ping or calendar alert fires mid-session does the orb just keep going underneath it, or does it pause/reset? the whole point of a reset break is not getting yanked back into work mid-breath, so how it handles that matters more than the pattern selection imo.","zhDetail":"Breva 是一款为需要定时休息的办公人群设计的触觉提醒设备。它利用已有的硬件（而非额外屏幕）通过振动提示用户起身活动，解决久坐工作带来的健康隐患。设备内置的触觉球会在休息时段持续提醒，但如何优雅处理中途被Slack消息或日历提醒打断的场景，仍是决定其实际体验的关键。"},{"rank":14,"name":"VocalVia","zhName":"VocalVia","url":"https://www.producthunt.com/products/vocalvia","desc":"Turn documents and articles into editable multi-voice audio","zhDesc":"Turn documents and articles into editable multi-voice audio","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/a24fc092-7a1b-40de-8d1d-869541285ef3.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"VocalVia turns PDFs, Word files, Markdown, web articles, and pasted text into structured outlines, editable podcast scripts, and natural multi-voice audio. Choose speakers and voices, refine individual segments, then export the finished audio. It is built for saved reading, study notes, research papers, and long-form content you want to listen to away from a screen.","zhDetail":"VocalVia 专为希望将阅读材料转为可听内容的用户设计，它能将 PDF、Word、Markdown、网页文章及粘贴文本自动转化为结构化大纲、可编辑的播客脚本，并生成自然的多人语音音频。用户可自由选择说话人和声音、逐段精调内容，最终导出成品音频，适合保存阅读、学习笔记、研究论文及长篇内容在脱离屏幕时收听。"},{"rank":17,"name":"Altersend","zhName":"Altersend","url":"https://www.producthunt.com/products/altersend","desc":"File transfer with no cloud storage, no account, no limits","zhDesc":"File transfer with no cloud storage, no account, no limits","tags":[],"upvotes":null,"icon":null,"detail":"the \"your files never touch the cloud\" pitch is solid on paper but real P2P is never that clean once both sides are behind restrictive NAT/CGNAT - like on separate corporate wifis. what happens then, does it fall back to a relay server (still E2EE, just not direct), or does the transfer just fail and you're back to a USB drive?","zhDetail":"Altersend 是一款面向需要安全文件传输的用户（如企业员工、远程协作者）的点对点（P2P）文件分享工具。它解决了双方都处于严格NAT/CGNAT（如公司WiFi）环境下，传统P2P传输容易失败的问题——当无法建立直连时，会自动回退到端到端加密的中继服务器，确保文件仍能安全送达，避免用户被迫回到U盘拷贝的原始方式。"}],"today":[{"rank":1,"name":"V2Fun","zhName":"V2Fun","url":"https://www.producthunt.com/products/v2fun","desc":"Generate 3D character with 8K textures and AI motion capture","zhDesc":"Generate 3D character with 8K textures and AI motion capture","tags":[],"upvotes":null,"icon":null,"detail":"V2Fun is an AI 3D creation platform built with self-developed 3D modeling and AI motion capture models. It helps creators turn images, prompts, and videos into high-quality 3D models, enhance assets with advanced 8K texture generation, and create motion-ready characters without switching between separate modeling, texturing, and mocap tools. V2Fun also supports image generation through models including Nano Banana and others, so creators can explore visual concepts and bring them into 3D faster.","zhDetail":"V2Fun 是一款基于自研3D建模与AI动作捕捉模型的AI 3D创作平台，帮助创作者将图片、文字提示和视频快速转化为高质量3D模型，并支持8K纹理生成和动作绑定。它集建模、贴图、动捕于一体，无需在多个工具间切换，即可让角色“动起来”。此外，V2Fun还内置Nano Banana等图像生成模型，方便创作者探索视觉概念并快速带入3D流程。"},{"rank":2,"name":"Campus","zhName":"Campus","url":"https://www.producthunt.com/products/flutterflow","desc":"One project space for humans and AI agents","zhDesc":"One project space for humans and AI agents","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/f00d0948-3886-474b-870c-48e89e8b2fb3.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Campus gives builders a shared space to build with teammates and AI agents. Keep your repo, terminal, project knowledge, conversations, and agent work together in one persistent workspace, instead of scattering context across Slack threads, docs, tickets, canvases, and one-off AI chats. Campus is organized around the thing you are building, so humans and agents can pick up where the work left off.","zhDetail":"Campus 为开发者和团队提供了一个与队友及 AI 智能体共同构建的共享空间。它将代码仓库、终端、项目知识、对话和智能体工作整合在一个持久化工作区中，避免上下文散落在 Slack 聊天、文档、工单、画布和零散的 AI 对话里。围绕你正在构建的项目组织一切，让人类和智能体都能无缝接续工作。"},{"rank":3,"name":"RecordMeeting","zhName":"RecordMeeting","url":"https://www.producthunt.com/products/recordmeeting","desc":"Record and transcribe Google Meet calls in one click","zhDesc":"Record and transcribe Google Meet calls in one click","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/43d81b34-2c68-4a0b-a736-17085b4ccdaf.jpeg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Hey Product Hunt! Nathan here, founder of Qualtir. We built Record Meeting because most AI notetakers still send a bot into your call. That awkward \"Notetaker has joined\" moment kills the vibe on sales calls, interviews, and internal meetings. Record Meeting works differently. One click inside Google Meet. No bot joins the room. Full video, transcript, and AI summary after the call. Free tier gives you 20 recordings to try on real meetings. I'd love your feedback. What meeting would you record first? Sales, hiring, or internal sync?","zhDetail":"RecordMeeting 是一款专为 Google Meet 用户设计的会议录制工具，解决了传统 AI 笔记助手以“机器人”身份加入会议带来的尴尬和干扰问题。用户只需一键点击即可录制完整视频、生成文字记录和 AI 摘要，无需任何机器人进入会议室，特别适合销售通话、面试和内部同步会议。免费版提供 20 次录制机会，让用户在实际会议中直接体验。"},{"rank":4,"name":"Agently","zhName":"Agently","url":"https://www.producthunt.com/products/agently","desc":"Your whole stack, running itself!","zhDesc":"Your whole stack, running itself!","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2c44dbb7-be3c-432f-9138-d2931d70132d.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Every other tool answers, retrieves, or runs brittle rules. Agently holds your whole company in context and does the work. 100+ connectors flow into one brain that never forgets. It links a Stripe event to a Slack thread to a Linear ticket on its own. When something needs doing, Jarvis routes it to an agent that runs it end to end: triggered, running, shipped. The work lands without you, nothing falls through the cracks. Connecting takes minutes. The layer between today's AI and tomorrow's AGI.","zhDetail":"Agently 是一款面向企业的智能工作流引擎，旨在解决跨工具协作中信息碎片化、任务遗漏和流程断裂的问题。它通过连接超过100个应用（如 Stripe、Slack、Linear），将整个公司的上下文整合到一个永不遗忘的“大脑”中，自动将事件关联并路由给对应智能体，实现从触发到交付的端到端自动化执行。"},{"rank":5,"name":"Copresent","zhName":"Copresent","url":"https://www.producthunt.com/products/co-present","desc":"Turn your phone into a Google Slides remote","zhDesc":"Turn your phone into a Google Slides remote","tags":[],"upvotes":null,"icon":null,"detail":"this is one of those tools that solves a problem so small everyone just lives with it instead of fixing it, fumbling for the trackpad or asking someone to advance slides for you. the co-present with a shared link and no account for guests is the actually useful part for panel talks or interviews where two people are driving the same deck. does the notes view stay in sync if the presenter jumps around out of order, or does it assume a linear walkthrough?","zhDetail":"Copresent 是一款专为多人协作演示场景设计的工具，主要面向需要共同控制同一份演示文稿的演讲者、访谈嘉宾或小组讨论成员。它解决了传统演示中两人轮流翻页时手忙脚乱、需要他人帮忙操作或依赖共享屏幕的痛点。通过生成共享链接，无需观众注册账号即可让多位演示者同步控制幻灯片翻页，并支持笔记视图随演示顺序自动同步，确保即使跳页也能保持内容一致。"},{"rank":6,"name":"Blocks.ai","zhName":"Blocks.ai","url":"https://www.producthunt.com/products/blocks-ai","desc":"The Control Plane & Network Layer For AI Agents","zhDesc":"The Control Plane & Network Layer For AI Agents","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/fe0db8e1-735d-44b6-9473-d3472d8ee239.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"PubNub introduces Blocks.ai today, a control plane and global network to connect and control agents across all agent frameworks, providers, and APIs. Blocks Network supports all AI agent use cases without opening inbound ports, setting up tunnels, changing DNS, or modifying firewall rules. For more than a decade, PubNub has been the infrastructure and platform for real-time connectivity supporting billions of devices, now, PubNub delivers Blocks Network connecting the Internet of Agents.","zhDetail":"Blocks.ai 是面向AI智能体开发者的全球控制平面与网络，旨在解决跨不同智能体框架、服务商和API的连接与控制难题。它无需开放入站端口、配置隧道、修改DNS或防火墙规则，即可支持所有AI智能体应用场景。基于PubNub十余年的实时连接基础设施，Blocks Network为“智能体互联网”提供安全高效的互联能力。"},{"rank":7,"name":"nudge2.0","zhName":"nudge2.0","url":"https://www.producthunt.com/products/nudge-26","desc":"AI schedules your whole week to take action","zhDesc":"AI schedules your whole week to take action","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/01198a53-19e9-494e-a5e9-c0fe0f0e2ec3.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Don't manage. Just do. nudge plans your week so you don't have to - Don't create. Type plain text — AI turns it into real tasks with deadlines. - Don't plan your day. One click, AI schedules around sleep, meals, and fixed events. - Don't let yourself off. Lock $5 on a deadline. Finish and prove it — you pay nothing. - Don't switch apps. Capture and reschedule from Slack & Discord. - Don't get lost. One workspace. $5 first month, then $20/mo. Solo-built by a 20yo engineering student in Tokyo.","zhDetail":"nudge2.0 是一款面向忙碌个人与团队的任务规划工具，帮助用户摆脱繁琐的手动管理，专注于执行。用户只需输入纯文本，AI 即可自动生成带截止日期的任务；一键点击，AI 还能根据睡眠、用餐和固定事件自动排程日程。此外，它支持从 Slack 和 Discord 直接捕捉与调整任务，并通过押金机制（如锁定 5 美元）激励用户按时完成目标。"},{"rank":8,"name":"Keepresso","zhName":"Keepresso","url":"https://www.producthunt.com/products/keepresso","desc":"Keep your Mac awake, on your terms. Free and open source","zhDesc":"Keep your Mac awake, on your terms. Free and open source","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/d87bdd69-203b-466c-bc2d-7d0d9d5ef2ed.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"What I really wanted was simple to say and surprisingly hard to find. I wanted to close my laptop in the middle of any work, keep it running even on battery with no cable attached, and have the screen stay off inside the closed lid so nothing sat there lit in my bag. And I wanted it to be smart about the other direction too, so that once the job actually finished, the Mac was allowed to sleep instead of burning power all night.","zhDetail":"Keepresso 是一款专为 Mac 用户设计的实用工具，解决了合盖后电脑无法持续运行或屏幕仍亮着的问题。它能让你的 Mac 在合盖且不接电源的情况下继续执行任务，同时自动关闭屏幕以节省电量，并在任务完成后智能进入休眠状态，避免整夜耗电。"},{"rank":9,"name":"DeskMat 1.3","zhName":"DeskMat 1.3","url":"https://www.producthunt.com/products/deskmat-for-mac","desc":"Now hide individual files + folders for more private desktop","zhDesc":"Now hide individual files + folders for more private desktop","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/9f53b8be-8654-4b47-a2b9-db4d00aea61c.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"➡️ For a short time, [get 25% off DeskMat for Mac on my web store](https://eternalstorms.at/store/p_checkoutPreflight?productID=pri_01jn3pgbnte5t61sycmx53n0z9&discountCode=DESKMATHUNT726)! (or try it for free for 28 days; download on the [website](https://eternalstorms.at/DeskMat))","zhDetail":"DeskMat 是一款专为 Mac 用户设计的桌面整理工具，帮助解决文件、窗口和图标杂乱无章的问题。它通过智能布局和快捷操作，让用户能快速整理桌面、分组文件并保持工作区整洁有序。"},{"rank":10,"name":"YAGNI","zhName":"YAGNI","url":"https://www.producthunt.com/products/yagni","desc":"Proactive agent teams you manage like humans","zhDesc":"Proactive agent teams you manage like humans","tags":[],"upvotes":null,"icon":null,"detail":"AI changed my own output more than any tool ever has. But it brought the trust problem back in a new form. More output means a worse signal-to-noise ratio, and the moment you try to put agents to work _inside_ a business you hit a wall: where do you even start? Every tool assumes you'll be directive. Either you prompt each task (\"do this thing\"), or you wire up an if-this-then-that graph and hope you predicted the work correctly. That's not how anyone actually runs a team.","zhDetail":"YAGNI 是一款面向团队管理者的 AI 协作工具，解决了 AI 输出增多导致信噪比下降、以及现有工具无法像真实团队那样灵活协作的问题。它不再要求你逐条下达指令或预设固定流程，而是让 AI 像团队成员一样自主理解任务上下文、主动推进工作，从而真正融入实际业务运作。"},{"rank":11,"name":"CodeNearby 2.0","zhName":"CodeNearby 2.0","url":"https://www.producthunt.com/products/codenearby","desc":"Tinder for developers! Find coding partners & build together","zhDesc":"Tinder for developers! Find coding partners & build together","tags":[],"upvotes":null,"icon":null,"zhDetail":"CodeNearby 2.0 是一款面向开发者的编程伙伴匹配工具，旨在解决独自编码时缺乏协作与交流的问题。它像“程序员版 Tinder”一样，通过智能匹配算法帮助开发者找到志同道合的编程伙伴，从而更高效地一起构建项目。"},{"rank":12,"name":"EQK","zhName":"EQK","url":"https://www.producthunt.com/products/eqk-eq-with-ai","desc":"Mac app with dynamic AI EQ","zhDesc":"Mac app with dynamic AI EQ","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/375cae77-5174-4143-b150-4387bf1fb876.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"EQK is the firs const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
</body>
