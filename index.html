<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月12日</span>
        <span class="updated">更新于 16:19</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-13","updatedAt":"16:19","yesterday":[{"rank":1,"name":"Miora","zhName":"Miora","url":"https://www.producthunt.com/products/miora-2","desc":"Scale your creativity on editable canvas with agent memory","zhDesc":"Scale your creativity on editable canvas with agent memory","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/eecc5bf5-4f75-442b-9030-aca7cb7d770b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Memory is the part we most want to dig into. As you work, Miora quietly remembers your style and each project's rules, and it's no black box: you can view, edit and add to any of it. So the first brief generates; every one after is continuous creation built on your context. The deeper you go, the more it gets you.","zhDetail":"Miora 是一款面向创意工作者和内容创作者的智能记忆助手，它能在你工作时默默记住你的风格和每个项目的规则，并让你随时查看、编辑和补充这些记忆。通过持续积累上下文，Miora 让每一次创作都建立在已有基础上，从第一份初稿到后续迭代，越用越懂你。"},{"rank":2,"name":"JustVibe","zhName":"JustVibe","url":"https://www.producthunt.com/products/justvibe","desc":"The search engine for doing, with apps built for you","zhDesc":"The search engine for doing, with apps built for you","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/d188283d-ca82-4a07-90ae-122af14bf13d.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"JustVibe is a free search engine, built to help get things done. Search \"plan my 5 day trip to tokyo\" and instantly receive a fully functional and interactive trip planner, perfectly set up for Tokyo and running directly in your browser. If your perfect app doesn't exist yet, JustVibe builds a custom one for your exact needs in minutes. Every app is yours to keep forever, with zero code. Chat to customize every detail and share your new app with a single link.","zhDetail":"JustVibe 是一款免费搜索引擎，专为帮你快速完成任务而设计。只需搜索“规划我的5天东京之旅”，就能立即获得一个功能完整、可交互的行程规划器，直接在浏览器中运行。如果理想的应用程序还不存在，JustVibe 能在几分钟内为你量身定制一个，无需任何代码，永久归你所有，还能通过聊天调整细节并一键分享。"},{"rank":3,"name":"FetchSandbox","zhName":"FetchSandbox","url":"https://www.producthunt.com/products/fetchsandbox","desc":"API integration testing that remembers what breaks","zhDesc":"API integration testing that remembers what breaks","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/f7b32fa6-6bf4-46f8-8a99-84b4559d37b4.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"the failure-library angle is interesting but the thing I'd want proven before trusting it: who keeps the simulated failure behavior itself honest against the real API over time? stripe changes retry semantics or adds a new webhook edge case, and if fetchsandbox's simulation of that api lags the real one, you get a false sense of security - green in the sandbox, still breaks in prod, just a different flavor of the same problem you're trying to solve. is that drift something you actively monitor per-API, or does it rely on someone reporting a mismatch?","zhDetail":"FetchSandbox 是一款面向开发者的 API 模拟测试工具，旨在解决在沙箱环境中模拟真实 API 行为时出现的“模拟漂移”问题——即模拟行为与真实 API 随时间变化不一致，导致开发者在沙箱中测试通过后，生产环境仍可能出错。它通过持续监控和更新每个 API 的模拟行为，确保模拟结果与真实接口保持同步，从而避免因模拟滞后带来的虚假安全感。"},{"rank":4,"name":"Second Brain for AI v2","zhName":"Second Brain for AI v2","url":"https://www.producthunt.com/products/second-brain-cloudflare","desc":"AI memory that connects the dots across every tool","zhDesc":"AI memory that connects the dots across every tool","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/a258efad-8dea-4ed3-b1bb-169089817168.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Every AI conversation starts from zero. Your projects, decisions, and preferences disappear as soon as you close the chat. Second Brain fixes that. It is a self-hosted memory layer that works with Claude, ChatGPT, Cursor, and any MCP client. You can store context once and recall it by meaning instead of keywords. It includes duplicate detection, semantic search, and a web UI. Built on Cloudflare, it offers a free tier and your data remains yours. MIT licensed.","zhDetail":"Second Brain for AI v2 是一款面向重度 AI 用户的自托管记忆层工具，解决了每次对话都从零开始、项目与偏好随聊天关闭而丢失的问题。它通过语义搜索、去重检测和网页界面，让你在 Claude、ChatGPT、Cursor 等 MCP 客户端中一次性存储上下文，并凭含义而非关键词随时召回。基于 Cloudflare 构建，提供免费套餐，数据完全由你掌控，且采用 MIT 开源许可。"},{"rank":5,"name":"ServiceBeard","zhName":"ServiceBeard","url":"https://www.producthunt.com/products/servicebeard","desc":"Sync your mailbox with your issue tracker","zhDesc":"Sync your mailbox with your issue tracker","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/4e9cb3ca-eefb-4a98-bcb1-efa079463813.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Turn your customer-facing mailbox into an issue board. ServiceBeard syncs your emails directly to your issue tracker, letting you run a full service desk from your existing workspace. You can leverage the automation pipelines you’ve already set up without investing in expensive, per-seat helpdesk software. It's open-source, connects via standard IMAP/SMTP, and currently supports GitHub, GitLab, and Linear.","zhDetail":"ServiceBeard 是一款面向技术团队的开源工具，能将客服邮箱直接同步到问题追踪系统（如 GitHub、GitLab、Linear），让你在现有工作空间里运行完整的服务台。它无需购买昂贵的按席位收费的客服软件，而是利用你已有的自动化流程，通过标准 IMAP/SMTP 协议实现邮件与工单的无缝转换。"}],"today":[{"rank":1,"name":"Loomal","zhName":"Loomal","url":"https://www.producthunt.com/products/loomal","desc":"Monetize any MCP server in 5 minutes with no % skim.","zhDesc":"Monetize any MCP server in 5 minutes with no % skim.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ca686089-081d-4f06-b748-0ab9c0728486.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Loomal lets you charge for what you sell online — API calls, tools, digital products, or your whole store. One line of code (or a Shopify/WooCommerce plugin) adds an agent-ready paywall: AI agents pay you in USDC, settled in about 2 seconds, and you keep 100% of your revenue — no percentage cut, ever. Free to start, no card; flat monthly plans as you grow. Every paid listing appears on the Loomal Index, where agents discover and pay. Launch offer: first 500 sellers get 1,000 transactions free.","zhDetail":"Loomal 让在线销售变得简单——无论是 API 调用、工具、数字产品还是整个店铺，只需一行代码或安装 Shopify/WooCommerce 插件，就能添加一个支持 AI 代理的支付墙。AI 代理以 USDC 支付，约 2 秒完成结算，且你保留 100% 的收入，平台不抽成。面向开发者、数字产品卖家及电商店主，免费起步，无需绑定银行卡，随着业务增长提供固定月费套餐。"},{"rank":2,"name":"UnitPay","zhName":"UnitPay","url":"https://www.producthunt.com/products/unitpay","desc":"Price, bill, and prove value for your AI product","zhDesc":"Price, bill, and prove value for your AI product","tags":[],"upvotes":null,"icon":null,"detail":"UnitPay is the monetization OS for AI companies. Design pricing, run usage-based billing, track inference costs and margins in real time, and show every customer the value they're actually getting — all in one system. Built ground-up for AI-native products: credits, hybrid pricing, per-token metering, cost tracking. Free until you hit $500K ARR.","zhDetail":"UnitPay 是为AI公司打造的一站式商业化操作系统，帮助它们设计定价策略、运行基于用量的计费系统，并实时追踪推理成本和利润率。通过支持积分、混合定价、按Token计量和成本追踪等功能，让AI原生产品能清晰向每位客户展示其实际获得的价值。在年经常性收入达到50万美元前可免费使用。"},{"rank":3,"name":"Osaurus","zhName":"Osaurus","url":"https://www.producthunt.com/products/osaurus","desc":"Open source agents that run 100% locally on your Mac","zhDesc":"Open source agents that run 100% locally on your Mac","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c784cd19-34af-4e58-bca7-584c59e1a47b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"We started as [Dinoki](https://dinoki.ai/), a 5MB desktop dinosaur, and grew into a full agent platform through open source community feedback. Now at **7K+ GitHub stars and 175K+ downloads** — all by word of mouth.","zhDetail":"Osaurus 是一款面向开发者和技术团队的开源智能体平台，旨在解决从简单桌面工具到复杂自动化任务之间的扩展难题。它通过轻量级桌面客户端（仅5MB）起步，并借助社区反馈逐步演化为完整的智能体平台，目前已获得超过7000个GitHub星标和17.5万次下载。"},{"rank":4,"name":"TailMux","zhName":"TailMux","url":"https://www.producthunt.com/products/tailmux","desc":"Multiple Tailscale tailnets at once, no switching + no VM","zhDesc":"Multiple Tailscale tailnets at once, no switching + no VM","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/724918fc-d508-43f9-91c5-5af9c55f124f.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The official Tailscale client keeps one tailnet active at a time. TailMux makes work and personal tailnets reachable simultaneously on macOS and Linux, without switching accounts, running multiple system daemons, or using a VM. It runs an isolated embedded node per profile and routes by hostname, with strict no-fallback isolation. Use SSH, RDP/SMB, browsers, curl, git, and npm across tailnets at the same time.","zhDetail":"TailMux 是一款面向 macOS 和 Linux 用户的网络工具，解决了官方 Tailscale 客户端一次只能连接一个 tailnet 的问题。它允许用户同时访问工作和个人 tailnet，无需切换账号、运行多个系统守护进程或使用虚拟机。通过为每个配置文件运行独立的嵌入式节点，并基于主机名进行路由，TailMux 实现了严格的隔离，让用户能同时跨 tailnet 使用 SSH、RDP/SMB、浏览器、curl、git 和 npm 等工具。"},{"rank":5,"name":"NoMac.app","zhName":"NoMac.app","url":"https://www.producthunt.com/products/nomac","desc":"The headless iOS app publishing pipeline for AI agents.","zhDesc":"The headless iOS app publishing pipeline for AI agents.","tags":[],"upvotes":null,"icon":null,"detail":"Me and my friends moved our whole AI agent setup (Claude Code, Codex, Cursor agents) from my MacBook to a Hetzner box following @levelsio 's tips. Best decision we made, except for one thing: every time we touched a native iOS app, we were back on the Mac. Signing, archiving, uploading to TestFlight, all of it chained to that one laptop.","zhDetail":"专为使用AI开发工具（如Claude Code、Codex、Cursor agents）的开发者设计，解决将开发环境从MacBook迁移到远程服务器后仍需依赖Mac处理iOS原生应用打包、签名、上传TestFlight等流程的痛点。通过提供云端iOS构建与分发服务，让开发者彻底摆脱对本地Mac的依赖，实现全流程远程操作。"},{"rank":6,"name":"Fudge MCP","zhName":"Fudge MCP","url":"https://www.producthunt.com/products/fudge-mcp","desc":"Give your AI agents design taste from existing websites","zhDesc":"Give your AI agents design taste from existing websites","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/aacf5ba5-034e-48f0-9798-7447f0f3570c.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Meet Fudge: a design reference engine for AI agents. Instead of asking AI to make another “modern, premium” interface from scratch, let it search nearly 10,000 real websites by fonts, colors, components, layouts, page types, and visual similarity. Fudge combines measured design evidence with screenshots, runs locally through MCP, and remembers references you save with its Chrome extension. Give your coding agent better taste and not more adjectives.","zhDetail":"Fudge 是一款面向 AI 编程代理的设计参考引擎。它解决了 AI 生成界面时缺乏真实设计依据、只能依赖模糊形容词的问题。通过搜索近万个真实网站，按字体、颜色、组件、布局、页面类型和视觉相似度提供设计参考，并支持本地运行和 Chrome 扩展保存参考，让 AI 代理拥有更好的设计品味。"},{"rank":7,"name":"AgentKey","zhName":"AgentKey","url":"https://www.producthunt.com/products/agentkey","desc":"One-stop live data marketplace for your agent","zhDesc":"One-stop live data marketplace for your agent","tags":[],"upvotes":null,"icon":null,"detail":"AgentKey is a plugin that connects your agent to live external data in one command. Install it into Claude Code, Codex, OpenClaw, or any MCP-based agent and instantly unlock access to search, web pages, social platforms, finance, e-commerce, business and crypto data. No integrations. No setup. Auto failover keeps workflows running.","zhDetail":"AgentKey 是一款面向 AI 代理开发者的插件，只需一条命令即可将你的代理连接到实时外部数据。它支持集成到 Claude Code、Codex、OpenClaw 或任何基于 MCP 的代理中，无需额外集成或配置，即可解锁搜索、网页、社交平台、金融、电商、商业和加密数据，自动故障切换机制确保工作流持续运行。"},{"rank":8,"name":"Playground","zhName":"Playground","url":"https://www.producthunt.com/products/nyx-4","desc":"Earn $100K+ in weekly rewards for hacking AI agents.","zhDesc":"Earn $100K+ in weekly rewards for hacking AI agents.","tags":[],"upvotes":null,"icon":null,"detail":"Every challenge is a live and open-source AI agent guarding a secret - with its system prompt published for you to read. Talk it past its own defenses. Land the most approved breaks in a week and win $100K+ in rewards. Free to play, no account needed. New challenge every Monday.","zhDetail":"Playground 是一个面向安全爱好者和AI挑战者的开源游戏平台，每周发布一个由AI代理守护秘密的实时挑战，系统提示完全公开。玩家需要通过与AI对话突破其防御机制，成功破解最多秘密的用户可赢取超过10万美元的奖励。无需注册即可免费参与，每周一更新新挑战。"},{"rank":9,"name":"1. Miora","zhName":"Miora","url":"https://www.producthunt.com/products/miora-2","desc":"Scale your creativity on editable canvas with agent memory","zhDesc":"Scale your creativity on editable canvas with agent memory","tags":[],"upvotes":null,"icon":null,"detail":"Memory is the part we most want to dig into. As you work, Miora quietly remembers your style and each project's rules, and it's no black box: you can view, edit and add to any of it. So the first brief generates; every one after is continuous creation built on your context. The deeper you go, the more it gets you.","zhDetail":"Miora 是一款面向创意工作者和内容创作者的智能记忆工具，它能默默记住你的工作风格和每个项目的规则，让你不再每次从零开始。与黑箱式 AI 不同，你可以随时查看、编辑和补充它记住的内容，从而让第一版草稿快速生成，后续创作也能基于你的上下文持续演进。使用越深入，它就越懂你。"},{"rank":10,"name":"2. JustVibe","zhName":"JustVibe","url":"https://www.producthunt.com/products/justvibe","desc":"The search engine for doing, with apps built for you","zhDesc":"The search engine for doing, with apps built for you","tags":[],"upvotes":null,"icon":null,"detail":"JustVibe is a free search engine, built to help get things done. Search \"plan my 5 day trip to tokyo\" and instantly receive a fully functional and interactive trip planner, perfectly set up for Tokyo and running directly in your browser. If your perfect app doesn't exist yet, JustVibe builds a custom one for your exact needs in minutes. Every app is yours to keep forever, with zero code. Chat to customize every detail and share your new app with a single link.","zhDetail":"JustVibe 是一款免费的搜索引擎，专为帮你快速完成任务而设计。无论你需要“规划五天东京之旅”，还是其他任何需求，它都能在浏览器中直接生成一个功能完整、可交互的专属应用。无需编写任何代码，你就能永久拥有这个应用，并通过聊天自由定制每个细节，最后用一个链接轻松分享。"},{"rank":11,"name":"1. AnySearch","zhName":"AnySearch","url":"https://www.producthunt.com/products/anysearch","desc":"Real-time structured search trusted by agents and developers","zhDesc":"Real-time structured search trusted by agents and developers","tags":[],"upvotes":null,"icon":null,"zhDetail":"AnySearch 是一款面向 AI 智能体和开发者的实时结构化搜索引擎，帮助用户在海量信息中快速获取精准、可解析的搜索结果。它通过提供实时更新的结构化数据接口，解决了传统搜索返回非结构化内容、难以被程序高效利用的问题。"},{"rank":12,"name":"2. ExploreYC","zhName":"ExploreYC","url":"https://www.producthunt.com/products/yc-company-explorer","desc":"Open-source API for Y Combinator & a16z company data","zhDesc":"Open-source API for Y Combinator & a16z company data","tags":[],"upvotes":null,"icon":null,"detail":"One open-source API for startup data across Y Combinator AND a16z - 6,600+ companies with funding, stage, IPO/M&A exits, and founders. Filter by VC (yc/a16z/all), batch, industry, country, or search. Grab a free API key, read the docs (curl/Node/Python + Swagger), and build in 30 seconds. Plus the full web app: map, analytics, funding data, a live hiring board, and AI tools.","zhDetail":"ExploreYC 是一款面向创业者和投资者的开源API工具，整合了 Y Combinator 和 a16z 旗下超过 6600 家初创公司的融资、阶段、IPO/并购退出及创始人数据。用户可通过风投机构、批次、行业、国家等维度筛选数据，并利用 curl/Node/Python 等接口在 30 秒内快速构建应用，同时提供地图、分析、融资数据、实时招聘看板和 AI 工具等完整网页功能。"},{"rank":13,"name":"4. ChatCut","zhName":"ChatCut","url":"https://www.producthunt.com/products/chatcut-ai-video-editor","desc":"Your AI video editor in ChatGPT, desktop, and web","zhDesc":"Your AI video editor in ChatGPT, desktop, and web","tags":[],"upvotes":null,"icon":null,"detail":"ChatCut is a lightweight, professional-grade AI video editor anyone can use, even without editing experience. It’s like having a personal video editing assistant that understands your footage, intent, and timeline. Make structural edits, fine-tune cuts, add captions, B-roll, music, voiceover, motion graphics, stock footage, and AI-generated video in one place. Every edit stays editable on a real timeline, with XML export when you want to keep working elsewhere.","zhDetail":"ChatCut 是一款轻量级、专 let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

function openRegenModal() { document.getElementById('regenOverlay').classList.add('open'); }
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

render();
</script>
</body>
</html>
