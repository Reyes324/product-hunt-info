<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月16日</span>
        <span class="updated">更新于 10:02</span>

    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-17","updatedAt":"10:02","yesterday":[{"rank":1,"name":"Paradigm","zhName":"Paradigm","url":"https://producthunt.com/products/paradigm-3","desc":"Turn any goal into a personalized, adaptive learning path.","zhDesc":"Turn any goal into a personalized, adaptive learning path.","tags":[],"upvotes":126,"icon":"https://ph-files.imgix.net/7c1bc3e9-098d-4b10-9e5b-704460691d83.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Every interaction is graded as it happens, so what you walk away with is **proof of skill, not a transcript.** Anyone can build a course here; ours currently run from \"Speed-run ICS 31\" (UCI's intro programming, crammed) to \"Let's count to 10!\" (pre-K).","zhDetail":"Paradigm 是一款面向学习者与课程创作者的技能认证平台，它通过实时评分每一次交互，让用户带走的是能力证明而非传统成绩单。无论是大学生速成编程入门，还是学龄前儿童练习数数，任何人都能在这里创建并参与课程，实现从学习到技能验证的无缝衔接。"},{"rank":2,"name":"Zro","zhName":"Zro","url":"https://producthunt.com/products/zro","desc":"Private inference for coding agents","zhDesc":"Private inference for coding agents","tags":[],"upvotes":64,"icon":"https://ph-files.imgix.net/fdeb7f10-d431-4e5f-a031-99486525980a.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Over the last year, we've been obsessed with one problem: making AI inference faster and more efficient. As we worked with developers building AI products, we kept seeing the same tradeoff:","zhDetail":"Zro 是一款面向 AI 开发者的推理加速工具，旨在解决 AI 推理过程中速度与效率难以兼得的常见矛盾。它通过优化底层计算路径和资源调度，帮助开发者在保持模型精度的同时显著提升推理速度，降低延迟与成本。"},{"rank":3,"name":"Albato AI","zhName":"Albato AI","url":"https://producthunt.com/products/albato","desc":"Build AI-driven workflows across 1,000+ apps","zhDesc":"Build AI-driven workflows across 1,000+ apps","tags":[],"upvotes":50,"icon":"https://ph-files.imgix.net/6b6e28df-dccc-494b-b244-fd63226b4bd2.gif?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","detail":"Albato is an AI-powered no-code automation platform that makes app integration and workflow automation seamless. Easily connect 1K+ apps, integrate services via APIs or Webhooks, leverage a user-friendly automation builder, set up workflows by chatting with Copilot, automate complex branching logic with AI Agents using natural language, access powerful data processing tools, and use ready-made templates or create custom shareable models through Solutions. Automate workflows smarter with Albato!","zhDetail":"Albato AI 是一款面向非技术用户的 AI 驱动的无代码自动化平台，帮助用户轻松连接超过1000款应用、集成API或Webhook，实现工作流程自动化。用户可通过对话式Copilot快速设置流程，利用AI Agent以自然语言处理复杂分支逻辑，并借助现成模板或自定义解决方案提升效率。"},{"rank":4,"name":"Codex Micro","zhName":"Codex Micro","url":"https://producthunt.com/products/openai","desc":"Tactile controls for your Codex agents","zhDesc":"Tactile controls for your Codex agents","tags":[],"upvotes":10,"icon":"https://ph-files.imgix.net/4ba36241-ad3f-41da-8fea-0a07ee0f55cc.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Today, I read in the news that OpenAI is considering \"expanding its data footprint\" and possibly buying Pinterest, as there is a lot of data on it just for the sake of users finding inspiration (which can be key for purchase decision making and understanding personas Pinterest has 600M+ users).","zhDetail":"Codex Micro 是一款面向产品经理、营销人员和创业者的用户洞察工具，帮助他们在无需访问海量用户数据的情况下，快速理解目标用户的行为与决策逻辑。通过模拟用户画像和购买决策路径，它让团队能像拥有 Pinterest 级别的用户数据一样，低成本获取精准的用户洞察。"},{"rank":5,"name":"River","zhName":"River","url":"https://producthunt.com/products/river-9","desc":"AI account executives that demo and close B2B deals","zhDesc":"AI account executives that demo and close B2B deals","tags":[],"upvotes":44,"icon":"https://ph-files.imgix.net/4812de77-60d4-48b2-a975-d67b1daab214.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"River enables B2B companies to sell with VoiceAI. When a lead enquires, our AI account executive joins a live call instantly, runs the product demo, handles objections, and closes - so no lead ever waits for a rep's calendar. Backed by founders of Ramp, Kalshi, and Lean.","zhDetail":"River 是一款面向 B2B 企业的 VoiceAI 销售工具。当潜在客户咨询时，AI 销售代表会立即加入实时通话，自动进行产品演示、处理异议并完成成交，从而让客户无需等待人工销售代表的日程安排。"},{"rank":6,"name":"Nitrosend","zhName":"Nitrosend","url":"https://producthunt.com/products/nitrosend","desc":"Email for AI agents. They sign up, send and reply.","zhDesc":"Email for AI agents. They sign up, send and reply.","tags":[],"upvotes":29,"icon":"https://ph-files.imgix.net/7c3c2563-9ec0-4601-af38-5f93591072b4.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The bit I'm proudest of is Agent Inboxes (beta): real addresses for your agents on the domain you own, created BY your agent, like [ernest@yourcompany.com](mailto:ernest@yourcompany.com), [sylvia@yourcompany.com](mailto:sylvia@yourcompany.com). They send, receive and hold 1-1 conversations with your customers, and escalate to a human when it matters. Gmail actively fights this. we built the place where it's native. Because very soon this will be table stakes for your agent, so we're shipping it now.","zhDetail":"Nitrosend 为你的 AI 智能体提供真实的企业邮箱地址（如 ernest@yourcompany.com），让它们能独立收发邮件并与客户进行一对一对话。当遇到关键问题时，智能体可自动升级给人工处理。该产品解决了 Gmail 等平台对 AI 邮件交互的限制，为需要部署自主客服或销售助手的团队提供原生支持。"},{"rank":7,"name":"The Eureka Database","zhName":"The Eureka Database","url":"https://producthunt.com/products/the-eureka-database","desc":"Turn a Reddit complaint into your next company","zhDesc":"Turn a Reddit complaint into your next company","tags":[],"upvotes":23,"icon":"https://ph-files.imgix.net/d42caa4e-dcd3-4f5b-9924-3446bbac4bc1.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"AI will happily generate a thousand startup ideas. It can't tell you which one people will actually pay for. The Eureka Database is a library of ideas mined from real complaints on Reddit, reviews, and forums. Every idea comes with the receipts: who wants it, who's already profitable, and a working demo. Connect over MCP and your AI agent pulls the full build spec for any saved idea: the problem, the stack, the schema, even the design taste, no prompt engineering needed.","zhDetail":"The Eureka Database 是一个从 Reddit、用户评论和论坛中的真实抱怨中挖掘出的创业点子库，专为寻找可落地商业创意的创业者设计。它解决了 AI 能生成大量想法却无法判断哪些真正有人愿意付费的问题，每个点子都附带目标用户、现有盈利案例和可运行演示。通过 MCP 连接后，你的 AI 助手能直接拉取任何保存点子的完整构建规格，包括问题定义、技术栈、数据模式甚至设计风格，无需任何提示工程。"},{"rank":8,"name":"Manta AI","zhName":"Manta AI","url":"https://producthunt.com/products/manta-ai","desc":"Your AI agent for autonomous web app testing","zhDesc":"Your AI agent for autonomous web app testing","tags":[],"upvotes":27,"icon":"https://ph-files.imgix.net/a1e87f70-9bb6-40a1-ad3b-24a2acb1cb86.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Manta AI is an autonomous testing agent for web applications. Give it a URL and it explores your app the way a real user would — mapping flows, finding bugs, and generating self-healing test cases. Describe a flow in plain English and Manta tests it for you, no script required. When your UI changes, the tests adapt on their own. Run the agent locally on any machine or server — test apps behind a firewall, on a private network, or even on localhost. Free tier open. No card required.","zhDetail":"Manta AI 是一款面向 Web 应用开发者和测试工程师的自动化测试代理。只需提供一个网址，它就能像真实用户一样探索你的应用，自动映射操作流程、发现缺陷并生成可自愈的测试用例。你只需用自然语言描述一个流程，Manta 就能替你完成测试，无需编写脚本；当 UI 发生变化时，测试用例也会自动适应。你可以在本地任意机器或服务器上运行该代理，测试防火墙后、私有网络甚至 localhost 上的应用，免费使用，无需绑定信用卡。"},{"rank":9,"name":"Nuvio","zhName":"Nuvio","url":"https://producthunt.com/products/nuvio-2","desc":"Connect your X bio to your MRR and GA4 for auto updates","zhDesc":"Connect your X bio to your MRR and GA4 for auto updates","tags":[],"upvotes":20,"icon":"https://ph-files.imgix.net/9b3e153a-9453-4e13-8b08-facf22d2a3dd.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Tired of outdated or hand-typed metrics in your X profile? Nuvio connects to Stripe, Google Analytics, and Search Console to auto-update your bio and banner with real, verified revenue and traffic stats. Built for founders and indie makers aiming to grow trust and stand out with live social proof. No manual edits—just authentic numbers that prove your progress.","zhDetail":"Nuvio 是一款面向创始人和独立开发者的社交资料自动更新工具。它能连接 Stripe、Google Analytics 和 Search Console，将你的真实收入与流量数据自动同步到 X（原 Twitter）的个人简介和背景图中，省去手动修改的麻烦，用实时、可信的数据帮你建立信任、脱颖而出。"},{"rank":10,"name":"In Parallel MCP","zhName":"In Parallel MCP","url":"https://producthunt.com/products/in-parallel","desc":"Your context, available to every agent.","zhDesc":"Your context, available to every agent.","tags":[],"upvotes":27,"icon":"https://ph-files.imgix.net/1f310df6-078a-445d-bcac-92f2677df86d.jpeg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The \"explain your company once and every agent already knows it\" pitch nails the actual daily tax of re-pasting context into each new chat. Where does that shared context actually live: a hosted store on your side, or something I control and can host in my own environment? And how does it stay current: does it auto-derive decisions and ownership from the connected tools, or does someone have to curate what goes in? With permission-scoped MCP access, is scoping per-user so an agent only sees what that person could see, or is it one org-wide context every connected tool can read?","zhDetail":"In Parallel MCP 是一款面向团队和开发者的上下文管理工具，解决了在多个 AI 对话中反复粘贴相同背景信息的痛点。它通过一个可自托管或云端存储的共享上下文库，让所有 AI 代理自动获取最新信息，并支持基于用户权限的细粒度访问控制，确保每个代理只看到其用户有权查看的内容。"},{"rank":11,"name":"dot.","zhName":"dot.","url":"https://producthunt.com/products/dot-7","desc":"The feedback layer for anything you build with AI.","zhDesc":"The feedback layer for anything you build with AI.","tags":[],"upvotes":20,"icon":"https://ph-files.imgix.net/fb9b4aec-89de-4103-8de4-ce388ccef0a9.jpeg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"dot. fixes that. Create a project for any URL or Claude artifact, anyone can click anywhere on the live page and pin feedback. No signup, no extension, nothing to install. Built something in Claude? Say \"add dot. feedback to my artifact\" and dot. turns it into a shareable page, nothing to deploy. Iterate your artifact and the review link stays the same; feedback stays attached to the version it was left on.","zhDetail":"dot. 是一款面向开发者和产品团队的轻量级反馈工具，无需注册、安装任何插件即可使用。它允许用户为任意网址或 Claude 生成的页面创建项目，任何人都能直接在实时页面上点击任意位置并钉住反馈。如果你在 Claude 中构建了内容，只需说一句“给我的 artifact 添加 dot. 反馈”，dot. 就会将其转化为可分享的页面，无需部署；迭代后反馈链接保持不变，且每条反馈都会自动关联到对应的版本。"},{"rank":12,"name":"Graft AI","zhName":"Graft AI","url":"https://producthunt.com/products/graft-ai","desc":"Turn company operations into a living map for agents","zhDesc":"Turn company operations into a living map for agents","tags":[],"upvotes":33,"icon":"https://ph-files.imgix.net/09728a12-7972-4fec-a875-b118752c9b42.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"Graft AI 面向企业运营团队，将公司内部的操作流程、文档和数据转化为可供 AI 智能体实时调用的“活地图”，从而让智能体更准确地理解业务上下文并自主执行任务，大幅降低人工配置和对接成本。"},{"rank":13,"name":"Verse","zhName":"Verse","url":"https://producthunt.com/products/verse-6","desc":"Build and hire autonomous AI employees from a single prompt","zhDesc":"Build and hire autonomous AI employees from a single prompt","tags":[],"upvotes":13,"icon":"https://ph-files.imgix.net/98232f9d-3f9a-47e4-8c9f-a79ae12cdd8e.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"Verse 是一款面向企业和开发者的 AI 员工构建与雇佣平台，用户只需输入一个指令即可快速创建并部署自主工作的 AI 员工，解决传统招聘流程繁琐、人力成本高的问题，通过自然语言驱动的方式实现任务自动化与智能协作。"},{"rank":14,"name":"Cito","zhName":"Cito","url":"https://producthunt.com/products/cito","desc":"Hybrid academic search over 236M papers, built for agents","zhDesc":"Hybrid academic search over 236M papers, built for agents","tags":[],"upvotes":116,"icon":"https://ph-files.imgix.net/677b3e02-bbe3-435e-8baa-3f4ae9aaabdc.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"2.   Search is the metered part. Paper lookups aren't: /paper/batch takes up to 1000 IDs in a single call. In a real literature research pass, most of your volume is resolving and hydrating references, not issuing new queries, so the 100 tends to go a lot further than the raw number suggests. There's also /search/batch (50 queries per request), which cuts round trips, though each query still counts against the 100.","zhDetail":"Cito 是一款面向科研人员的文献检索工具，解决了传统搜索 API 按次计费、批量查询效率低的问题。它通过提供 /paper/batch 接口（单次调用最多处理 1000 个文献 ID）和 /search/batch 接口（每次请求 50 条查询），大幅减少网络往返次数，让有限的查询配额在文献解析与引用补全等高频场景中发挥更大价值。"},{"rank":15,"name":"Weave","zhName":"Weave","url":"https://producthunt.com/products/weave-9","desc":"Think out loud and watch it become a living map.","zhDesc":"Think out loud and watch it become a living map.","tags":[],"upvotes":115,"icon":"https://ph-files.imgix.net/71236fdd-2afc-423a-ace4-3a9a71205564.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"Weave 是一款面向创意工作者和知识管理者的思维可视化工具，帮助用户将零散的思考过程转化为动态的思维地图。你只需边想边说，系统便会自动将你的想法组织成可交互的网状结构，让抽象的思路变得清晰可见。"},{"rank":16,"name":"FlightGlitch","zhName":"FlightGlitch","url":"https://producthunt.com/products/flightglitch-airline-error-fare-alerts","desc":"Catch mistake fares before airlines fix them","zhDesc":"Catch mistake fares before airlines fix them","tags":[],"upvotes":21,"icon":"https://ph-files.imgix.net/0c2e3cb4-d74e-4007-a470-69eb783ba7dc.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"FlightGlitch 专为精打细算的旅行者设计，帮助你在航空公司修正错误票价之前抢先锁定低价机票。它通过实时监控全球航班定价漏洞，自动抓取并推送那些因系统或人为失误产生的超低价机票，让你以远低于正常价格的价格完成预订。"},{"rank":17,"name":"Amami","zhName":"Amami","url":"https://producthunt.com/products/amami","desc":"Analytics that lives inside your AI assistant","zhDesc":"Analytics that lives inside your AI assistant","tags":[],"upvotes":24,"icon":"https://ph-files.imgix.net/ae714528-281b-4e00-8d5d-f994eeafca69.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"Amami 是一款嵌入AI助手的分析工具，专为依赖AI助手进行日常工作的用户设计，帮助他们在对话中实时追踪关键指标与数据趋势，无需切换应用即可完成数据洞察。"}],"today":[{"rank":1,"name":"Aye","zhName":"Aye","url":"https://www.producthunt.com/products/aye-browser","desc":"Your teachable AI intern for everyday browser work","zhDesc":"Your teachable AI intern for everyday browser work","tags":[],"upvotes":null,"icon":null,"detail":"Aye is a Chromium-based AI browser for macOS and Windows that gives web work a teachable AI intern. It reads visible pages, plans steps, and works through normal browser actions: clicking, typing, scrolling, switching tabs, and checking results. Summarize pages, research across tabs, draft replies, and automate repeatable workflows. Turn recurring tasks into reusable skills, separate accounts with profiles, and stay in control with reviewable progress and approval for sensitive steps.","zhDetail":"Aye 是一款基于 Chromium 的 AI 浏览器，专为 macOS 和 Windows 用户设计，旨在为网页工作配备一个可教学的 AI 助手。它能读取当前页面内容、规划操作步骤，并通过点击、输入、滚动、切换标签页等常规浏览器行为自动完成任务，帮助用户总结页面、跨标签研究、撰写回复并自动化重复工作流程。用户可将常见任务转化为可复用的技能，通过配置文件隔离账户，并随时审查进度、对敏感步骤进行审批，从而保持对操作的控制。"},{"rank":2,"name":"Pocket Screen","zhName":"Pocket Screen","url":"https://www.producthunt.com/products/toybird-labs","desc":"Keep any Mac window visible in a floating mini screen","zhDesc":"Keep any Mac window visible in a floating mini screen","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0ebbc218-e0dd-456b-bbfa-960661367f25.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Pocket Screen turns the frontmost window on your Mac into a compact, always-on-top PiP-style view. Keep documents, chats, videos, or reference material visible while you work in another app—without constantly switching windows. Processing stays on your Mac.","zhDetail":"Pocket Screen 是一款专为 Mac 用户设计的窗口管理工具，能将最前端的窗口转换为紧凑且始终置顶的画中画视图。无论你在处理文档、聊天、观看视频还是查阅参考资料，都能在不切换窗口的情况下保持内容可见，从而提升多任务处理效率。所有处理均在本地 Mac 上完成，无需担心隐私泄露。"},{"rank":3,"name":"Kimi K3","zhName":"Kimi K3","url":"https://www.producthunt.com/products/kimi-ai-assistant","desc":"The world's first open 3T-class model","zhDesc":"The world's first open 3T-class model","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/be76baa0-d4e9-4f86-ae51-cb94d9b86787.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Today, we are introducing Kimi K3 — our most capable model. Kimi K3 is a 2.8T-parameter model built on our Kimi Delta Attention and Attention Residuals, with native vision capabilities and a 1-million-token context window. It is the world's first open 3T-class model, designed for frontier intelligence across long-horizon coding, knowledge work, and reasoning.","zhDetail":"Kimi K3 是面向专业开发者、知识工作者和研究者的前沿大语言模型，解决了长程编程、复杂推理与知识密集型任务中的性能瓶颈。它基于自研的 Kimi Delta Attention 和 Attention Residuals 架构，拥有 2.8T 参数、原生视觉能力与百万 token 上下文窗口，是全球首个开源的 3T 级模型，能够高效处理超长文本与多模态任务。"},{"rank":4,"name":"PixyCAD","zhName":"PixyCAD","url":"https://www.producthunt.com/products/pixycad-3d-solid-modelling","desc":"Fast & precise 3D CAD built natively for iPad and Mac","zhDesc":"Fast & precise 3D CAD built natively for iPad and Mac","tags":[],"upvotes":null,"icon":null,"detail":"Hi Product Hunt — I’m Andrea, from PixyCAD team We built PixyCAD because many 3D CAD tools still feel too complex for makers and 3D-printing enthusiasts, especially when working on modern Apple devices. Mac and iPad users deserve a native modelling experience that feels approachable without giving up a professional solid-modelling foundation. PixyCAD is a native CAD app for Mac and iPad, powered by Parasolid. It supports workflows from sketching to solid modelling, with Apple Pencil support on iPad and export formats including STEP, Parasolid, STL and 3MF. PixyCAD is free to try with the Starter plan, and today we are mainly looking for honest feedback. Thank you for taking a look.","zhDetail":"PixyCAD 是一款专为创客和3D打印爱好者设计的原生CAD应用，支持Mac和iPad设备。它解决了传统3D CAD工具在苹果设备上操作复杂、体验不佳的问题，通过集成Parasolid引擎和Apple Pencil支持，让用户从草图到实体建模都能流畅完成，并支持STEP、STL等多种导出格式。"},{"rank":5,"name":"Scribble Party","zhName":"Scribble Party","url":"https://www.producthunt.com/products/scribble-party","desc":"A local-first whiteboard studio for teachers and creators","zhDesc":"A local-first whiteboard studio for teachers and creators","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/b86cba90-9c03-4400-a3cb-3afdedf7254d.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Really simple and intuitive - I like this a lot. The interface is clean and the ease of set up is the real win here, being ready to go immediately. My only question is how to swap the camera input on a scribble. I accidentally selected the wrong camera and couldn't easily see how I could go back and swap it for the correct one. But this feels like a minor issue in a great piece of kit. The obvious question, of course, is what commercialisation of this looks like down the line.","zhDetail":"Scribble Party 是一款面向创意团队和远程协作用户的实时涂鸦工具，解决了在线头脑风暴中缺乏直观、快速上手的手绘协作方式的问题。它通过简洁的界面和即开即用的设置，让用户能立即开始多人同步涂鸦，提升沟通效率与趣味性。"},{"rank":6,"name":"Customer.io","zhName":"Customer.io","url":"https://www.producthunt.com/products/customer-io","desc":"Automate Messaging Everywhere — Startups Get 12 Months Free","zhDesc":"Automate Messaging Everywhere — Startups Get 12 Months Free","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/b23c5381-bbc4-437f-af97-12fdc954c926.jpeg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Customer.io unifies data, messaging, and AI into one platform so every customer interaction gets smarter over time. Teams use it to build personalized campaigns across email, SMS, push, in-app, and more—using first-party data to reach the right people at the right moment. AI is built in to remove the grunt work and sharpen results, so marketers can focus on strategy. Trusted by 9,000+ brands including Notion, Lovable, Wispr Flow, and Cursor.","zhDetail":"Customer.io 是一款面向营销团队的数据驱动型客户互动平台，它将数据、消息推送和AI整合为一体，帮助品牌在邮件、短信、推送通知和应用内等渠道构建个性化营销活动。通过利用第一方数据，它确保在正确的时间触达正确的用户，同时内置AI自动优化流程、减少重复劳动，让营销人员更专注于策略。目前已被Notion、Lovable、Wispr Flow、Cursor等9000多个品牌采用。"},{"rank":7,"name":"Timely","zhName":"Timely","url":"https://www.producthunt.com/products/timely-9","desc":"Pull your calendar availability in 3 seconds","zhDesc":"Pull your calendar availability in 3 seconds","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/08c6e970-0827-464a-b8d6-f3b25edbf2cd.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"One thing that would make this a daily driver for me is a quick way to suggest a specific time slot directly in the email thread, like a one-click preview that drops the proposed slot into my draft without me having to copy paste the time block myself. Would also love it if it could auto-detect when someone references a time in an email and offer to check that against my availability.","zhDetail":"Timely 是一款面向忙碌职场人士的智能时间管理工具，旨在解决邮件沟通中反复确认和手动粘贴时间段的低效问题。它能在邮件线程中一键预览并插入建议的时间段，无需手动复制粘贴；同时自动检测邮件中提及的时间，并快速与你的日程可用性进行比对。"},{"rank":8,"name":"1. Paradigm","zhName":"Paradigm","url":"https://www.producthunt.com/products/paradigm-3","desc":"Turn any goal into a personalized, adaptive learning path.","zhDesc":"Turn any goal into a personalized, adaptive learning path.","tags":[],"upvotes":null,"icon":null,"detail":"Every interaction is graded as it happens, so what you walk away with is **proof of skill, not a transcript.** Anyone can build a course here; ours currently run from \"Speed-run ICS 31\" (UCI's intro programming, crammed) to \"Let's count to 10!\" (pre-K).","zhDetail":"Paradigm 是一款面向学习者和教育者的技能证明平台，它解决了传统课程只提供成绩单、无法真实反映能力的问题。通过实时对每一次互动进行评分，用户最终获得的是可验证的技能证明，而非普通的学习记录。任何人都能在此创建课程，内容覆盖从大学编程速成到学前数数等各阶段。"},{"rank":9,"name":"2. Zro","zhName":"Zro","url":"https://www.producthunt.com/products/zro","desc":"Private inference for coding agents","zhDesc":"Private inference for coding agents","tags":[],"upvotes":null,"icon":null,"detail":"Over the last year, we've been obsessed with one problem: making AI inference faster and more efficient. As we worked with developers building AI products, we kept seeing the same tradeoff:","zhDetail":"Zro 是一款专为开发者设计的 AI 推理加速工具，旨在解决 AI 产品中推理速度与效率难以兼得的常见矛盾。它通过优化底层计算流程，帮助开发者在保持模型精度的同时显著提升推理速度，从而降低延迟和计算成本。"},{"rank":10,"name":"5. River","zhName":"River","url":"https://www.producthunt.com/products/river-9","desc":"AI account executives that demo and close B2B deals","zhDesc":"AI account executives that demo and close B2B deals","tags":[],"upvotes":null,"icon":null,"detail":"River enables B2B companies to sell with VoiceAI. When a lead enquires, our AI account executive joins a live call instantly, runs the product demo, handles objections, and closes - so no lead ever waits for a rep's calendar. Backed by founders of Ramp, Kalshi, and Lean.","zhDetail":"River 帮助 B2B 企业通过语音 AI 实现销售转化。当潜在客户咨询时，AI 销售代表能立即加入实时通话，自动进行产品演示、处理异议并完成成交，让客户无需等待人工销售代表的日程安排。该产品由 Ramp、Kalshi 和 Lean 的创始人支持。"},{"rank":11,"name":"1. AnySearch","zhName":"AnySearch","url":"https://www.producthunt.com/products/anysearch","desc":"Real-time structured search trusted by agents and developers","zhDesc":"Real-time structured search trusted by agents and developers","tags":[],"upvotes":null,"icon":null,"zhDetail":"AnySearch 是一款面向 AI 智能体和开发者的实时结构化搜索引擎，帮助用户在海量信息中快速获取精准、可解析的搜索结果。它通过提供结构化的实时数据接口，解决了传统搜索引擎返回内容杂乱、难以被程序直接利用的问题，让智能体与开发者能高效集成并获取可靠信息。"},{"rank":12,"name":"2. ExploreYC","zhName":"ExploreYC","url":"https://www.producthunt.com/products/yc-company-explorer","desc":"Open-source API for Y Combinator & a16z company data","zhDesc":"Open-source API for Y Combinator & a16z company data","tags":[],"upvotes":null,"icon":null,"zhDetail":"ExploreYC 是一款面向创业者和投资人的开源 API 工具，用于获取 Y Combinator 和 a16z 投资公司的结构化数据。它通过提供便捷的接口，帮助用户快速查询、分析和追踪这些顶级孵化器与风投的初创企业信息，从而节省手动搜集数据的时间。"},{"rank":13,"name":"4. ChatCut","zhName":"ChatCut","url":"https://www.producthunt.com/products/chatcut-ai-video-editor","desc":"Your AI video editor in ChatGPT, desktop, and web","zhDesc":"Your AI video editor in ChatGPT, desktop, and web","tags":[],"upvotes":null,"icon":null,"zhDetail":"ChatCut 是一款集成在 ChatGPT、桌面端和网页端的 AI 视频编辑工具，面向需要快速剪辑视频的内容创作者和普通用户。它让你无需切换软件，直接通过对话指令完成视频裁剪、字幕添加等操作，大幅提升视频制作效率。"},{"rank":14,"name":"Tines","zhName":"Tines","url":"https://www.producthunt.com/products/tines","desc":"Build agents & automations integrated across your workspace","zhDesc":"Build agents & automations integrated across your workspace","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/83d98ed3-818f-4754-9ab5-e5fa51961593.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"Tines 是一款面向企业团队的工作流自动化平台，帮助安全、IT 和运营人员无需编写代码即可构建智能代理和跨工作空间的自动化流程。它通过可视化界面连接各类工具与系统，自动执行重复任务并响应事件，从而提升团队效率并减少人工操作失误。"},{"rank":15,"name":"5. Sim","zhName":"Sim","url":"https://www.producthunt.com/products/sim-studio","desc":"Open-source workspace for AI agents and workflows","zhDesc":"Open-source workspace for AI agents and workflows","tags":[],"upvotes":null,"icon":null,"detail":"I've been building agent workflows for a while and the thing that always killed me was how fast everything turns into crap once you go past two or three agents talking to each other. Sim fixes that. You get an actual visual canvas where you can see the whole flow, wire things up, and then actually deploy it instead of it just being a pretty diagram. It's open source and you can self host it, which matters a lot to me because I don't want my whole stack depending on some company's pricing decisions. The integrations that come out of the box saved me a ton of setup time too since they a 1000+! This is a truly great product and integral in my stack!","zhDetail":"Sim 是一款面向 AI 代理工作流开发者的开源可视化编排工具。它解决了多个代理相互通信时流程容易失控的问题，通过提供直观的画布来设计、连接并实际部署整个工作流，而不仅仅是画一张漂亮的图。支持自托管和超过 1000 种开箱即用的集成，让你无需依赖第三方公司的定价策略，快速搭建稳定可靠的代理系统。"},{"rank":16,"name":"1. Fundraisly","zhName":"Fundraisly","url":"https:/ let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
