<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月23日</span>
        <span class="updated">更新于 10:23</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-24","updatedAt":"10:23","yesterday":[{"rank":1,"name":"Teable 3.0","zhName":"Teable 3.0","url":"https://www.producthunt.com/products/teable-4","desc":"AI Spreadsheet for Business","zhDesc":"AI Spreadsheet for Business","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/99e1dd98-f4bc-4cfb-99d9-fae6ea597647.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Turn your business data into AI workflows and custom apps. Connect any system, migrate any data, and build anything that fits your business 100%.","zhDetail":"Teable 3.0 是一款面向企业团队的数据平台，帮助用户将业务数据转化为AI工作流和自定义应用。它能够连接任意系统、迁移各类数据，并支持构建完全贴合企业需求的解决方案，从而解决数据孤岛和定制化开发成本高的问题。"},{"rank":2,"name":"PromptQL","zhName":"PromptQL","url":"https://www.producthunt.com/products/promptql","desc":"Multiplayer AI that replaces Slack","zhDesc":"Multiplayer AI that replaces Slack","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/92a46df4-f32c-4fb9-a1ce-d2705257ca82.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Stop splitting team knowledge between Slack and everyone's private AI chats. PromptQL is multiplayer AI for teams: think Claude or ChatGPT in shared threads. Tag teammates to review, correct, and refine answers without losing the reasoning. Connect databases, SaaS apps, coding agents, and events. PromptQL captures tribal knowledge and suggests shared-brain updates so context compounds. Scopes and multi-user permissions keep the right context accessible to the right people.","zhDetail":"PromptQL 是一款面向团队的多人协作 AI 工具，旨在解决团队知识分散在 Slack 和私人 AI 聊天中的问题。它让团队成员能在共享线程中像使用 Claude 或 ChatGPT 一样协作，通过标记队友来审阅、纠正和优化回答，同时保留推理过程。PromptQL 还能连接数据库、SaaS 应用、编程代理和事件，自动捕获团队隐性知识并建议共享更新，让上下文不断积累，并通过权限控制确保合适的人访问合适的信息。"},{"rank":3,"name":"PodcastorAI","zhName":"PodcastorAI","url":"https://www.producthunt.com/products/podcastorai","desc":"Your AI twin hosts your video podcast","zhDesc":"Your AI twin hosts your video podcast","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/1848fbb1-c9d9-4d11-b2e9-976b9e6a46a2.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Create studio-quality video podcasts from scripts, links, PDFs, or ideas — with AI hosts, natural voices, and your digital twin. Podcastor handles production and puts you on screen, turning hours of recording and editing into a finished video podcast in around 15 minutes. Create solo or two-host episodes and get a publish-ready video without cameras or a production team. Already have an audio episode? Upload it and transform it into a video podcast with your voice and AI avatar.","zhDetail":"PodcastorAI 面向内容创作者、播客新手和忙碌的营销人员，帮助他们在没有摄像团队或录制设备的情况下快速制作专业级视频播客。用户只需提供脚本、链接、PDF 或创意，AI 即可生成自然语音、AI 主持人甚至数字分身，将原本数小时的录制与剪辑工作缩短至约15分钟。支持单人或双人主持模式，也能将现有音频节目一键转化为带本人声音和AI虚拟形象的视频播客。"},{"rank":4,"name":"CrawlRaven","zhName":"CrawlRaven","url":"https://www.producthunt.com/products/crawlraven","desc":"SEO Hub for GSC + GA4 + a 200-point crawl","zhDesc":"SEO Hub for GSC + GA4 + a 200-point crawl","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/e9cd3d76-0542-4e24-a3c2-ee2f38d9f9a0.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"I run SEO for a niche B2B product in healthcare. My highest-intent terms show zero or missing volume in every tool and barely register in Search Console, since only a few hundred people a month search them at all, yet those are the ones that convert. A prioritizer built on demand would push them straight to the bottom.","zhDetail":"CrawlRaven 专为利基 B2B 产品（如医疗健康领域）的 SEO 人员设计，解决长尾高意向关键词在传统工具中显示零搜索量、被低估的问题。它通过识别那些搜索量极低但转化率极高的关键词，帮助用户避免被基于搜索量的优先级排序工具忽略，从而精准锁定真正带来转化的搜索机会。"},{"rank":5,"name":"AskCodi","zhName":"AskCodi","url":"https://www.producthunt.com/products/askcodi","desc":"Orchestrate agents at scale while reducing cost","zhDesc":"Orchestrate agents at scale while reducing cost","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/24ed79f3-d5e6-4c05-aece-9ce7e049029b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"AskCodi orchestrates AI coding, two ways. Talk to Codi, an AI CTO in the Mac app that runs a team of agents and picks the right model for every job. Or call the same orchestration as an OpenAI-compatible API. Bring your own key. Key features 🤖 BYOK: Claude Code, Codex CLI, and more 🧠 An AI CTO that plans, delegates, and ships 💸 Auto model routing, low cost by default 🗂️ Remembers your whole codebase 🔌 OpenAI-compatible API for any LLM 📊 Analytics and cost controls","zhDetail":"AskCodi 是一款面向开发者的 AI 编程助手，通过 Mac 应用或兼容 OpenAI 的 API 提供两种使用方式。它内置了一位“AI 技术总监”，能自动调度多个智能体、为每项任务选择最合适的模型，并记忆整个代码库，从而帮助开发者高效规划、分工并交付代码，同时支持自带密钥（BYOK）以降低使用成本。"},{"rank":6,"name":"RunEvr","zhName":"RunEvr","url":"https://www.producthunt.com/products/runevr","desc":"Agentic project management environment for creatives","zhDesc":"Agentic project management environment for creatives","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/f9f4b2f7-2580-4ff4-89b5-c85464492aa0.gif?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","detail":"One AI-powered workspace where your projects, conversations, reviews, and creative work stay connected. Every tool switch interrupts creative thinking, scatters context, and adds unnecessary cognitive load. RunEvr is built to keep your entire creative workflow in one place, helping teams stay focused, collaborate naturally, and create without losing momentum.","zhDetail":"RunEvr 是一个AI驱动的统一工作空间，专为创意团队和项目协作设计。它解决了频繁切换工具导致思维中断、上下文分散和认知负担增加的问题。通过将项目、对话、评审和创意工作整合在同一平台，RunEvr 帮助团队保持专注、自然协作，并持续创作不中断。"},{"rank":7,"name":"Moxie Docs: Knowledgebases","zhName":"Moxie Docs: Knowledgebases","url":"https://www.producthunt.com/products/moxie-docs","desc":"Automated documentation for developers, users, and AI Tools","zhDesc":"Automated documentation for developers, users, and AI Tools","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ w=48","detail":"I loved parts of _Obsidian_, _Day One_, and _Bear_, but none of them ticked all the essential boxes. _Obsidian_ gave me files + folders, strong search, and project separation via multiple vaults, but I still wanted something that felt more native on macOS, and less reliant on plugins. _Day One_ was beautiful and polished, but I wanted direct access to the Markdown, better search, folder-based organisation, and notes that weren’t stored inside a database. _Bear_ came close as the editing experience is amazing, but its database-backed storage and tag-first organisation never quite clicked for me.","zhDetail":"MinkNote 是一款专为 macOS 用户打造的笔记应用，融合了 Obsidian 的文件与文件夹管理、Day One 的精致界面以及 Bear 的流畅编辑体验。它解决了现有笔记工具在本地化存储、Markdown 直接访问和强大搜索功能上的不足，让你无需依赖插件或数据库，就能获得原生的 macOS 笔记体验。"},{"rank":3,"name":"HarnessRouter","zhName":"HarnessRouter","url":"https://www.producthunt.com/products/epsilla","desc":"Bring the world's best AI agents into your app, with one API","zhDesc":"Bring the world's best AI agents into your app, with one API","tags":[],"upvotes":null,"icon":null,"detail":"Building an AI agent backend yourself takes months: sandboxes, orchestration, retries, cost controls. HarnessRouter runs it for you. One API in, finished work out: code, files, videos, games. Trusted by top medical research institutions, leading healthcare companies, and cutting-edge startups in multiple domains.","zhDetail":"HarnessRouter 是一款面向开发者的 AI 代理后端服务，帮助团队省去搭建沙箱、编排、重试和成本控制等繁琐工作。只需调用一个 API，即可获得代码、文件、视频、游戏等完整输出结果。目前已获得多家顶级医学研究机构、领先医疗企业和前沿初创公司的信任。"},{"rank":4,"name":"Pushary","zhName":"Pushary","url":"https://www.producthunt.com/products/pushary","desc":"Approve AI requests from your lock screen","zhDesc":"Approve AI requests from your lock screen","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/dddf6127-54a0-4d3e-854c-6b98ee2f5c5a.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"One command connects your AI agents to your lock screen. When Claude Code, Codex, Cursor, Gemini CLI, Hermes, or Claude Cowork stops to ask, you tap yes from your phone and the run keeps moving. New in this launch: native iPhone and Android apps. Pairing is a QR code you scan from the terminal, no key to paste. Per-tool policies auto-approve the safe reads. Every decision lands in an audit trail.","zhDetail":"Pushary 让开发者只需一条命令，就能将 AI 代理（如 Claude Code、Codex、Cursor 等）连接到手机锁屏。当这些工具需要确认时，你只需在手机上轻点“是”，即可让任务继续运行，无需守在电脑前。本次发布新增原生 iPhone 和 Android 应用，通过终端扫码即可配对，并支持按工具设置自动批准策略，所有操作记录留痕可查。"},{"rank":5,"name":"Buzz","zhName":"Buzz","url":"https://www.producthunt.com/products/buzz-3","desc":"Your people, your agents, your project — all in one place","zhDesc":"Your people, your agents, your project — all in one place","tags":[],"upvotes":null,"icon":null,"detail":"Jack says Block released Buzz as an open-source workspace that puts people, agents, conversations, and code on equal footing behind one cryptographic identity system. He presents it as a way to reduce reliance on Slack and GitHub, solve the context-loss problem across tools, and create a signed, attributable record for work.","zhDetail":"Buzz 是一个开源工作空间，面向需要整合团队协作、AI 代理、对话与代码的开发者与团队。它通过统一的加密身份系统，解决跨工具（如 Slack、GitHub）使用时上下文丢失的问题，并为每项工作创建可签名、可追溯的记录，从而减少对多个独立工具的依赖。"},{"rank":6,"name":"Viktor.com","zhName":"Viktor.com","url":"https://www.producthunt.com/products/viktor","desc":"An AI coworker that actually does the work","zhDesc":"An AI coworker that actually does the work","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/37038cc7-70ae-4d9f-b264-b20497bae49b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"I run a small energy & internet company in Alberta — team of 4. Viktor legitimately replaced a social media service, a part-time VA, and a couple of SaaS tools within the first few weeks. It logs into our wholesale portal daily (no API — just a web login and CSV exports), syncs our customer database to our CRM, drafts churn recovery emails before I'm even at my desk, runs our entire social media calendar, and built a lead capture to email drip pipeline for a solar campaign. It remembers everything — brand colors, how I write emails, terminology I've corrected once months ago. The daily output is something I genuinely couldn't replicate without hiring 2-3 more people.","zhDetail":"Viktor.com 专为小型能源与互联网公司团队设计，能替代社交媒体管理、兼职助理及多款SaaS工具。它通过自动登录批发门户、同步客户数据至CRM、撰写客户流失挽回邮件、管理社交媒体排期并构建销售线索捕获与邮件培育流程，帮助仅4人的团队节省了相当于2-3名员工的工作量。"},{"rank":7,"name":"YC has it","zhName":"YC has it","url":"https://www.producthunt.com/products/yc-has-it","desc":"Describe your problem, get the YC startup that solves it","zhDesc":"Describe your problem, get the YC startup that solves it","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2177dac5-a842-448b-b24d-978c4d530ada.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"I ran 50 customer interviews for my company. Almost everyone named the same pain out loud, clinical notes, but the budget was sitting somewhere else entirely, insurance reimbursement. If I had typed my stated problem into this, it would have confidently routed me to a notes tool and missed where I would actually spend. The match can be perfect and still point at the wrong category, because the weak link is the self-diagnosis, not the search.","zhDetail":"YC has it 是一款面向创业者和产品团队的需求洞察工具，帮助用户精准定位真实痛点而非表面问题。它通过分析用户访谈中的关键表述，自动识别预算流向与实际需求之间的错位，避免因自我诊断偏差而导向错误的解决方案类别。"},{"rank":8,"name":"Liso","zhName":"Liso","url":"https://www.producthunt.com/products/liso-listen-to-highlights","desc":"Highlight text on any page and turn it into audio.","zhDesc":"Highlight text on any page and turn it into audio.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ac47d553-ece9-41c0-9943-0b44361d6146.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Congrats on the launch! I like that you're focused on a very specific workflow instead of trying to be another generic text to speech app. Turning articles and newsletters into an audio queue is great for people trying to stay ahead of industry news and research. Curious what surprised you most after people started using it. Was there a use case that emerged that you didn't originally design for?","zhDetail":"Liso 专为需要高效获取行业资讯和研究成果的用户设计，能将文章和新闻简报转化为音频队列，让你在通勤、运动或做家务时“听”着阅读。它避免了通用文本转语音工具的泛化，聚焦于将长内容整理成可连续播放的音频流，帮助用户在不占用视觉和双手的情况下，轻松跟上最新信息。"},{"rank":9,"name":"Prosed","zhName":"Prosed","url":"https://www.producthunt.com/products/prosed-turn-your-content-into-a-book","desc":"The AI book service that shows its work","zhDesc":"The AI book service that shows its work","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/b2920ef3-6f1b-48c3-8549-ccb2dd86ef9c.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Most AI book services work like a black box. Your content goes in, a manuscript comes out, and you hope it sounds like you. We thought creators deserved more than hope. The Source Map color-codes every paragraph in your manuscript: your original words from newsletters, podcasts, and posts alongside the connective tissue Prosed added to bridge your ideas together. Today, over 90% of each book we assembled is the creator's own words. Now you can see that for yourself.","zhDetail":"Prosed 是一款面向创作者（如博主、播主、内容创作者）的 AI 书籍撰写工具。它解决了传统 AI 写书像“黑箱”的问题——你无法知道哪些内容是你自己的、哪些是 AI 添加的。通过“源地图”功能，Prosed 用颜色标记手稿中的每一段文字，清晰区分你原有的内容（来自新闻通讯、播客、帖子等）和 AI 补充的衔接部分，让你亲眼看到每本书中超过 90% 都是你自己的原话。"},{"rank":10,"name":"5. AskCodi","zhName":"AskCodi","url":"https://www.producthunt.com/products/askcodi","desc":"Orchestrate agents at scale while reducing cost","zhDesc":"Orchestrate agents at scale while reducing cost","tags":[],"upvotes":null,"icon":null,"detail":"AskCodi orchestrates AI coding, two ways. Talk to Codi, an AI CTO in the Mac app that runs a team of agents and picks the right model for every job. Or call the same orchestration as an OpenAI-compatible API. Br let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
</body>
</html>
