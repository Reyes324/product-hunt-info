<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月18日</span>
        <span class="updated">更新于 09:55</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-19","updatedAt":"09:55","yesterday":[{"rank":1,"name":"ZooData","zhName":"ZooData","url":"https://www.producthunt.com/products/zoodata","desc":"The data layer for AI agents","zhDesc":"The data layer for AI agents","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0e4b3e5e-3b1e-40f9-bacc-87e0610a77a3.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"ZooData turns any URL into agent-ready JSON, so AI agents can work with structured data instead of raw HTML or bloated markdown. Use ~75% fewer LLM tokens, pay only for the fields you use, and skip extra extraction credits.Beyond extraction, ZooData gives agents pre-analyzed e-commerce intelligence — competitor, market, traffic, and consumer insights — live for Amazon and TikTok. API, CLI, and MCP server included. Start with 1,000 free credits, no card required.","zhDetail":"ZooData 是一款面向 AI 代理开发者的数据提取工具，能将任意网页 URL 转化为结构化的 JSON 数据，帮助 AI 代理直接使用干净数据而非原始 HTML 或冗长 Markdown。它可减少约 75% 的 LLM 令牌消耗，仅按需付费所需字段，并内置亚马逊和 TikTok 的电商智能分析（含竞品、市场、流量与消费者洞察），支持 API、CLI 和 MCP 服务器，新用户可免费获得 1000 次额度，无需绑定信用卡。"},{"rank":2,"name":"Clark","zhName":"Clark","url":"https://www.producthunt.com/products/clark-agent","desc":"An AI coworker with its own cloud computer","zhDesc":"An AI coworker with its own cloud computer","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/84341329-a328-4857-9d47-4ba180352bfd.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Clark is an AI coworker with its own cloud computer - browser, terminal, files, and code. Hand it a real task, close the tab, and come back to finished work: wide, sourced research; websites; spreadsheets; decks; audits; or tested code. It can fan work out to parallel specialists, run on a schedule, and return artifacts with the evidence behind them. Use Clark on web or mobile, work in real repositories with Clark Code, or embed the agent through an OpenAI-compatible API.","zhDetail":"Clark 是一款自带云端电脑（浏览器、终端、文件和代码）的 AI 同事。你只需交给它一个真实任务，关掉标签页，回来就能拿到完成的工作——包括广泛且有来源的研究、网站、表格、演示文稿、审计报告或经过测试的代码。它还能将任务分发给并行专家、按计划运行，并返回带有证据链的成果，适合需要高效完成复杂工作的个人或团队。"},{"rank":3,"name":"LiveDemo","zhName":"LiveDemo","url":"https://www.producthunt.com/products/livedemo","desc":"Open-source alternative to Storylane, Navattic, and Arcade","zhDesc":"Open-source alternative to Storylane, Navattic, and Arcade","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2e64354d-c77e-43c8-830f-287c7f9d373a.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"It is better to see once than to hear a hundred times. With LiveDemo, you can effortlessly create captivating live demonstrations of your product LiveDemo Chrome and web application are designed to empower founders, sales, and marketing professionals.","zhDetail":"LiveDemo 是一款专为创始人、销售及营销人员设计的工具，帮助您轻松创建产品、Chrome 扩展及 Web 应用的实时演示。它通过直观的录制与交互功能，让观众“一次看见胜过百次听闻”，从而更高效地展示产品价值、提升转化率。"},{"rank":4,"name":"Mirage","zhName":"Mirage","url":"https://www.producthunt.com/products/mirage-15","desc":"Turn your SaaS into a clickable demo in 90 seconds.","zhDesc":"Turn your SaaS into a clickable demo in 90 seconds.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0807b0ce-d6a7-4163-b4e5-5cf1c6ce8b76.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Great timing for me personally — I'm mid-way through building a demo video for my own launch, and the \"clickable\" angle is interesting since most demo tools just produce a static walkthrough video. How are you handling the underlying app state for the clickable version — is it recording real interactions and replaying them, or simulating a fake environment? Curious how much fidelity you get without literally embedding the live app.","zhDetail":"Mirage 是一款面向产品团队和创业者的交互式演示视频制作工具，解决了传统演示工具只能生成静态视频、无法让观众真正“点击”体验的问题。它通过录制真实交互并回放的方式，让演示视频中的按钮、链接等元素变得可点击，从而在不嵌入真实应用的前提下，提供高保真的互动演示体验。"},{"rank":5,"name":"OpenMarkdown","zhName":"OpenMarkdown","url":"https://www.producthunt.com/products/openmarkdown","desc":"A markdown editor you and your agent co-edit","zhDesc":"A markdown editor you and your agent co-edit","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/1bd8f529-e751-4ce1-ba58-a183f06fd912.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"A fast, light markdown editor that opens any `.md` file instantly. Your agent reads, writes, and co-edits the same file you're in — through a CLI, an agent plugin, and MCP. Local-first: no account, no telemetry, your files never leave your disk.","zhDetail":"OpenMarkdown 是一款面向开发者和写作者的极速轻量级 Markdown 编辑器，能够瞬间打开任何 `.md` 文件。它通过 CLI、代理插件和 MCP 协议，让你的 AI 助手与你协同读写、编辑同一个文件。完全本地优先，无需注册、无数据追踪，你的文件始终留在自己的磁盘上。"},{"rank":6,"name":"Acebuilder","zhName":"Acebuilder","url":"https://www.producthunt.com/products/acebuilder","desc":"Build landing pages with Aceternity UI","zhDesc":"Build landing pages with Aceternity UI","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/5e278765-4bf3-4b7c-8701-31da076d7162.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Acebuilder is an AI website builder from the team behind Aceternity UI. Instead of generating generic layouts from scratch, it pulls from Aceternity's actual Pro template and component library — you import a full page or a single block, then reshape the copy, layout, and structure by chatting with the agent. Generate images without leaving the chat. Run design \"skills\" on any section to push the agent past generic filler toward sharper layout. Export your code as a zip. You own what you build.","zhDetail":"Acebuilder 是一款面向开发者和设计师的 AI 网站构建工具，由 Aceternity UI 团队打造。它不像传统工具那样从零生成通用布局，而是直接调用 Aceternity 的 Pro 模板和组件库，用户可以通过对话导入整页或单个模块，并自由调整文案、布局和结构。你还可以在对话中生成图片、对任意区域运行设计“技能”以优化排版，最终导出代码压缩包，完全拥有所建内容。"},{"rank":7,"name":"Mainichi","zhName":"Mainichi","url":"https://www.producthunt.com/products/mainichi-2","desc":"Learn Japanese, one prefecture at a time.","zhDesc":"Learn Japanese, one prefecture at a time.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c107c4fb-3951-48e5-873f-1feaee150343.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The prefecture-by-prefecture spine is what pulled me in — I spend my days on a different version of this, turning places into journeys, so I'm curious how much work the geography actually does here. When you move to a new prefecture, does the vocabulary move with it — regional food, dialect, the words you'd actually need on the ground — or is the map mostly a motivational layer over one big word list? The first would be a lovely thing. Either way, solo-built and this considered is rare. Congrats on shipping.","zhDetail":"Mainichi 是一款面向日语学习者的个性化单词应用，通过日本都道府县地图来组织学习内容。它帮助用户将语言学习与地理文化结合，让每个新地区的词汇、方言和当地表达随地点切换而自然更新，从而让学习更贴近真实生活场景。"},{"rank":8,"name":"WX","zhName":"WX","url":"https://www.producthunt.com/products/wx","desc":"An experimental synth for playable generative sound","zhDesc":"An experimental synth for playable generative sound","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2a5b89df-1a23-4485-be77-b6cffd99b893.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The idea of generating a patch and then shaping it back into something playable is what sets this apart from most random-patch generators; usually the output is a cool one-shot you can't actually perform with. When I land on a patch I like, can I lock specific parameters like the filter and envelope and re-roll only the modulation and effects around them, or is every double-click a full reset? And do generated patches save as normal presets I can recall and tweak later, or do they only live in the current session?","zhDetail":"WX 是一款面向电子音乐制作人和合成器玩家的智能音色生成工具。它解决了传统随机音色生成器只能产生一次性声音、无法实际演奏的问题，让你在生成音色后仍能锁定滤波器、包络等关键参数，仅对调制和效果部分进行重新随机，并支持将生成的音色保存为可随时调用和微调的常规预设。"},{"rank":9,"name":"DocuSmart AI","zhName":"DocuSmart AI","url":"https://www.producthunt.com/products/docusmart-ai","desc":"Turning fragmented knowledge into one simple system","zhDesc":"Turning fragmented knowledge into one simple system","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/4676e4d3-e6de-46b3-aeb3-4f7fcedf53ad.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The 'search across Drive, SharePoint and Dropbox in place, no migration' approach is the right call — the moment a tool wants to re-home all our files it's dead on arrival for a small team. When it answers a question, does it index and embed the docs into your own store, and how often does it re-sync as files change, or does it read live at query time? And on setup, does it respect each source's existing permissions so someone only gets answers from docs they already have access to?","zhDetail":"DocuSmart AI 专为小型团队设计，解决跨 Google Drive、SharePoint 和 Dropbox 分散存储时难以快速检索文件的问题。它无需迁移文件，直接原地搜索并实时读取文档内容，同时严格遵循各平台的原有权限设置，确保用户只能访问自己已有权限的文件。"}],"today":[{"rank":1,"name":"Detourmap","zhName":"Detourmap","url":"https://www.producthunt.com/products/detourmap","desc":"Every place worth the detour, on one interactive map","zhDesc":"Every place worth the detour, on one interactive map","tags":[],"upvotes":19,"icon":"https://ph-files.imgix.net/b0676e42-0959-40c4-95b5-07773c2179c4.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"love the \"surprise me\" bias toward obscure over famous, that's the right default for this kind of tool. since it's built off Wikidata, how do you handle places that get edited or delisted after you pull the data - is there a refresh cycle, or does it slowly drift out of date until you re-sync?","zhDetail":"Detourmap 是一款面向喜欢探索小众景点的旅行者的地图工具。它通过“惊喜推荐”机制，优先推送冷门而非热门地点，帮助用户发现被忽视的独特去处。基于 Wikidata 构建，数据会定期同步更新，避免因编辑或下架导致信息过时。"},{"rank":2,"name":"Spycost","zhName":"Spycost","url":"https://www.producthunt.com/products/spycost","desc":"Fell for a discount again?","zhDesc":"Fell for a discount again?","tags":[],"upvotes":22,"icon":"https://ph-files.imgix.net/9c884a0a-c029-42a4-bb05-3fa1c9269175.gif?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","detail":"Remember the last time you bought something at a discount, only to see it later for the same price without the discount? Or when the product costs more today than it did yesterday. Did you feel cheated? Are you ready to look behind the screen of manipulation and lies? Spycost helps you see when you’re paying more while thinking you’re paying less. It gives you the full price picture, so you can decide whether it’s actually worth it.","zhDetail":"Spycost 是一款面向普通消费者的价格透明工具，帮助用户识破商家“先涨后降”或“虚假折扣”等价格操纵手段。它通过追踪商品的历史价格变化，为你展示真实的完整价格图景，让你在购物时不再被表面优惠所迷惑，做出更明智的消费决策。"},{"rank":3,"name":"Kobbe","zhName":"Kobbe","url":"https://www.producthunt.com/products/kobbe","desc":"Privacy-friendly web analytics with traffic and revenue.","zhDesc":"Privacy-friendly web analytics with traffic and revenue.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/a5740a68-b6d4-42bc-a0a4-c38238513c9a.jpeg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Two questions from the content side. How do you handle organic search as a source? Without cookies you usually just get \"[google.com](http://google.com/)\" and no idea which page or query brought them. And do you separate AI referrals — ChatGPT, Perplexity, and so on? A lot of that traffic arrives with no referrer, and right now it's the thing people most want to see and mostly can't.","zhDetail":"Kobbe 是一款面向营销人员和网站运营者的流量分析工具，专门解决无 Cookie 环境下无法识别搜索引擎来源、以及无法区分 AI 推荐流量（如 ChatGPT、Perplexity）的问题。它通过智能识别 referrer 缺失的访问来源，帮助用户清晰追踪用户是从哪个搜索页面、关键词或 AI 平台进入网站的。"},{"rank":4,"name":"OpenSEO","zhName":"OpenSEO","url":"https://www.producthunt.com/products/openseo","desc":"The open source Ahrefs alternative","zhDesc":"The open source Ahrefs alternative","tags":[],"upvotes":13,"icon":"https://ph-files.imgix.net/bddfb6ed-475f-4cc7-adbc-c28b77be18d8.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The MCP angle is interesting too. We work on the content planning side, and what we keep seeing is that agents will build a whole strategy on bad keyword data and sound completely confident about it. Do people trust the output more when the numbers are real, or does it just move the guessing one step later?","zhDetail":"OpenSEO 是一款面向内容创作者和 SEO 从业者的关键词数据工具，旨在解决 AI 代理基于错误关键词数据制定策略的问题。它通过提供真实、可靠的关键词数据，帮助用户避免因虚假数据导致的决策失误，让内容规划更加精准可信。"},{"rank":5,"name":"BaseRT","zhName":"BaseRT","url":"https://www.producthunt.com/products/basert","desc":"6.4x faster than llama.cpp, 3.9x faster than MLX","zhDesc":"6.4x faster than llama.cpp, 3.9x faster than MLX","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/3266ca93-6016-49ed-ab5c-ebdd4c73077a.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"BaseRT is the fastest LLM runtime on Apple Silicon. Install it with one command and run local models on your own device.","zhDetail":"BaseRT 是专为 Apple Silicon 芯片打造的最快大语言模型运行环境。面向希望在本地设备上运行 AI 模型的开发者与隐私敏感用户，只需一条命令即可完成安装，让你在个人电脑上高效、安全地运行本地模型。"},{"rank":6,"name":"Rewisp — an ambient memory for your Mac","zhName":"Rewisp — Mac 的隐形记忆助手","url":"https://www.producthunt.com/products/rewisp-an-ambient-memory-for-your-mac","desc":"See it once. Ask forever.","zhDesc":"See it once. Ask forever.","tags":[],"upvotes":13,"icon":"https://ph-files.imgix.net/413f44d7-e072-432c-a554-3cb22db6825a.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Rewisp gives your Mac a memory. It reads your screen text on-device and remembers it for you. Catches promises like \"I'll send it Friday\" and reminds you until it's done. Ask \"what changed since Tuesday?\" and see exactly what's new. Search by meaning, not just words. Tracks numbers like weight or grades over time. Fills forms from your saved details — never passwords. One quiet 9 PM summary each day. Fully private: screenshots never saved, only text stays on your Mac.","zhDetail":"Rewisp 为 Mac 用户打造了一个本地化的“环境记忆”系统。它能实时读取屏幕上的文字并自动记住关键信息，比如“我周五发给你”这样的承诺，并持续提醒直到完成。你还可以通过语义搜索找回过去的内容、追踪体重或成绩等数据变化，所有文本仅保存在本地，截图从不留存，完全保护隐私。"},{"rank":7,"name":"1. ZooData","zhName":"ZooData","url":"https://www.producthunt.com/products/zoodata","desc":"The data layer for AI agents","zhDesc":"The data layer for AI agents","tags":[],"upvotes":595,"icon":null,"detail":"ZooData turns any URL into agent-ready JSON, so AI agents can work with structured data instead of raw HTML or bloated markdown. Use ~75% fewer LLM tokens, pay only for the fields you use, and skip extra extraction credits.Beyond extraction, ZooData gives agents pre-analyzed e-commerce intelligence — competitor, market, traffic, and consumer insights — live for Amazon and TikTok. API, CLI, and MCP server included. Start with 1,000 free credits, no card required.","zhDetail":"ZooData 是一款面向 AI 代理开发者的数据提取工具，能将任意网页 URL 转化为结构化的 JSON 数据，让 AI 代理直接使用干净字段而非原始 HTML 或臃肿的 Markdown。它可节省约 75% 的 LLM token 消耗，按需付费，无需额外提取积分；此外还提供亚马逊和 TikTok 的实时电商情报（竞品、市场、流量与消费者洞察），并支持 API、CLI 和 MCP 服务器。新用户可免费获得 1000 积分，无需绑定银行卡。"},{"rank":8,"name":"2. Clark","zhName":"Clark","url":"https://www.producthunt.com/products/clark-agent","desc":"An AI coworker with its own cloud computer","zhDesc":"An AI coworker with its own cloud computer","tags":[],"upvotes":471,"icon":null,"detail":"Clark is an AI coworker with its own cloud computer - browser, terminal, files, and code. Hand it a real task, close the tab, and come back to finished work: wide, sourced research; websites; spreadsheets; decks; audits; or tested code. It can fan work out to parallel specialists, run on a schedule, and return artifacts with the evidence behind them. Use Clark on web or mobile, work in real repositories with Clark Code, or embed the agent through an OpenAI-compatible API.","zhDetail":"Clark 是一款自带云端电脑的 AI 同事，拥有浏览器、终端、文件和代码环境。你只需交给它一个真实任务，关掉标签页，回来就能拿到完成的 function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
</body>
