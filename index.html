<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月16日</span>
        <span class="updated">更新于 01:40</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-17","updatedAt":"01:40","yesterday":[{"rank":1,"name":"Paradigm","zhName":"Paradigm","url":"https://www.producthunt.com/products/paradigm-3","desc":"Turn any goal into a personalized, adaptive learning path.","zhDesc":"Turn any goal into a personalized, adaptive learning path.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/7c1bc3e9-098d-4b10-9e5b-704460691d83.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Every interaction is graded as it happens, so what you walk away with is **proof of skill, not a transcript.** Anyone can build a course here; ours currently run from \"Speed-run ICS 31\" (UCI's intro programming, crammed) to \"Let's count to 10!\" (pre-K).","zhDetail":"Paradigm 是一款面向学习者和教育者的技能评估平台，它通过实时对每一次互动进行评分，让用户获得的是技能证明而非传统成绩单。无论是大学生快速掌握编程入门课，还是学龄前儿童学习数数，任何人都能在这里创建课程，并以实际能力展示学习成果。"},{"rank":2,"name":"Zro","zhName":"Zro","url":"https://www.producthunt.com/products/zro","desc":"Private inference for coding agents","zhDesc":"Private inference for coding agents","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/fdeb7f10-d431-4e5f-a031-99486525980a.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Over the last year, we've been obsessed with one problem: making AI inference faster and more efficient. As we worked with developers building AI products, we kept seeing the same tradeoff:","zhDetail":"Zro 是一款专为 AI 开发者设计的推理加速工具，旨在解决 AI 推理过程中速度与效率难以兼得的痛点。它通过优化底层计算流程，帮助开发者在保持模型精度的同时显著提升推理速度，降低资源消耗。"},{"rank":5,"name":"River","zhName":"River","url":"https://www.producthunt.com/products/river-9","desc":"AI account executives that demo and close B2B deals","zhDesc":"AI account executives that demo and close B2B deals","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/4812de77-60d4-48b2-a975-d67b1daab214.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"On going off-script: she's not branching through a tree, she's demoing live and answering the actual stack question based on your previous sales calls call transcripts. Where she's weakest is genuinely novel edge cases. She'd rather say she'll get you the right person than invent an integration we don't have.","zhDetail":"River 是一款面向销售团队的 AI 助手，能够基于过往销售通话记录，在实时演示中直接回答客户关于技术栈的具体问题，而非机械地按预设脚本分支推进。它避免了编造不存在的集成功能，在遇到全新边缘案例时，会主动表示将为您对接合适的人选，从而提升沟通的真实性与信任度。"},{"rank":6,"name":"Nitrosend","zhName":"Nitrosend","url":"https://www.producthunt.com/products/nitrosend","desc":"Email for AI agents. They sign up, send and reply.","zhDesc":"Email for AI agents. They sign up, send and reply.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/7c3c2563-9ec0-4601-af38-5f93591072b4.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The bit I'm proudest of is Agent Inboxes (beta): real addresses for your agents on the domain you own, created BY your agent, like [ernest@yourcompany.com](mailto:ernest@yourcompany.com), [sylvia@yourcompany.com](mailto:sylvia@yourcompany.com). They send, receive and hold 1-1 conversations with your customers, and escalate to a human when it matters. Gmail actively fights this. we built the place where it's native. Because very soon this will be table stakes for your agent, so we're shipping it now.","zhDetail":"Nitrosend 面向使用 AI 代理（Agent）的企业团队，解决了 AI 代理无法像真人一样通过邮件与客户进行一对一沟通的问题。它为你拥有的域名下的每个代理创建专属的真实邮箱地址（如 ernest@yourcompany.com），让代理能自主收发邮件、与客户对话，并在必要时无缝升级给人工客服。"},{"rank":7,"name":"Nuvio","zhName":"Nuvio","url":"https://www.producthunt.com/products/nuvio-2","desc":"Connect your X bio to your MRR and GA4 for auto updates","zhDesc":"Connect your X bio to your MRR and GA4 for auto updates","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/9b3e153a-9453-4e13-8b08-facf22d2a3dd.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Tired of outdated or hand-typed metrics in your X profile? Nuvio connects to Stripe, Google Analytics, and Search Console to auto-update your bio and banner with real, verified revenue and traffic stats. Built for founders and indie makers aiming to grow trust and stand out with live social proof. No manual edits—just authentic numbers that prove your progress.","zhDetail":"Nuvio 是一款面向创业者和独立开发者的社交资料自动更新工具。它能将你的 Stripe、Google Analytics 和 Search Console 数据直接同步到 X 个人简介和封面图中，自动展示真实的收入与流量数据，帮你用实时、可信的社会证明建立信任、脱颖而出，无需手动修改。"},{"rank":8,"name":"Manta AI","zhName":"Manta AI","url":"https://www.producthunt.com/products/manta-ai","desc":"Your AI agent for autonomous web app testing","zhDesc":"Your AI agent for autonomous web app testing","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/a1e87f70-9bb6-40a1-ad3b-24a2acb1cb86.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Manta AI is an autonomous testing agent for web applications. Give it a URL and it explores your app the way a real user would — mapping flows, finding bugs, and generating self-healing test cases. Describe a flow in plain English and Manta tests it for you, no script required. When your UI changes, the tests adapt on their own. Run the agent locally on any machine or server — test apps behind a firewall, on a private network, or even on localhost. Free tier open. No card required.","zhDetail":"Manta AI 是一款面向 Web 应用开发者和测试工程师的自动化测试代理。只需提供一个网址，它就能像真实用户一样探索你的应用，自动映射操作流程、发现 Bug 并生成可自我修复的测试用例。你只需用自然语言描述一个流程，无需编写脚本，Manta 就能自动执行测试；当 UI 发生变化时，测试用例也会自动适应。你可以在本地任意机器或服务器上运行该代理，甚至能测试防火墙后、私有网络或 localhost 上的应用，免费使用，无需绑定信用卡。"},{"rank":11,"name":"Graft AI","zhName":"Graft AI","url":"https://www.producthunt.com/products/graft-ai","desc":"Turn company operations into a living map for agents","zhDesc":"Turn company operations into a living map for agents","tags":[],"upvotes":null,"icon":null,"detail":"Most agent tools assume clean APIs. Graft starts where companies actually work: legacy apps, internal tools, and workflows trapped behind screens. It learns how the work gets done, turns it into a living operational map, and gives agents stable tools with permissions, approvals, audit trails, and verification built in. When the underlying UI changes, Graft detects the drift and repairs the workflow without breaking the agent interface.","zhDetail":"Graft AI 专为那些依赖老旧系统、内部工具和屏幕后工作流的企业团队设计，解决传统智能体工具无法对接非标准API环境的痛点。它通过自主学习现有操作流程，生成动态运营地图，并为智能体提供内置权限、审批、审计追踪和验证的稳定工具。当底层界面发生变化时，Graft能自动检测偏差并修复工作流，确保智能体接口不受影响。"},{"rank":12,"name":"Weave","zhName":"Weave","url":"https://www.producthunt.com/products/weave-9","desc":"Think out loud and watch it become a living map.","zhDesc":"Think out loud and watch it become a living map.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/71236fdd-2afc-423a-ace4-3a9a71205564.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Congrats on Weave. The live map feels more useful than a plain transcript because it keeps the structure of the thinking, not just the words. The pause-triggered questions are a nice touch too. Curious how you handle messy spoken thoughts: do you preserve the original phrasing anywhere, or only the cleaned-up cards and connections?","zhDetail":"Weave 是一款面向知识工作者和创意人士的思维可视化工具，它通过实时地图而非纯文字记录来保留思考的结构。当用户暂停时，系统会自动触发提问，帮助梳理混乱的口头思绪，并以卡片和连接的形式呈现清晰、可编辑的思维网络。"},{"rank":13,"name":"Cito","zhName":"Cito","url":"https://www.producthunt.com/products/cito","desc":"Hybrid academic search over 236M papers, built for agents","zhDesc":"Hybrid academic search over 236M papers, built for agents","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/677b3e02-bbe3-435e-8baa-3f4ae9aaabdc.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"2.   Search is the metered part. Paper lookups aren't: /paper/batch takes up to 1000 IDs in a single call. In a real literature research pass, most of your volume is resolving and hydrating references, not issuing new queries, so the 100 tends to go a lot further than the raw number suggests. There's also /search/batch (50 queries per request), which cuts round trips, though each query still counts against the 100.","zhDetail":"Cito 是一款面向科研文献研究者的 API 工具，旨在解决传统文献检索中单次查询数量有限、往返请求过多的问题。它通过提供批量查询接口（如 /paper/batch 一次最多处理 1000 个文献 ID、/search/batch 一次处理 50 个查询），让用户在一次调用中完成大量引用解析与数据补充，从而大幅减少请求次数、提升研究效率。"},{"rank":14,"name":"Verse","zhName":"Verse","url":"https://www.producthunt.com/products/verse-6","desc":"Build and hire autonomous AI employees from a single prompt","zhDesc":"Build and hire autonomous AI employees from a single prompt","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/98232f9d-3f9a-47e4-8c9f-a79ae12cdd8e.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Verse allows anyone to build and hire autonomous AI employees from a single prompt. Every employee comes with its own computer, email inbox, phone number, browser, wallet, crypto wallet, Slack account, identity, memory, and persistent intelligence, allowing it to work independently on your behalf 24/7. Chat with them, call them, assign them tasks, or place them in shared Spaces where teams of AI employees collaborate, delegate work, and solve complex problems together.","zhDetail":"Verse 让任何人都能通过一句指令创建并雇佣自主工作的AI员工。每位AI员工都拥有独立的电脑、邮箱、手机号、浏览器、钱包、加密钱包、Slack账号、身份、记忆和持续智能，可全天候独立为你工作。你可以与它们聊天、打电话、分配任务，或将它们放入共享空间，让AI员工团队协作、委派任务并共同解决复杂问题。"},{"rank":15,"name":"dot.","zhName":"dot.","url":"https://www.producthunt.com/products/dot-7","desc":"The feedback layer for anything you build with AI.","zhDesc":"The feedback layer for anything you build with AI.","tags":[],"upvotes":null,"icon":null,"detail":"dot. fixes that. Create a project for any URL or Claude artifact, anyone can click anywhere on the live page and pin feedback. No signup, no extension, nothing to install. Built something in Claude? Say \"add dot. feedback to my artifact\" and dot. turns it into a shareable page, nothing to deploy. Iterate your artifact and the review link stays the same; feedback stays attached to the version it was left on.","zhDetail":"dot. 是一款面向开发者与产品团队的轻量级反馈工具，无需注册、安装任何插件即可在任意网页或 Claude 产物上直接点击并钉选反馈。它解决了项目协作中反馈流程繁琐、版本混乱的问题——只需在 Claude 中说一句“给我的产物加上 dot. 反馈”，就能将产物转为可分享页面，且每次迭代后反馈仍自动关联对应版本。"},{"rank":16,"name":"Amami","zhName":"Amami","url":"https://www.producthunt.com/products/amami","desc":"Analytics that lives inside your AI assistant","zhDesc":"Analytics that lives inside your AI assistant","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ae714528-281b-4e00-8d5d-f994eeafca69.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"I built Amami because I was tired of tab-switching between Cursor and a browser tab just to check how many people visited my site. Amami is privacy-first analytics with native MCP support — you literally ask Codex/Claude \"how's my traffic?\" and get answers + recommendations without leaving your editor. No cookies, no consent banners, <2KB script. Start to use it now !","zhDetail":"Amami 是一款面向开发者的隐私优先网站分析工具，解决了在代码编辑器与浏览器之间频繁切换查看网站访问量的痛点。它通过原生 MCP 支持，让你直接在 Cursor 或 Claude 等编辑器中用自然语言询问流量情况并获取建议，无需离开工作环境，且无需 Cookie 或同意弹窗，脚本体积小于 2KB。"}],"today":[],"weekly":[{"rank":1,"name":"AnySearch","zhName":"AnySearch","url":"https://www.producthunt.com/products/anysearch","desc":"Real-time structured search trusted by agents and developers","zhDesc":"Real-time structured search trusted by agents and developers","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/d7e5bffe-bacb-4118-a8e4-1bfbdf7c531e.x-icon?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Been using it to feed context into a couple of agent workflows instead of a plain search API. The information-density ranking actually shows in practice - fewer near-duplicate passages taking up context, more distinct facts per query. Setup was quick and the API is straightforward to wire into an existing pipeline.","zhDetail":"AnySearch 是一款面向 AI 代理工作流的高密度信息搜索 API，专为需要从海量结果中提取精准、非重复事实的开发者和 AI 工程师设计。它通过信息密度排序算法，自动过滤近似的重复段落，让每次查询都能在有限的上下文窗口中呈现更多独特事实，从而提升代理系统的推理效率。该 API 设置简单，可快速接入现有数据管道。"},{"rank":2,"name":"ExploreYC","zhName":"ExploreYC","url":"https://www.producthunt.com/products/yc-company-explorer","desc":"Open-source API for Y Combinator & a16z company data","zhDesc":"Open-source API for Y Combinator & a16z company data","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0affb3fc-9a19-4185-9db7-b6ff3aa445ed.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Explore 5,773+ Y Combinator companies with powerful search, interactive maps, AI-powered company intelligence, hiring insights, funding data, and batch analytics. Find co-founders, validate startup ideas, and discover patterns across 20 years of YC history.","zhDetail":"ExploreYC 是一款面向创业者、投资人和研究者的 YC 公司探索工具。它通过强大的搜索、交互式地图、AI 公司情报、招聘洞察和融资数据，帮助用户快速查找 5,773+ 家 YC 公司，寻找联合创始人、验证创业想法，并发现过去 20 年 YC 历史中的模式与趋势。"},{"rank":4,"name":"ChatCut","zhName":"ChatCut","url":"https://www.producthunt.com/products/chatcut-ai-video-editor","desc":"Your AI video editor in ChatGPT, desktop, and web","zhDesc":"Your AI video editor in ChatGPT, desktop, and web","tags":[],"upvotes":null,"icon":null,"detail":"ChatCut is a lightweight, professional-grade AI video editor anyone can use, even without editing experience. It’s like having a personal video editing assistant that understands your footage, intent, and timeline. Make structural edits, fine-tune cuts, add captions, B-roll, music, voiceover, motion graphics, stock footage, and AI-generated video in one place. Every edit stays editable on a real timeline, with XML export when you want to keep working elsewhere.","zhDetail":"ChatCut 是一款轻量级、专业级的 AI 视频编辑器，即使没有剪辑经验也能轻松上手。它像一位懂你素材、意图和时间线的私人剪辑助手，让你在同一个界面中完成结构剪辑、精细裁剪、添加字幕、B-roll、音乐、旁白、动态图形、素材库视频以及 AI 生成视频。所有编辑操作在真实时间线上保持可修改，并支持导出 XML 文件，方便你后续在其他软件中继续工作。"},{"rank":5,"name":"Sim","zhName":"Sim","url":"https://www.producthunt.com/products/sim-studio","desc":"Open-source workspace for AI agents and workflows","zhDesc":"Open-source workspace for AI agents and workflows","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/5029d16f-7b85-4364-aae4-f770cfab1fc1.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Sim is an open-source workspace to build agentic workflows. Connect your AI agents and workflows to 1,000+ integrations and LLMs.","zhDetail":"Sim 是一个开源工作空间，专为需要构建智能体工作流的开发者与团队设计。它解决了 AI 智能体与各类工具、模型之间难以高效协同的问题，通过连接 1000 多种集成和大型语言模型，让用户能快速搭建并运行自动化工作流。"},{"rank":6,"name":"PlugThis","zhName":"PlugThis","url":"https://www.producthunt.com/products/plugthis-chrome-extension-generator","desc":"Create your own Chrome Extensions by chatting with AI","zhDesc":"Create your own Chrome Extensions by chatting with AI","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/e7926699-f5cb-4025-928b-93fed22bb291.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The focus on one narrow thing is what stands out here, since Lovable and Bolt genuinely do fall apart once you hit manifest files and content scripts. Curious how it handles permission scoping, since that's usually where generated extensions either ask for way more access than they need or break silently when Chrome tightens something. Also, since the code is yours to download, does switching between chat refinement and hand editing the code directly cause any drift, or does it stay in sync both ways.","zhDetail":"PlugThis 是一款面向 Chrome 扩展开发者的 AI 辅助工具，专门解决使用 Lovable 或 Bolt 等通用工具时，在 manifest 文件和 content scripts 等细节上容易出错的问题。它通过聚焦于扩展开发的狭窄场景，帮助开发者更精准地处理权限范围、代码同步等痛点，并允许用户自由下载代码，在 AI 对话优化与手动编辑之间保持双向同步。"},{"rank":7,"name":"Miora","zhName":"Miora","url":"https://www.producthunt.com/products/miora-2","desc":"Scale your creativity on editable canvas with agent memory","zhDesc":"Scale your creativity on editable canvas with agent memory","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/eecc5bf5-4f75-442b-9030-aca7cb7d770b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Memory is the part we most want to dig into. As you work, Miora quietly remembers your style and each project's rules, and it's no black box: you can view, edit and add to any of it. So the first brief generates; every one after is continuous creation built on your context. The deeper you go, the more it gets you.","zhDetail":"Miora 是一款面向创意工作者和内容创作者的 AI 记忆助手，它能默默记住你的工作风格和每个项目的规则，让你无需重复说明背景。与黑箱式 AI 不同，你可以随时查看、编辑和补充它的记忆，从而让每一次创作都基于已有上下文持续演进，越用越懂你。"},{"rank":8,"name":"JustVibe","zhName":"JustVibe","url":"https://www.producthunt.com/products/justvibe","desc":"The search engine for doing, with apps built for you","zhDesc":"The search engine for doing, with apps built for you","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/d188283d-ca82-4a07-90ae-122af14bf13d.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"JustVibe is a free search engine, built to help get things done. Search \"plan my 5 day trip to tokyo\" and instantly receive a fully functional and interactive trip planner, perfectly set up for Tokyo and running directly in your browser. If your perfect app doesn't exist yet, JustVibe builds a custom one for your exact needs in minutes. Every app is yours to keep forever, with zero code. Chat to customize every detail and share your new app with a single link.","zhDetail":"JustVibe 是一款免费搜索引擎，专为帮助用户高效完成任务而设计。例如，搜索“规划我的东京5日游”，即可立即获得一个功能完整、可交互的行程规划器，直接在浏览器中运行。如果现有应用无法满足你的需求，JustVibe 能在几分钟内为你生成一个完全定制化的专属应用，无需编写任何代码，且永久归你所有。你还可以通过聊天调整每个细节，并通过一个链接轻松分享你的新应用。"},{"rank":9,"name":"Timbal AI","zhName":"Timbal AI","url":"https://www.producthunt.com/products/timbal-ai","desc":"Build AI agents, workflows, and apps in one stack","zhDesc":"Build AI agents, workflows, and apps in one stack","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/8dd7e2e3-5921-48ee-88c6-05218bd07b93.gif?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","zhDetai let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
