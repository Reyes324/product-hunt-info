<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月22日</span>
        <span class="updated">更新于 10:26</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-23","updatedAt":"10:26","yesterday":[{"rank":3,"name":"Migma AI","zhName":"Migma AI","url":"https://www.producthunt.com/products/migma-ai","desc":"AI runs your email marketing. Better with every send.","zhDesc":"AI runs your email marketing. Better with every send.","tags":[],"upvotes":null,"icon":null,"detail":"Migma creates full campaigns before you ask. It understands your goals and events, creates every email, personalizes and localizes it, and renders consistently across inboxes. It handles sending, preferences and compliance, then learns what drives revenue.","zhDetail":"Migma AI 是一款面向营销团队的全自动邮件营销工具，能够在用户提出需求前自动生成完整的营销活动。它理解你的目标和活动信息，创建每一封邮件并进行个性化与本地化处理，确保在不同收件箱中呈现一致，同时自动处理发送、偏好设置与合规要求，并持续学习哪些策略能带来更高收入。"},{"rank":4,"name":"Kastra","zhName":"Kastra","url":"https://www.producthunt.com/products/kastra","desc":"Runtime authorization for Claude, Cursor, Codex and OpenClaw","zhDesc":"Runtime authorization for Claude, Cursor, Codex and OpenClaw","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/3d168980-ac1e-45d2-873b-c16d22e5fe51.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"That's Kastra. Every agent action is evaluated against policy and gets an allow or deny decision in under a millisecond. When something needs a human review, that approval now completes in about a second, across our desktop app, web console, and macOS notifications. We reduce that number down every week, and it changes how the product feels. Sub 1ms latency means human-in-the-loop authorization is practical, not theoretical. Kastra is neutral and deterministic across the stack and works with the tools you already use.","zhDetail":"Kastra 是一款面向企业安全团队的实时授权引擎，能够在毫秒内对每个AI代理操作进行策略评估并做出允许或拒绝的决策。当需要人工审核时，通过桌面应用、网页控制台和macOS通知，审批流程可在一秒内完成。它解决了AI代理行为中“人在回路”授权延迟高、难以落地的问题，让安全策略执行变得快速、确定且与现有工具兼容。"},{"rank":5,"name":"box","zhName":"Box","url":"https://www.producthunt.com/products/box-4","desc":"Simple computers for agent w/ full VMs","zhDesc":"Simple computers for agent w/ full VMs","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c7141a71-763e-46f4-b906-dcd6ec83a8b6.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Box offers the simplest, cheapest cloud computers for agents, thought for builders of agentic platforms & software factories. Run 'box new' in your terminal, in 2s get a beefy ubuntu VM, with admin rights, a desktop, ssh access. At $0.036/hr it is 10x less expensive than the likes of E2B, Daytona, Modal, so you can run more agents, or run them longer. Run up to 1000 concurrent boxes fully self-served, or ask us for more, with same-day support from the founders.","zhDetail":"Box 为构建智能体平台和软件工厂的开发者提供最简单、最便宜的云端计算机。只需在终端输入“box new”，2秒内即可获得一台配置强大的 Ubuntu 虚拟机，拥有管理员权限、桌面环境和 SSH 访问。每小时仅需0.036美元，价格比 E2B、Daytona、Modal 等同类产品便宜10倍，让你能运行更多智能体或延长运行时间。"},{"rank":6,"name":"ACME.BOT","zhName":"ACME.BOT","url":"https://www.producthunt.com/products/acme-bot","desc":"No-slop AI SEO agent that interviews you first","zhDesc":"No-slop AI SEO agent that interviews you first","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/433758e7-43f2-4247-9527-9d6424a8e3ad.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"ACME.BOT turns your expertise into no slop SEO articles. Answer a few questions on a topic (from your phone) and your first-hand experience shapes your blog post. AI handles the boring stuff. Like keyword research, illustrations, references, internal linking, and publishing cadence. Create helpful non-commodity content that also satisfies Google's EEAT requirements.","zhDetail":"ACME.BOT 帮助行业专家将自身经验快速转化为高质量 SEO 文章。你只需在手机上回答几个关于某个主题的问题，AI 就会自动完成关键词研究、配图、引用、内链和发布节奏等繁琐工作，最终生成既符合 Google EEAT 标准、又具有独特价值的原创内容。"},{"rank":11,"name":"Arkor","zhName":"Arkor","url":"https://www.producthunt.com/products/arkor","desc":"Fine-tune and Deploy Open-weight Models in TypeScript","zhDesc":"Fine-tune and Deploy Open-weight Models in TypeScript","tags":[],"upvotes":null,"icon":null,"detail":"Start a real LLM training in 10 minutes. Tell Claude Code or Codex what the model is for; they prepare the datasets and create the training project. Click \"Run Training\" in the local studio. Arkor runs the training, and deploys the trained model as an OpenAI-compatible API. Think Next.js and Vercel for fine-tuning: code you can review, infrastructure you do not have to manage, and a model your app can call. No GPU setup. No ML expertise required. No Python training code to write.","zhDetail":"Arkor 让开发者无需 GPU 配置或机器学习专业知识，即可在 10 分钟内启动真实的 LLM 训练。你只需告诉 Claude Code 或 Codex 模型的用途，它们会自动准备数据集并创建训练项目；在本地工作室点击“运行训练”后，Arkor 完成训练并将模型部署为兼容 OpenAI 的 API。它就像微调领域的 Next.js 和 Vercel：代码可审查、基础设施无需管理、模型可直接被你的应用调用，且无需编写任何 Python 训练代码。"},{"rank":13,"name":"Grindoro","zhName":"Grindoro","url":"https://www.producthunt.com/products/grindoro","desc":"Focus with others through synchronized Pomodoro sessions","zhDesc":"Focus with others through synchronized Pomodoro sessions","tags":[],"upvotes":null,"icon":null,"detail":"The synchronized-session angle is smart because most Pomodoro apps optimize solo discipline, not the show-up-with-others part. I would be curious to see a lightweight post-session recap that separates planned focus time from completed rounds, so the social energy helps accountability without turning the app into another streak-pressure machine.","zhDetail":"Grindoro 是一款面向需要与他人同步专注的用户的番茄钟应用。它解决了传统番茄钟只强调个人自律、缺乏同伴监督的问题，通过同步专注时段让用户与朋友或团队一起“到场”工作。其社交能量有助于提升责任感，同时避免变成又一个制造打卡压力的工具。"},{"rank":14,"name":"Redential","zhName":"Redential","url":"https://www.producthunt.com/products/redential","desc":"A developer credential that proves what you built, NDA safe.","zhDesc":"A developer credential that proves what you built, NDA safe.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ed96b062-a172-4ca3-a014-2512affb1e53.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Your best work is probably under an NDA, so nobody can see it. Nobody trusts CVs anymore, they are so fakeable. Redential reads your git history on your own machine and turns it into a profile of what you actually built. Never your code, and you see exactly what gets shared before it does. Then you defend it live, answering questions about your own work. The result: a credential recruiters can trust more than a CV. The CLI is free and open source.","zhDetail":"Redential 是一款面向开发者的开源 CLI 工具，它通过读取你本机的 Git 历史记录，将你实际参与的项目贡献转化为可信的能力档案，解决简历造假和 NDA 项目无法展示的痛点。你可以在本地预览并控制分享内容，随后通过实时问答向招聘方证明自己的真实工作成果，从而获得比传统简历更受信任的凭证。"},{"rank":16,"name":"Lattics","zhName":"Lattics","url":"https://www.producthunt.com/products/lattics-2","desc":"Brain-like knowledge base with AI writing & deep research","zhDesc":"Brain-like knowledge base with AI writing & deep research","tags":[],"upvotes":null,"icon":null,"detail":"the privacy-first local storage plus AI writing combo is the part I'd want more detail on - the moment I right-click and ask for a rewrite or start an AI chat, that selection has to leave the machine to reach whatever model is doing the work, right? curious whether that's opt-in per action, and whether there's ever a local/offline model option for people who picked this specifically for the local-storage privacy angle in the first place.","zhDetail":"Lattics 是一款面向注重隐私的写作者的本地存储与 AI 写作组合工具。它解决了用户在写作时担心数据外泄的问题——通过将内容默认保存在本地，并在用户主动选择时才会将选中文本发送至 AI 模型处理，同时支持本地/离线模型选项，让隐私保护更加可控。"}],"today":[],"weekly":[{"rank":1,"name":"ClawTeams","zhName":"ClawTeams","url":"https://www.producthunt.com/products/clawteams","desc":"The first goal-driven, proactive AI team for e-commerce","zhDesc":"The first goal-driven, proactive AI team for e-commerce","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/8cf8434d-e4fd-48c3-8654-af7f9e5bc2d5.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"ClawTeams is an AI employee platform for e-commerce sellers. Instead of hiring specialists—or doing everything yourself—you get a coordinated AI team that thinks, plans, and executes like real employees. One goal. One team. Zero micromanagement. Tell your team lead what you want—\"Increase Q4 revenue by 20%\"—and they break it down, assign specialists, and run the plan. You get updates in Slack or Discord. High-stakes decisions wait for your approval. Everything else just happens.","zhDetail":"ClawTeams 是一款面向电商卖家的 AI 员工平台。你无需雇佣专家或亲力亲为，只需向 AI 团队负责人下达目标（如“Q4 营收增长 20%”），系统便会自动拆解任务、分配专业 AI 成员并执行计划，通过 Slack 或 Discord 汇报进展，关键决策留给你审批，其余工作自动完成。"},{"rank":2,"name":"Paradigm","zhName":"Paradigm","url":"https://www.producthunt.com/products/paradigm-3","desc":"Turn any goal into a personalized, adaptive learning path.","zhDesc":"Turn any goal into a personalized, adaptive learning path.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/7c1bc3e9-098d-4b10-9e5b-704460691d83.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Every interaction is graded as it happens, so what you walk away with is **proof of skill, not a transcript.** Anyone can build a course here; ours currently run from \"Speed-run ICS 31\" (UCI's intro programming, crammed) to \"Let's count to 10!\" (pre-K).","zhDetail":"Paradigm 是一款面向学习者和教育者的技能证明平台，它解决了传统课程只提供成绩单、无法真实反映能力的问题。通过实时评分每一次互动，用户最终获得的是可验证的技能证明，而非简单的学习记录。任何人都能在此创建课程，内容涵盖从大学编程速成到学龄前基础认知。"},{"rank":3,"name":"Pazi","zhName":"Pazi","url":"https://www.producthunt.com/products/pazi","desc":"Vibe code business operations","zhDesc":"Vibe code business operations","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0cc238aa-08c3-4d44-a509-0289f8806019.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Pazi is an AI team for that idea you keep coming back to — a book, a shop, an app, a skill you want to sell. Tell Pazi what you're trying to do and it builds a team of agents around your idea and starts making things happen: a website, first outreach, content, the next step. Every time you come back, something has moved. You stay in control; your team does the rest alongside you, one real step at a time. Like vibe coding but for business operations.","zhDetail":"Pazi 是一个面向创业者的 AI 团队，专为那些你反复想起却迟迟未动手的想法而生——无论是写书、开店、做应用还是卖技能。你只需告诉 Pazi 你想做什么，它就会围绕你的想法组建一支智能代理团队，自动推进网站搭建、首次客户触达、内容创作等具体任务。每次你回来查看，事情都在向前推进，你始终掌握控制权，团队则与你并肩一步步落地执行，就像“氛围编程”但用于商业运营。"},{"rank":4,"name":"V2Fun","zhName":"V2Fun","url":"https://www.producthunt.com/products/v2fun","desc":"Generate 3D character with 8K textures and AI motion capture","zhDesc":"Generate 3D character with 8K textures and AI motion capture","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/1ae953dd-1691-4d3d-8eed-f970b24c8131.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"V2Fun is an AI 3D creation platform built with self-developed 3D modeling and AI motion capture models. It helps creators turn images, prompts, and videos into high-quality 3D models, enhance assets with advanced 8K texture generation, and create motion-ready characters without switching between separate modeling, texturing, and mocap tools. V2Fun also supports image generation through models including Nano Banana and others, so creators can explore visual concepts and bring them into 3D faster.","zhDetail":"V2Fun 是一个基于自研3D建模与AI动作捕捉模型的AI 3D创作平台，帮助创作者将图片、文字提示和视频快速转化为高质量3D模型，并支持8K纹理生成与动作绑定。它整合了建模、贴图和动捕功能，无需在多个工具间切换，同时内置Nano Banana等模型支持图像生成，让创作者能更快地探索视觉概念并落地为3D作品。"},{"rank":5,"name":"AgentKey","zhName":"AgentKey","url":"https://www.producthunt.com/products/agentkey","desc":"One-stop live data marketplace for your agent","zhDesc":"One-stop live data marketplace for your agent","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/32195c39-aa7c-4a77-ab44-99d4b66f866e.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Per-provider override is the right call - keeping routing and failover while letting me bring a key for the providers I already pay for is the best of both. Two things I would want to know before wiring it in: if my own key hits a rate limit or 5xx, does failover fall back to the hosted pool for that provider automatically, or does a BYO provider opt out of the pool entirely? And does spend on my own key still surface in the same unified usage view, or split into separate billing I have to reconcile myself?","zhDetail":"AgentKey 面向需要管理多个 AI 服务商 API 密钥的开发者和团队。它解决了在不同提供商之间手动切换密钥、处理路由与故障转移的痛点，让用户既能使用自己已付费的密钥，又能自动享受托管池的备用能力。用户只需配置一次，即可在统一视图下监控所有密钥的使用情况，无需担心限流或服务中断。"},{"rank":6,"name":"Osaurus","zhName":"Osaurus","url":"https://www.producthunt.com/products/osaurus","desc":"Open source agents that run 100% locally on your Mac","zhDesc":"Open source agents that run 100% locally on your Mac","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c784cd19-34af-4e58-bca7-584c59e1a47b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"We started as [Dinoki](https://dinoki.ai/), a 5MB desktop dinosaur, and grew into a full agent platform through open source community feedback. Now at **7K+ GitHub stars and 175K+ downloads** — all by word of mouth.","zhDetail":"Osaurus 是一款面向开发者和技术团队的开源智能体平台，帮助用户从零构建、部署和管理 AI 自动化工作流。它最初是一个仅 5MB 的桌面小恐龙工具，经过社区反馈迭代，现已支持完整的智能体编排，让用户无需复杂配置即可快速实现任务自动化。"},{"rank":7,"name":"Velo 3.0","zhName":"Velo 3.0","url":"https://www.producthunt.com/products/velo-4","desc":"AI video infrastructure to explain, train, and sell faster.","zhDesc":"AI video infrastructure to explain, train, and sell faster.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/5a395b78-27ac-4662-9eac-cb5ce89d165c.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"It s spread across documents, help centers, PDFs, slack messages and thousands of everyday conversations.","zhDetail":"Velo 3.0 是一款面向团队和知识工作者的信息聚合与检索工具，旨在解决企业知识散落在文档、帮助中心、PDF、Slack 消息及日常对话中难以统一查找的问题。它通过智能索引和自然语言搜索，将分散的信息整合到一个平台，让用户能快速从海量内部内容中精准找到所需答案。"},{"rank":12,"name":"Zro","zhName":"Zro","url":"https://www.producthunt.com/products/zro","desc":"Private inference for coding agents","zhDesc":"Private inference for coding agents","tags":[],"upvotes":null,"icon":null,"detail":"Fast and optimized open-model inference on multi-region infrastructure with zero request retention.","zhDetail":"Zro 面向需要高性能、低延迟推理的 AI 开发者与团队，提供基于多区域基础设施的快速开源模型推理服务，并承诺零请求留存，确保数据隐私安全。用户只需调用 API 即可在分布式节点上获得优化后的模型响应，无需自建复杂架构。"},{"rank":13,"name":"Clark","zhName":"Clark","url":"https://www.producthunt.com/products/clark-agent","desc":"An AI coworker with its own cloud computer","zhDesc":"An AI coworker with its own cloud computer","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/84341329-a328-4857-9d47-4ba180352bfd.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Clark is an AI coworker with its own cloud computer - browser, terminal, files, and code. Hand it a real task, close the tab, and come back to finished work: wide, sourced research; websites; spreadsheets; decks; audits; or tested code. It can fan work out to parallel specialists, run on a schedule, and return artifacts with the evidence behind them. Use Clark on web or mobile, work in real repositories with Clark Code, or embed the agent through an OpenAI-compatible API.","zhDetail":"Clark 是一款自带云端电脑（浏览器、终端、文件与代码）的 AI 同事。你只需交给它一个真实任务，关闭标签页，回来就能拿到完成的工作——包括广泛且有来源的研究、网站、表格、演示文稿、审计报告或经过测试的代码。它能将任务分发给多个并行专家、按计划自动运行，并返回带有证据链的成果，支持网页端、移动端、真实代码仓库协作，以及通过兼容 OpenAI 的 API 嵌入使用。"},{"rank":15,"name":"Campus","zhName":"Campus","url":"https://www.producthunt.com/products/flutterflow","desc":"One project space for humans and AI agents","zhDesc":"One project space for humans and AI agents","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/f00d0948-3886-474b-870c-48e89e8b2fb3.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Reviewers largely see FlutterFlow as a fast, capable app builder that helps non-developers and small teams launch real products quickly, with a strong visual builder, useful integrations, and room for custom code when needed. Many say it speeds up iteration and can handle production apps, especially for simpler use cases. The main complaints are recurring bugs, weak debugging, slow or uneven support, and pricing changes that put key features behind paywalls. Several reviewers also say complexity, performance, and publishing workflows can become painful as projects grow.","zhDetail":"Campus 是一款面向非开发者和小型团队的低代码应用构建工具，旨在帮助他们快速将产品创意变为现实。它通过强大的可视化构建器、丰富的集成能力以及必要时支持自定义代码的方式，大幅缩短迭代周期，让用户无需深厚编程背景也能交付可上线的应用。"}],"monthly":[{"rank":1,"name":"Fundraisly","zhName":"Fundraisly","url":"https://www.producthunt.com/products/fundraisly","desc":"AI fundraising agent that finds investors and books meetings","zhDesc":"AI fundraising agent that finds investors and books meetings","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/50c29b3a-45e5-4eb3-82a6-247714b5e6d9.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Fundraisly: AI-native fundraising system. It built the most complete investors database of 300k+ and analyzes millions of deals to identify the investors actively backing companies in your space, stage, and geography. It maps warm paths to them from your own network and then covers the rest with targeted outreach. The result: 10-50 qualified investor meetings on your calendar in 90 days. Built by founders who raised over $1B.","zhDetail":"Fundraisly 是一款面向创业者的 AI 原生融资系统。它基于超过 30 万投资人的数据库，分析数百万笔交易，精准锁定与你所在领域、阶段和地域匹配的活跃投资人。系统还能从你的社交网络中挖掘“温暖路径”，并辅以定向触达，帮助你在 90 天内安排 10-50 场高质量投资人会议。"},{"rank":2,"name":"Goldfish","zhName":"Goldfish","url":"https://www.producthunt.com/products/goldfish-early-access","desc":"Press Option. It knows your work and replies like you","zhDesc":"Press Option. It knows your work and replies like you","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c42a4d06-2035-4c13-b95d-02f34f14ba7c.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Most AI tools make you explain the context before they can help. Goldfish already has it. It privately remembers what you’ve been working on across your Mac, then helps you write better from any app. Press Option in a text field to draft replies, summarize threads, rewrite sentences, or recall important details from your recent work without copying, pasting, or re-explaining the whole backstory.","zhDetail":"Goldfish 是一款面向 Mac 用户的 AI 写作助手，它能私密地记住你在电脑上的工作上下文，省去反复解释背景的麻烦。只需在任意文本框中按下 Option 键，即可快速起草回复、总结线程、改写句子或回忆近期工作细节，无需复制粘贴或重复说明前因后果。"},{"rank":4,"name":"Bond","zhName":"Bond","url":"https://www.producthunt.com/products/bond-12","desc":"The AI to-do list that does itself","zhDesc":"The AI to-do list that does itself","tags":[],"upvotes":null,"icon":null,"detail":"Bond is an AI Chief of Staff for executives. It connects to your tools, learns how your company works, and turns scattered tasks into a self-managing to-do list that always knows what you need to do next. You can ask Bond to prepare you for your next meeting, draft a follow-up, send an email, create action items, identify blockers, surface risks, or delegate tasks to team members.","zhDetail":"Bond 是一款面向高管的 AI 行政助手。它能连接你的工作工具，学习公司的运作方式，将零散的任务转化为自动管理的待办清单，始终清楚你下一步该做什么。你可以让 Bond 为你准备下一次会议、起草跟进内容、发送邮件、创建行动项、识别障碍、提示风险，或向团队成员委派任务。"},{"rank":7,"name":"Publora","zhName":"Publora","url":"https://www.producthunt.com/products/publora","desc":"A publishing API for agents to post on 10 social platforms","zhDesc":"A publishing API for agents to post on 10 social platforms","tags":[],"upvotes":null,"icon":null,"detail":"This past year has been a turning point for us. Publora started out as a social media scheduler now it's an MCP server. In practice that means your AI agent (Claude Code, Cursor, Antigravity, whatever you use) can handle social for you: read your feed, comment on posts in your space, react to mentions that matter, reply to messages. You just t esc":"The full-stack open source React framework for MCP Apps","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/6b3e2d43-65bb-4aca-acac-bcd622430f4b.gif?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","zhDetail":"Skybridge 是一个面向开发者的全栈开源 React 框架，专为构建 MCP（Model Context Protocol）应用而设计。它帮助开发者快速搭建与 AI 模型交互的应用程序，通过提供统一的组件和工具链，简化了前后端集成与上下文管理的复杂度。"}],"periods":{"yesterday":"2026年7月22日","today":"2026年7月23日","weekly":"2026年 第29周","monthly":"2026年6月"}};
let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
