<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月21日</span>
        <span class="updated">更新于 10:29</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-22","updatedAt":"10:29","yesterday":[{"rank":1,"name":"Lev8","zhName":"Lev8","url":"https://www.producthunt.com/products/lev8","desc":"Find, research, and reach the right people","zhDesc":"Find, research, and reach the right people","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0cd8bb27-735c-48f9-9105-4c7d73fbd348.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Chat with Lev8, the fastest way to find and reach your target people and companies, powered by live web search via parallel AI agents across every corner of the internet. Enrich CSVs with waterfall lookups, monitor intent signals, and send personalized multi-channel messages, all running automatically.","zhDetail":"Lev8 是一款面向销售和营销人员的智能获客工具，通过并行AI代理实时搜索全网，帮助用户快速找到目标人群和公司。它能自动丰富CSV数据、监测用户意图信号，并发送个性化多渠道消息，从而大幅提升线索挖掘与触达效率。"},{"rank":2,"name":"CartAI","zhName":"CartAI","url":"https://www.producthunt.com/products/cartai","desc":"The AI agent that handles checkout.","zhDesc":"The AI agent that handles checkout.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ccbd2930-0350-4ce8-9f51-1bfd65351e09.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"What's actually hard here isn't the navigation. It's PCI-compliant payment handling, cooperative bot-mitigation so you clear checkout instead of getting blocked (we cooperate with [Cloudflare](https://radar.cloudflare.com/bots/directory/cartai-agentic-commerce-as-a-service)/[HUMAN](https://www.humansecurity.com/)/[Akamai](https://www.akamai.com/)/[Fingerprint](https://docs.fingerprint.com/docs/bot-detection/bot-directory) via Web Bot Auth and signed agent identity using [Skyfire](https://skyfire.xyz/) — we don't evade them), and workflows that always terminate in a known transactional state. That's the part we built.","zhDetail":"CartAI 面向需要自动化在线购物的开发者和电商运营者，解决了在浏览器中完成支付时面临的PCI合规、反爬虫拦截和交易状态不确定等难题。它通过Web Bot Auth与Cloudflare、HUMAN等主流安全服务协作，并利用Skyfire签署代理身份，确保每次购物流程都能安全、可靠地终结于已知的交易状态。"},{"rank":3,"name":"ditto.site","zhName":"ditto.site","url":"https://www.producthunt.com/products/ditto-site","desc":"Clone any website into clean code. Free & open source","zhDesc":"Clone any website into clean code. Free & open source","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/7321b58f-7419-433c-9ad8-9c86ff907331.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Congrats team, generous move open-sourcing this! My use case is probably the boring one: our own site. We’re on a hosted builder and the lock-in itch is real. You mention an editable content model, so if I point Ditto at our own CMS-driven marketing site, does repeated content (blog cards, testimonials) come out as mapped data I can actually edit in one place, or as hardcoded sections I’d untangle by hand? If it’s the former, this is a genuine escape hatch from website builder lock-in and that’s worth a lot more than cloning competitors.","zhDetail":"ditto.site 是一款面向网站所有者的开源克隆工具，帮助用户摆脱建站平台的锁定困境。只需指向目标网站，它就能将重复内容（如博客卡片、客户评价）转化为可集中编辑的结构化数据，而非硬编码片段，让迁移和内容管理变得轻松可控。"},{"rank":4,"name":"Rerun","zhName":"Rerun","url":"https://www.producthunt.com/products/rerun-2","desc":"The easiest way to build AI agents for all your tasks","zhDesc":"The easiest way to build AI agents for all your tasks","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/34fd0381-e1a2-487e-8d2d-74bb47d4de5f.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Hey Product Hunt 👋 I'm Clément, founder of Rerun. We built Rerun because every \"AI agent\" tool felt like a black box. You fire it off and just hope it did the right thing. We wanted agents you could actually watch work, step by step, that pause before doing anything sensitive. Rerun lets you build no-code AI agents that run 24/7 (chasing invoices, qualifying leads, clearing your inbox), connected to the tools you already use. Live dashboards show every run, token, and decision. Each workspace gets its own private server, no shared tenancy. We'll be here all day. We'd genuinely love your feedback, questions, and ideas on what to automate next.","zhDetail":"Rerun 是一款面向需要自动化处理重复性工作（如追发票、筛选潜在客户、清理收件箱）的用户的无代码 AI 代理工具。它解决了现有 AI 代理如同“黑箱”般难以追踪的问题，让你能实时观察每一步操作，并在执行敏感任务前暂停确认。通过连接你已有的工具，Rerun 提供 24/7 运行的自动化代理，并配有实时仪表盘展示每次运行、令牌消耗和决策过程，每个工作区还拥有独立的私有服务器。"},{"rank":5,"name":"Phantomstory","zhName":"Phantomstory","url":"https://www.producthunt.com/products/phantomstory","desc":"Launch a third-party blog to win AEO with just two clicks","zhDesc":"Launch a third-party blog to win AEO with just two clicks","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c350e77e-b130-4c01-b505-67f4f7c73fc4.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Phantomstory helps teams win AEO by launching third-party blogs on fresh domains in under 5 minutes. With just two clicks, Phantomstory provisions credible content hubs that incrementally publish AI-search-ready articles. The secret? A portion of these expertly-written articles are designed to help LLMs discover, understand, and recommend your company. Stop thinking about AEO as just a monitoring problem; with Phantomstory, transform AEO into an actionable plan that actually drives results.","zhDetail":"Phantomstory 帮助团队在5分钟内通过全新域名快速发布第三方博客，从而赢得AEO（答案引擎优化）。用户只需点击两次，即可搭建可信的内容中心，逐步发布适配AI搜索的文章。其核心在于，部分由专家撰写的文章专门设计用于让大语言模型发现、理解并推荐你的公司，将AEO从单纯的监测问题转变为可执行的增长方案。"},{"rank":6,"name":"Routine AI","zhName":"Routine AI","url":"https://www.producthunt.com/products/routine","desc":"Control work with your voice. The Siri for work.","zhDesc":"Control work with your voice. The Siri for work.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/e1997e83-cf8e-4ebc-ad25-5342cd2b5f0c.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Routine AI lets you control your tasks, calendar, notes and projects using your voice. Just talk natural op 一样一键精准编辑视频，同时支持生成无限长度的电影级广告、保持角色一致性、控制光照与镜头角度，所有操作都在一个工作空间中完成。"},{"rank":2,"name":"UltraPod","zhName":"UltraPod","url":"https://www.producthunt.com/products/ultrapod","desc":"Turn your old iPhone into a music-first dumbphone","zhDesc":"Turn your old iPhone into a music-first dumbphone","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/dfedbc93-41f3-41e1-8a5e-566abbd15319.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The 'third path' framing is what sells it — reusing an old iPhone instead of buying a separate dumbphone is the practical version of a detox. Since iOS won't allow a true custom launcher, how does UltraPod actually enforce the music-first setup on day one — a configuration profile, Screen Time, Guided Access? And is going back to a normal iPhone a clean one-tap revert, or does it need a full reset?","zhDetail":"UltraPod 面向希望减少手机干扰、实现数字戒断的用户，通过将旧 iPhone 改造成以音乐播放为核心的功能机，避免购买额外笨手机。它利用 iOS 的配置描述文件、屏幕使用时间或引导式访问等机制，强制锁定为音乐优先的极简界面，并支持一键恢复为正常 iPhone 使用状态。"},{"rank":3,"name":"Kastra","zhName":"Kastra","url":"https://www.producthunt.com/products/kastra","desc":"Runtime authorization for Claude, Cursor, Codex and OpenClaw","zhDesc":"Runtime authorization for Claude, Cursor, Codex and OpenClaw","tags":[],"upvotes":null,"icon":null,"detail":"That's Kastra. Every agent action is evaluated against policy and gets an allow or deny decision in under a millisecond. When something needs a human review, that approval now completes in about a second, across our desktop app, web console, and macOS notifications. We reduce that number down every week, and it changes how the product feels. Sub 1ms latency means human-in-the-loop authorization is practical, not theoretical. Kastra is neutral and deterministic across the stack and works with the tools you already use.","zhDetail":"Kastra 是一款面向企业安全团队和开发者的实时授权引擎，能够在毫秒内对每个智能体操作进行策略评估并给出允许或拒绝的决策。当需要人工审核时，通过桌面应用、网页控制台和 macOS 通知，审批流程可在约一秒内完成。它通过低于1毫秒的延迟，让人机协同授权从理论变为实用，且与现有工具无缝兼容。"},{"rank":4,"name":"ACME.BOT","zhName":"ACME.BOT","url":"https://www.producthunt.com/products/acme-bot","desc":"No-slop AI SEO agent that interviews you first","zhDesc":"No-slop AI SEO agent that interviews you first","tags":[],"upvotes":null,"icon":null,"detail":"ACME.BOT turns your expertise into no slop SEO articles. Answer a few questions on a topic (from your phone) and your first-hand experience shapes your blog post. AI handles the boring stuff. Like keyword research, illustrations, references, internal linking, and publishing cadence. Create helpful non-commodity content that also satisfies Google's EEAT requirements.","zhDetail":"ACME.BOT 帮助行业专家将自身经验快速转化为符合 Google EEAT 标准的高质量 SEO 文章。你只需在手机上回答几个关于某个主题的问题，AI 就会自动完成关键词研究、插图、引用、内链和发布节奏等繁琐工作，让你轻松产出独特且有价值的原创内容。"},{"rank":5,"name":"Arkor","zhName":"Arkor","url":"https://www.producthunt.com/products/arkor","desc":"Fine-tune and Deploy Open-weight Models in TypeScript","zhDesc":"Fine-tune and Deploy Open-weight Models in TypeScript","tags":[],"upvotes":null,"icon":null,"detail":"Start a real LLM training in 10 minutes. Tell Claude Code or Codex what the model is for; they prepare the datasets and create the training project. Click \"Run Training\" in the local studio. Arkor runs the training, and deploys the trained model as an OpenAI-compatible API. Think Next.js and Vercel for fine-tuning: code you can review, infrastructure you do not have to manage, and a model your app can call. No GPU setup. No ML expertise required. No Python training code to write.","zhDetail":"Arkor 让开发者无需 GPU 配置或机器学习专业知识，即可在 10 分钟内启动真实的 LLM 训练。你只需告诉 Claude Code 或 Codex 模型的用途，它们会自动准备数据集并创建训练项目；在本地工作室点击“运行训练”，Arkor 便会完成训练并将模型部署为兼容 OpenAI 的 API。它就像微调领域的 Next.js 和 Vercel——代码可审查、基础设施无需管理、模型可直接被你的应用调用，且无需编写任何 Python 训练代码。"},{"rank":6,"name":"Lattics","zhName":"Lattics","url":"https://www.producthunt.com/products/lattics-2","desc":"Brain-like knowledge base with AI writing & deep research","zhDesc":"Brain-like knowledge base with AI writing & deep research","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2e80bb67-3c46-4494-a472-03612fcbd527.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"the privacy-first local storage plus AI writing combo is the part I'd want more detail on - the moment I right-click and ask for a rewrite or start an AI chat, that selection has to leave the machine to reach whatever model is doing the work, right? curious whether that's opt-in per action, and whether there's ever a local/offline model option for people who picked this specifically for the local-storage privacy angle in the first place.","zhDetail":"Lattics 是一款面向注重隐私的写作者和知识工作者的本地存储与AI写作组合工具。它解决了用户在写作时对数据隐私的担忧——当你选中文字右键请求改写或启动AI对话时，数据需要离开本地设备发送到云端模型处理。目前该功能按操作逐一征求用户同意，且暂未提供本地/离线模型选项，让因本地存储隐私优势而选择该产品的用户仍存疑虑。"},{"rank":7,"name":"box","zhName":"Box","url":"https://www.producthunt.com/products/box-4","desc":"Simple computers for agent w/ full VMs","zhDesc":"Simple computers for agent w/ full VMs","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c7141a71-763e-46f4-b906-dcd6ec83a8b6.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Box offers the simplest, cheapest cloud computers for agents, thought for builders of agentic platforms & software factories. Run 'box new' in your terminal, in 2s get a beefy ubuntu VM, with admin rights, a desktop, ssh access. At $0.036/hr it is 10x less expensive than the likes of E2B, Daytona, Modal, so you can run more agents, or run them longer. Run up to 1000 concurrent boxes fully self-served, or ask us for more, with same-day support from the founders.","zhDetail":"Box 为智能体平台与软件工厂的开发者提供最简单、最便宜的云端计算机。你只需在终端输入“box new”，2秒内即可获得一台配置强劲的 Ubuntu 虚拟机，拥有管理员权限、桌面环境和 SSH 访问。每小时仅需 0.036 美元，价格比 E2B、Daytona、Modal 等同类产品便宜 10 倍，让你能运行更多智能体或延长运行时间，最多可同时自管理 1000 个实例，并享受创始人当日的技术支持。"},{"rank":8,"name":"Wispr Flow: Dictation That Works Everywhere","zhName":"Wispr Flow: Dictation That Works Everywhere","url":"https://www.producthunt.com/products/wisprflow","desc":"Stop typing. Start speaking. 4x faster.","zhDesc":"Stop typing. Start speaking. 4x faster.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ebbe0b72-5669-4449-8ea0-f2a8b1f42dcf.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Reviewers largely see Wispr Flow as a fast, accurate dictation tool that fits naturally into everyday work, especially coding, prompting, writing, and multilingual use. Users repeatedly praise its across-app workflow, subtle cleanup that preserves their voice, and strong handling of mixed-language speech. Makers of","zhDetail":"Wispr Flow 是一款适用于日常工作的快速、准确的语音输入工具，特别适合程序员、写作者和多语言用户。它解决了在多个应用间频繁切换时无法高效进行语音输入的痛点，通过跨应用工作流、智能润色保留原声以及强大的混合语言识别，让用户在任何场景下都能自然流畅地使用语音完成输入。"},{"rank":9,"name":"AgentManager","zhName":"AgentManager","url":"https://www.producthunt.com/products/agentmanager","desc":"Never miss a Claude Code session waiting for your input","zhDesc":"Never miss a Claude Code session waiting for your input","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/d7916146-a38e-4ace-a2cf-07c7ba35313d.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The 'waiting for input' detection is the whole value here — auto-surfacing and jumping to the exact iTerm2/Cursor pane is what I'd actually use daily. How does it read session state under the hood: scraping terminal output / the TTY, or hooking the Claude Code process directly? Mostly wondering how it avoids false 'waiting' signals when a session is just mid-stream on a long tool call.","zhDetail":"AgentManager 专为频繁使用 iTerm2 和 Cursor 的开发者设计，解决终端会话中因等待输入而导致的效率中断问题。它通过自动检测并跳转到等待输入的精确窗格，让开发者无需手动切换窗口即可快速响应，从而保持工作流连贯。底层采用终端输出/TTY 抓取或直接挂钩 Claude Code 进程的方式读取会话状态，并智能过滤长时间工具调用中的误报等待信号。"},{"rank":10,"name":"Light Flip","zhName":"Light Flip","url":"https://www.producthunt.com/products/light-phone","desc":"Nostalgia for a time before smartphones","zhDesc":"Nostalgia for a time before smartphones","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/bf2f7c6a-f35d-4a68-8079-a4e024ef79e9.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"the whole reason people trust Light Phone is that it's deliberately incapable of most things, not just shaped like an old phone. curious where Flip lands on that spectrum - is this the same \"as little as possible\" philosophy in a flip shell, or does the nostalgia angle mean you've quietly added back more apps/features than the original Light Phone had, since that's usually how \"fun retro form factor\" products drift over a few versions.","zhDetail":"Light Flip 是一款面向追求数字极简主义用户的翻盖手机。它延续了 Light Phone “尽可能少” 的设计哲学，通过限制应用和功能来帮助用户摆脱智能手机成瘾，回归专注的生活。这款产品将极简理念融入复古翻盖形态，在保留核心通信功能的同时，避免因怀旧元素而悄悄增加过多应用和功能。"},{"rank":11,"name":"Migma AI","zhName":"Migma AI","url":"https://www.producthunt.com/products/migma-ai","desc":"AI runs your email marketing. Better with every send.","zhDesc":"AI runs your email marketing. Better with every send.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c71558bf-fae0-40f5-8796-e5126d69f59b.gif?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","detail":"Migma creates full campaigns before you ask. It understands your goals and events, creates every email, personalizes and localizes it, and renders consistently across inboxes. It handles sending, preferences and compliance, then learns what drives revenue.","zhDetail":"Migma AI 是一款面向营销团队的智能营销活动生成工具。它能在你提出需求之前，自动理解你的目标和活动信息，生成完整的邮件营销方案，包括个性化与本地化内容，并确保在不同收件箱中显示一致。此外，它还负责发送、偏好管理和合规性，并通过学习哪些策略能带来收入，持续优化营销效果。"},{"rank":12,"name":"Viktor.com","zhName":"Viktor.com","url":"https://www.producthunt.com/products/viktor","desc":"An AI coworker that actually does the work","zhDesc":"An AI coworker that actually does the work","tags":[],"upvotes":null,"icon":null,"zhDetail":"Viktor.com 是一款面向职场人士的 AI 同事工具，能够真正帮你完成实际工作任务，而不仅仅是提供建议。它通过自动化处理日常繁琐的协作与执行环节，让用户从重复性劳动中解放出来，专注于更有价值的工作。"},{"rank":13,"name":"Redential","zhName":"Redential","url":"https://www.producthunt.com/products/redential","desc":"A developer credential that proves what you built","zhDesc":"A developer credential that proves what you built","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ed96b062-a172-4ca3-a014-2512affb1e53.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"Redential 是一款面向开发者的数字凭证工具，用于证明你实际构建过的项目或代码。它通过加密签名和可验证的凭证机制，帮助开发者在求职或开源协作中快速、可信地展示自己的技术成果，避免简历造假或经验无法验证的问题。"},{"rank":14,"name":"Grindoro","zhName":"Grindoro","url":"https://www.producthunt.com/products/grindoro","desc":"Focus with others through synchronized Pomodoro sessions","zhDesc":"Focus with others through synchronized Pomodoro sessions","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/406f40ff-1700-466b-a7f9-48c20445ae9b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The synchronized-session angle is smart because most Pomodoro apps optimize solo discipline, not the show-up-with-others part. I would be curious to see a lightweight post-session recap that separates planned focus time from completed rounds, so the social energy helps accountability without turning the app into another streak-pressure machine.","zhDetail":"Grindoro 是一款面向需要与他人同步专注的团队或学习小组的番茄钟应用。它解决了传统番茄钟只强调个人自律、缺乏同伴监督的问题，通过同步专注时段让用户能“一起出现、一起专注”，用社交能量提升责任感，而不会变成另一个制造打卡压力的工具。"},{"rank":15,"name":"1. Lev8","zhName":"Lev8","url":"https://www.producthunt.com/products/lev8","desc":"Find, research, and reach the right people","zhDesc":"Find, research, and reach the right people","tags":[],"upvotes":null,"icon":null,"zhDetail":"Lev8 是一款面向销售与商务人士的智能人脉发现工具，帮助用户快速找到、调研并触达目标联系人。它通过整合多维度数据与搜索能力，简化了从线索挖掘到初步沟通的流程，让用户更高效地建立有价值的商业连接。"},{"rank":16,"name":"3. ditto.site","zhName":"ditto.site","url":"https://www.producthunt.com/products/ditto-site","desc":"Clone any website into clean code. Free & open source","zhDesc":"Clone any website into clean code. Free & open so let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
