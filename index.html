<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月17日</span>
        <span class="updated">更新于 09:37</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-18","updatedAt":"09:37","yesterday":[],"today":[{"rank":1,"name":"Mirage","zhName":"Mirage","url":"https://www.producthunt.com/products/mirage-15","desc":"Turn your SaaS into a clickable demo in 90 seconds.","zhDesc":"Turn your SaaS into a clickable demo in 90 seconds.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0807b0ce-d6a7-4163-b4e5-5cf1c6ce8b76.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"the per-step drop-off tracking is the feature that actually sells me, most demo tools stop at view counts and leave you guessing which step lost people. once you see a specific hotspot is where viewers bail, can you edit or reorder that step without recapturing the whole flow, or does a change mean starting over","zhDetail":"Mirage 是一款面向产品演示制作者的智能追踪工具，帮助用户精准定位演示流程中用户流失的具体步骤。通过逐步骤的流失率分析，它解决了传统工具仅提供浏览总数、无法判断用户在哪一步离开的问题，让你无需重新录制整个演示即可针对性地编辑或调整问题步骤。"},{"rank":2,"name":"Mainichi","zhName":"Mainichi","url":"https://www.producthunt.com/products/mainichi-2","desc":"Learn Japanese, one prefecture at a time.","zhDesc":"Learn Japanese, one prefecture at a time.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c107c4fb-3951-48e5-873f-1feaee150343.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Learn 20,000+ Japanese words with a spaced-repetition system built for long-term memory. Playful, gamified sessions under 5 minutes a day — no boring textbooks. Mainichi skips the flashcard grind. Short, low-pressure sessions that fit into a real day — show up, relax into a round of vocab, and let your streak do the rest. Clean cards. Fast sessions. A progress bar that actually fills up. The interface gets out of the way so you can focus on the words.","zhDetail":"Mainichi 是一款面向日语学习者的单词记忆工具，通过间隔重复系统帮助用户长期掌握 20,000 多个日语词汇。它采用轻松的游戏化设计，每天只需不到 5 分钟即可完成一轮词汇练习，无需枯燥的教科书或繁琐的闪卡。简洁的界面和进度条让用户专注于单词本身，在低压力中养成持续学习的习惯。"},{"rank":3,"name":"Clark","zhName":"Clark","url":"https://www.producthunt.com/products/clark-agent","desc":"An AI coworker with its own cloud computer","zhDesc":"An AI coworker with its own cloud computer","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/84341329-a328-4857-9d47-4ba180352bfd.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Clark is an AI coworker with its own cloud computer - browser, terminal, files, and code. Hand it a real task, close the tab, and come back to finished work: wide, sourced research; websites; spreadsheets; decks; audits; or tested code. It can fan work out to parallel specialists, run on a schedule, and return artifacts with the evidence behind them. Use Clark on web or mobile, work in real repositories with Clark Code, or embed the agent through an OpenAI-compatible API.","zhDetail":"Clark 是一款自带云端电脑（浏览器、终端、文件与代码）的 AI 同事。你只需交给它一个真实任务，关闭标签页，回来即可收获完成的工作——包括广泛的研究、网站、表格、演示文稿、审计报告或经过测试的代码。它能将任务分派给多个并行专家、按计划运行，并返回带有证据链的成果，支持网页端、移动端、真实代码仓库协作，或通过兼容 OpenAI 的 API 嵌入使用。"},{"rank":4,"name":"LiveDemo","zhName":"LiveDemo","url":"https://www.producthunt.com/products/livedemo","desc":"Open-source alternative to Storylane, Navattic, and Arcade","zhDesc":"Open-source alternative to Storylane, Navattic, and Arcade","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2e64354d-c77e-43c8-830f-287c7f9d373a.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Create interactive product demos in minutes. Capture any workflow, add AI voiceovers and personalized text, then share it as a link, embed, GIF, or video while tracking engagement and collecting leads across your website, docs, and sales outreach.","zhDetail":"LiveDemo 是一款面向产品经理、销售和营销人员的交互式产品演示工具。它帮助用户快速录制工作流程，添加 AI 语音旁白和个性化文字，并将演示生成为链接、嵌入代码、GIF 或视频，从而在网站、文档和销售推广中追踪用户互动并收集潜在客户线索。"},{"rank":5,"name":"WX","zhName":"WX","url":"https://www.producthunt.com/products/wx","desc":"An experimental synth for playable generative sound","zhDesc":"An experimental synth for playable generative sound","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2a5b89df-1a23-4485-be77-b6cffd99b893.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"faster results, for me, at least early on. the value of a tool like this is getting unstuck when you're staring at a blank patch, not tweaking forty parameters. curious how you defined the boundaries for what counts as musically unusable, was that mostly your own ear over months of testing or did you have other musicians stress test the edges","zhDetail":"WX 是一款面向音乐创作者的 AI 辅助工具，帮助你在创作初期快速突破“空白页”困境，避免陷入参数微调的泥潭。它通过智能生成音乐片段，让你在灵感枯竭时迅速获得可用的起点，从而加速创作流程。"},{"rank":6,"name":"DocuSmart AI","zhName":"DocuSmart AI","url":"https://www.producthunt.com/products/docusmart-ai","desc":"Turning fragmented knowledge into one simple system","zhDesc":"Turning fragmented knowledge into one simple system","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/4676e4d3-e6de-46b3-aeb3-4f7fcedf53ad.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"DocuSmart AI lets you search all your internal documents using plain English — across Google Drive, SharePoint, Dropbox and more — from one place. No migration, no reorganising, no training required. Just ask a question and get the answer. Built for nonprofits and SMEs who are drowning in documents spread across too many systems. We're looking for early adopters, if document chaos costs your team time, we'd love to hear from you.","zhDetail":"DocuSmart AI 专为被多系统文档淹没的非营利组织和中小企业设计，让用户无需迁移、整理或培训，即可在一个平台上用自然语言搜索 Google Drive、SharePoint、Dropbox 等所有内部文档。只需提问，就能直接获得答案，彻底告别文档混乱带来的时间浪费。"},{"rank":7,"name":"ZooData","zhName":"ZooData","url":"https://www.producthunt.com/products/zoodata","desc":"The data layer for AI agents","zhDesc":"The data layer for AI agents","tags":[],"upvotes":null,"icon":null,"detail":"One thing I'd add from the support side, where we build agents. Clean JSON fixes the token cost, but it quietly adds a different risk. Raw HTML looks messy so you distrust it. A structured field looks authoritative even when the extractor grabbed the wrong element, or the value went stale between the scrape and the moment the agent acts on it. For an agent that only reads, fine. For one that acts on the field, answers a customer or changes a price, a confidently wrong value is worse than a missing one, because nothing tells it to stop.","zhDetail":"ZooData 专为构建智能代理（Agent）的开发者设计，解决代理在读取结构化数据时因“自信的错误”而做出危险决策的问题。它通过保留原始 HTML 的“混乱感”来提醒代理对数据保持怀疑，避免因看似整洁的字段掩盖了抓取错误或数据过期，从而确保代理在采取行动（如回复客户或修改价格）前能识别并停止使用不可靠信息。"},{"rank":8,"name":"Viktor.com","zhName":"Viktor.com","url":"https://www.producthunt.com/products/viktor","desc":"An AI coworker that actually does the work","zhDesc":"An AI coworker that actually does the work","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/37038cc7-70ae-4d9f-b264-b20497bae49b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"I run a small energy & internet company in Alberta — team of 4. Viktor legitimately replaced a social media service, a part-time VA, and a couple of SaaS tools within the first few weeks. It logs into our wholesale portal daily (no API — just a web login and CSV exports), syncs our customer database to our CRM, drafts churn recovery emails before I'm even at my desk, runs our entire social media calendar, and built a lead capture to email drip pipeline for a solar campaign. It remembers everything — brand colors, how I write emails, terminology I've corrected once months ago. The daily output is something I genuinely couldn't replicate without hiring 2-3 more people.","zhDetail":"Viktor.com 专为小型企业主打造，尤其适合像阿尔伯塔省能源与互联网公司这样只有4人团队的微型企业。它通过自动登录批发门户、同步客户数据到CRM、撰写客户挽回邮件、管理社交媒体日历以及搭建潜在客户捕获与邮件培育流程，解决了人力不足和多工具管理效率低下的问题。无需API，仅凭网页登录和CSV导出即可运行，相当于用一套系统替代了社交媒体服务、兼职助理和多个SaaS工具。"},{"rank":9,"name":"Buzzy","zhName":"Buzzy","url":"https://www.producthunt.com/products/buzzy-2","desc":"Your creative AI co-director","zhDesc":"Your creative AI co-director","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/94d3fba9-137a-42b9-b1be-3a682cad6ad5.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Buzzy is the first truly agentic infinite canvas for video creation. It helps you spark ideas, build moodboards, and precisely photoshop your video in one click — while creating unlimited-length blockbuster films and commercial ads, keeping unlimited subjects consistent, controlling lighting and camera angles, and precisely editing video like photoshop in one workspace.","zhDetail":"Buzzy 是全球首款真正具备智能代理能力的无限画布视频创作工具。它面向视频创作者、广告制作人和影视爱好者，帮助用户激发创意、构建情绪板，并像操作 Photoshop 一样一键精准编辑视频——支持生成无限长度的电影级作品与商业广告，保持无限角色一致性，自由控制光照与镜头角度，在同一个工作空间中完成从构思到成片的全流程。"},{"rank":10,"name":"Customer.io","zhName":"Customer.io","url":"https://www.producthunt.com/products/customer-io","desc":"Automate Messaging Everywhere — Startups Get 12 Months Free","zhDesc":"Automate Messaging Everywhere — Startups Get 12 Months Free","tags":[],"upvotes":null,"icon":null,"detail":"Customer.io unifies data, messaging, and AI into one platform so every customer interaction gets smarter over time. Teams use it to build personalized campaigns across email, SMS, push, in-app, and more—using first-party data to reach the right people at the right moment. AI is built in to remove the grunt work and sharpen results, so marketers can focus on strategy. Trusted by 9,000+ brands including Notion, Lovable, Wispr Flow, and Cursor.","zhDetail":"Customer.io 是一个整合数据、消息和AI的统一平台，帮助团队通过邮件、短信、推送、应用内等多种渠道构建个性化营销活动。它利用第一方数据在正确时机触达正确用户，并内置AI自动优化效果，让营销人员从繁琐操作中解放出来，专注于策略。目前已被Notion、Lovable、Wispr Flow、Cursor等9000多个品牌信赖使用。"},{"rank":11,"name":"5. Timely","zhName":"Timely","url":"https://www.producthunt.com/products/timely-9","desc":"Pull your calendar availability in 3 seconds","zhDesc":"Pull your calendar availability in 3 seconds","tags":[],"upvotes":null,"icon":null,"detail":"Pull your availability from connected in ChatGPT, desktop, and web","zhDesc":"Your AI video editor in ChatGPT, desktop, and web","tags":[],"upvotes":null,"icon":null,"detail":"ChatCut is a lightweight, professional-grade AI video editor anyone can use, even without editing experience. It’s like having a personal video editing assistant that understands your footage, intent, and timeline. Make structural edits, fine-tune cuts, add captions, B-roll, music, voiceover, motion graphics, stock footage, and AI-generated video in one place. Every edit stays editable on a real timeline, with XML export when you want to keep working elsewhere.","zhDetail":"ChatCut 是一款轻量级、专业级的 AI 视频编辑器，专为没有剪辑经验的普通用户设计。它像一位懂你素材、意图和时间线的私人剪辑助手，让你无需学习复杂操作即可完成结构性剪辑、精细裁剪、添加字幕、B-roll、音乐、旁白、动态图形、素材库视频以及 AI 生成视频。所有编辑都在真实时间线上保持可修改，并支持导出 XML 到其他专业软件继续工作。"},{"rank":15,"name":"5. Sim","zhName":"Sim","url":"https://www.producthunt.com/products/sim-studio","desc":"Open-source workspace for AI agents and workflows","zhDesc":"Open-source workspace for AI agents and workflows","tags":[],"upvotes":null,"icon":null,"detail":"I've been building agent workflows for a while and the thing that always killed me was how fast everything turns into crap once you go past two or three agents talking to each other. Sim fixes that. You get an actual visual canvas where you can see the whole flow, wire things up, and then actually deploy it instead of it just being a pretty diagram. It's open source and you can self host it, which matters a lot to me because I don't want my whole stack depending on some company's pricing decisions. The integrations that come out of the box saved me a ton of setup time too since they a 1000+! This is a truly great product and integral in my stack!","zhDetail":"Sim 是一款面向 AI 代理工作流开发者的可视化编排工具，解决了多个代理协作时流程混乱、难以部署的问题。它提供直观的视觉画布，让用户能够设计、连接并直接部署完整的代理工作流，而不仅仅是画一张漂亮的图。作为开源且支持自托管的工具，Sim 还内置了超过 1000 种集成，大幅减少配置时间，让开发者不再依赖单一厂商的定价策略。"},{"rank":16,"name":"1. Fundraisly","zhName":"Fundraisly","url":"https://www.producthunt.com/products/fundraisly","desc":"AI fundraising agent that finds investors and books meetings","zhDesc":"AI fundraising agent that finds investors and books meetings","tags":[],"upvotes":null,"icon":null,"detail":"Fundraisly: AI-native fundraising system. It built the most complete investors database of 300k+ and analyzes millions of deals to identify the investors actively backing companies in your space, stage, and geography. It maps warm paths to them from your own network and then covers the rest with targeted outreach. The result: 10-50 qualified investor meetings on your calendar in 90 days. Built by founders who raised over $1B.","zhDetail":"Fundraisly 是一款面向创业者的 AI 原生融资系统，帮助创始人快速找到最匹配的投资人。它基于超过30万投资人的数据库和数百万笔交易分析，精准识别出活跃于你所在领域、阶段和地区的投资人，并通过你的社交网络找到“温暖路径”，再辅以定向触达，最终在90天内为你安排10-50场高质量投资人会议。"},{"rank":17,"name":"2. Goldfish","zhName":"Goldfish","url":"https://www.producthunt.com/products/goldfish-early-access","desc":"Press Option. It knows your work and replies like you","zhDesc":"Press Option. It knows your work and replies like you","tags":[],"upvotes":null,"icon":null,"detail":"Most AI tools make you explain the context before they can help. Goldfish already has it. It privately remembers what you’ve been working on across your Mac, then helps you write better from any app. Press Option in a text field to draft replies, summarize threads, rewrite sentences, or recall important details from your recent work without copying, pasting, or re-explaining the whole backstory.","zhDetail":"Goldfish 是一款面向 Mac 用户的 AI 写作助手，解决了反复向 AI 工具解释上下文、复制粘贴信息的痛点。它能私密地记住你在 Mac 上的工作内容，只需在任意文本框中按下 Option 键，即可快速起草回复、总结对话、改写句子或回忆近期工作细节，无需重复说明背景。"},{"rank":18,"name":"4. Bond","zhName":"Bond","url":"https://www.producthunt.com/products/bond-12","desc":"The AI to-do list that does itself","zhDesc":"The AI to-do list that does itself","tags":[],"upvotes":null,"icon":null,"detail":"Bond is an AI Chief of Staff for executives. It connects to your tools, learns how your company works, and turns scattered tasks into let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
</body>
