<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月19日</span>
        <span class="updated">更新于 10:56</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-20","updatedAt":"10:56","yesterday":[{"rank":1,"name":"OpenSEO","zhName":"OpenSEO","url":"https://www.producthunt.com/products/openseo","desc":"The open source Ahrefs alternative","zhDesc":"The open source Ahrefs alternative","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/bddfb6ed-475f-4cc7-adbc-c28b77be18d8.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The MCP angle is interesting too. We work on the content planning side, and what we keep seeing is that agents will build a whole strategy on bad keyword data and sound completely confident about it. Do people trust the output more when the numbers are real, or does it just move the guessing one step later?","zhDetail":"OpenSEO 是一款面向内容营销人员和SEO从业者的工具，旨在解决智能体基于错误关键词数据制定策略的问题。它通过提供真实、可靠的关键词数据，帮助用户避免因数据偏差导致的决策失误，从而提升内容规划的科学性和可信度。"},{"rank":2,"name":"Spycost","zhName":"Spycost","url":"https://www.producthunt.com/products/spycost","desc":"Fell for a discount again?","zhDesc":"Fell for a discount again?","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/9c884a0a-c029-42a4-bb05-3fa1c9269175.gif?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","detail":"Remember the last time you bought something at a discount, only to see it later for the same price without the discount? Or when the product costs more today than it did yesterday. Did you feel cheated? Are you ready to look behind the screen of manipulation and lies? Spycost helps you see when you’re paying more while thinking you’re paying less. It gives you the full price picture, so you can decide whether it’s actually worth it.","zhDetail":"Spycost 是一款面向消费者的价格透明工具，帮助用户识别商家利用折扣和价格波动制造的虚假优惠。它通过追踪商品的历史价格和真实折扣信息，让你看清自己是否在“看似省钱”时反而多花了钱，从而做出更明智的购买决策。"},{"rank":3,"name":"Kobbe","zhName":"Kobbe","url":"https://www.producthunt.com/products/kobbe","desc":"Privacy-friendly web analytics with traffic and revenue.","zhDesc":"Privacy-friendly web analytics with traffic and revenue.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/5b1ff6ea-21a5-4b80-b8b7-98cfa6f3b637.jpeg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Whether you're building a SaaS, indie project, blog, or online business, Kobbe helps you understand what's working without the complexity of traditional analytics platforms.","zhDetail":"Kobbe 是一款面向 SaaS 创业者、独立开发者、博客作者和在线业务运营者的轻量级分析工具，帮助用户快速了解产品中哪些功能或内容真正有效，而无需面对传统分析平台的复杂配置与数据噪音。"},{"rank":4,"name":"BaseRT","zhName":"BaseRT","url":"https://www.producthunt.com/products/basert","desc":"6.4x faster than llama.cpp, 3.9x faster than MLX","zhDesc":"6.4x faster than llama.cpp, 3.9x faster than MLX","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/3266ca93-6016-49ed-ab5c-ebdd4c73077a.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"curious how much of this gain is specific to M5's tensor cores vs the general Metal 4 tensor API. I'm running an M4 Pro, plenty of people doing local inference haven't upgraded yet - does BaseRT still beat llama.cpp/MLX meaningfully on M4, just with a smaller multiplier, or is most of the win locked to the new hardware?","zhDetail":"BaseRT 是一款面向本地大模型推理用户的性能对比工具，帮助 M4 芯片用户了解在未升级至 M5 的情况下，BaseRT 相比 llama.cpp 和 MLX 是否仍有显著优势。它通过量化不同硬件上的推理增益差异，让用户清晰判断性能提升是来自新硬件还是软件优化。"},{"rank":5,"name":"Rewisp","zhName":"Rewisp","url":"https://www.producthunt.com/products/rewisp-an-ambient-memory-for-your-mac","desc":"See it once. Ask forever.","zhDesc":"See it once. Ask forever.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/413f44d7-e072-432c-a554-3cb22db6825a.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Rewisp gives your Mac a memory. It reads your screen text on-device and remembers it for you. Catches promises like \"I'll send it Friday\" and reminds you until it's done. Ask \"what changed since Tuesday?\" and see exactly what's new. Search by meaning, not just words. Tracks numbers like weight or grades over time. Fills forms from your saved details — never passwords. One quiet 9 PM summary each day. Fully private: screenshots never saved, only text stays on your Mac.","zhDetail":"Rewisp 为你的 Mac 装上“记忆”——它能在本地读取屏幕上的文字并帮你记住。适合那些经常被口头承诺或零散信息困扰的用户，比如“我周五发给你”这类话，它会持续提醒直到完成。你还可以按语义搜索、追踪数字变化、自动填写表单，每晚9点安静推送一份摘要，全程隐私保护，截图不留存，仅文字留在你的 Mac 上。"},{"rank":6,"name":"Detourmap","zhName":"Detourmap","url":"https://www.producthunt.com/products/detourmap","desc":"Every place worth the detour, on one interactive map","zhDesc":"Every place worth the detour, on one interactive map","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/b0676e42-0959-40c4-95b5-07773c2179c4.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"love that this exists, the filtering sounds solid. one thing i'd actually want though is a \"near me\" mode that uses your location to surface places within a driving radius, kind of like setting a max distance so you can find hidden spots for a weekend trip without manually scanning the map","zhDetail":"Detourmap 是一款专为自驾旅行爱好者设计的路线发现工具，帮助用户轻松找到周末短途出行的隐藏景点。它通过智能筛选和基于位置的“附近”模式，自动推荐用户驾驶半径内的有趣地点，省去手动在地图上逐一搜索的麻烦。"}],"today":[{"rank":1,"name":"Deck","zhName":"Deck","url":"https://www.producthunt.com/products/deck-9","desc":"The most capable AI assistant with its own inbox","zhDesc":"The most capable AI assistant with its own inbox","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ab9fb756-af12-4e3e-b39f-4d466d8f17ac.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Deck is an always-on AI assistant with its own email inbox. CC it on any thread or hand it a task, and it takes over. It learns your preferences and priorities over time, proactively flags what needs your attention, and can run on a schedule to deliver briefings and status updates automatically. It's built to take ambiguous, multi-step tasks head on, so you can move on with your day.","zhDetail":"Deck 是一款拥有专属邮箱的常驻 AI 助手，适合需要处理大量邮件和多步骤任务的职场人士。你只需在邮件中抄送它或直接分配任务，它就能自动接管后续工作，并随时间学习你的偏好与优先级，主动提醒重要事项，还能按计划自动生成简报和状态更新，帮你从模糊、复杂的任务中解放出来。"},{"rank":2,"name":"Kogvio","zhName":"Kogvio","url":"https://www.producthunt.com/products/kogvio","desc":"Understand anything online without leaving the page.","zhDesc":"Understand anything online without leaving the page.","tags":[],"upvotes":null,"icon":null,"detail":"As someone who lives in research papers and medical textbooks all day, that copy → open ChatGPT → paste → lose-my-place loop is painfully familiar, so this clicks immediately. Two things I'm curious about: when I highlight a passage in a dense PDF, does Kogvio pull in the surrounding context (or the whole document), or only the exact selection? And for the technical-diagram case like the Kalman filter example in your demo, is it reading the figure itself or the caption and text around it? That's usually where in-page tools fall short for me.","zhDetail":"Kogvio 是一款面向科研人员和医学生的 PDF 阅读助手，解决了在阅读专业文献时频繁复制粘贴到 ChatGPT 导致阅读中断的问题。它允许用户直接在 PDF 中高亮文本或图表，并自动获取上下文（包括整篇文档或图表说明）进行智能问答，从而保持阅读流畅性。"},{"rank":3,"name":"Nautis","zhName":"Nautis","url":"https://www.producthunt.com/products/nautis","desc":"The AI-native Operating System for founders.","zhDesc":"The AI-native Operating System for founders.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/53e039da-64e9-4358-92e5-bbdd3b71035f.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Nautis is the AI-native Operating System for founders. Manage fundraising, planning, finance, documents, meetings, CRM, hiring, and daily operations from one connected workspace. Unlike disconnected SaaS tools, every module shares one AI brain, giving you context-aware automation, smarter insights, and a Chief of Staff that understands your business—not just one app. Spend less time managing tools and more time building.","zhDetail":"Nautis 是为创始人打造的 AI 原生操作系统。它将融资、规划、财务、文档、会议、客户管理、招聘和日常运营整合到一个互联的工作空间中，解决了传统 SaaS 工具各自为政、信息割裂的问题。通过统一的 AI 大脑，每个模块都能实现上下文感知的自动化与更智能的洞察，相当于为你配备了一位真正理解你业务的“AI 参谋长”，让你花更少时间管理工具，更多精力专注创业。"},{"rank":4,"name":"Replay QA","zhName":"Replay QA","url":"https://www.producthunt.com/products/replayio","desc":"Replay QA tells you what is broken before your users do","zhDesc":"Replay QA tells you what is broken before your users do","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/d8f4eeb7-b351-4cd4-8a98-0e68afe73b96.gif?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","detail":"This feels like a natural next step from the replay/devtools side, turning session capture into something that actively goes and finds bugs instead of waiting for a user to hit them. Since it's exploring the app on its own, is it built to dig into things like auth boundaries and cross-user data isolation too, the bugs that never throw an error and just quietly leak or drop data, or is the current focus mostly on crashes and broken UI flows? That category is brutal to catch in vibe-coded apps and it would be a big deal if an agent could reliably surface it.","zhDetail":"Replay QA 是一款面向开发者和测试团队的自动化质量保障工具，它通过主动探索应用来发现潜在缺陷，而不再被动等待用户触发问题。该工具不仅能捕捉崩溃和界面异常，还能深入检查身份验证边界、跨用户数据隔离等难以通过传统手段发现的逻辑漏洞，尤其适合处理那些静默数据泄露或丢失的隐蔽问题。"},{"rank":5,"name":"Rex","zhName":"Rex","url":"https://www.producthunt.com/products/rex-7","desc":"AI agents that run order-to-cash operations","zhDesc":"AI agents that run order-to-cash operations","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/edb301d1-d179-4553-949b-630616b1e6d9.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Hey Product Hunt, I'm Merlin, co-founder of Rex. Lewis and I spent four years building AR software at Sequence. What we kept seeing: someone on the finance team copying data from a portal into a spreadsheet into NetSuite, every single day. Automation tools never fixed it because the work is full of exceptions and judgment calls. So we built Rex to just do the work. Agents plug into your existing stack and run collections, portal uploads, and the AR inbox end to end. Anything sensitive gets routed to your team. Synthesia runs their AR on us today. Ask me anything, including what the agents still get wrong.","zhDetail":"Rex 是一款面向财务团队的 AI 代理工具，专门解决应收账款（AR）流程中因数据分散、异常频发而无法被传统自动化工具处理的问题。它通过接入企业现有系统，自动完成收款、门户上传和 AR 收件箱管理等端到端操作，同时将敏感任务转交人工处理，从而大幅减少重复性手动工作。"},{"rank":6,"name":"Creed","zhName":"Creed","url":"https://www.producthunt.com/products/creed-2","desc":"Your personal context file for every agent.","zhDesc":"Your personal context file for every agent.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/528bd105-5ed5-45fe-bc6c-3d313d86b1e7.vnd.microsoft.icon?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Connor, the thing I re-explain most isn't who I am — it's my domain. I do research-heavy work, and every new agent has to be re-taught my field's vocabulary, which sources I actually trust, and the shorthand I use, before it's useful. So the tool I'd most want plugged in first is my knowledge base (Obsidian / Zotero / NotebookLM), because that's where the real \"how I think\" lives, not my chat history. One design question: do you separate stable identity context (role, preferences) from fast-moving project context? The first I set once; the second changes weekly, and I'd worry a single flat file quietly blurs the two together.","zhDetail":"Creed 是一款面向研究密集型工作者的知识管理工具，解决 AI 代理无法理解用户专业术语、可信来源和思维习惯的问题。它通过连接 Obsidian、Zotero 或 NotebookLM 等知识库，将用户的“思考方式”而非聊天记录作为核心上下文，并区分稳定的身份设定与动态的项目信息，避免两者混淆。"},{"rank":7,"name":"Lunen.ai","zhName":"Lunen.ai","url":"https://www.producthunt.com/products/lunen-ai","desc":"Build AI agents your whole team can run, and control","zhDesc":"Build AI agents your whole team can run, and control","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/80a8a979-cd7a-49a2-94bf-d34a8b50c3f7.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"The \"2FA checkpoint\" framing for risky calls is the interesting part to me. Most agent tools either gate everything behind a human click or trust the model fully — you're doing something in between. How is the read vs. write / auto-allow vs. approve line actually drawn? Is that a threshold an admin configures per tool/data source, or does Lunen infer it from the action type itself? And for scheduled agents running unattended — if a write needs approval and nobody's there to click it, does it just sit and wait, or fall back to a pre-set policy?","zhDetail":"Lunen.ai 是一款面向企业团队和开发者的AI代理安全管控工具，主要解决AI代理在自动化操作中“要么全自动、要么全人工审批”的极端风险问题。它通过创新的“2FA检查点”机制，在读取与写入、自动放行与人工审批之间动态划定安全边界，管理员可针对不同工具或数据源配置阈值，让无人值守的代理在遇到需审批的写入操作时，按预设策略等待或回退，实现安全与效率的平衡。"},{"rank":8,"name":"Backdrop","zhName":"Backdrop","url":"https://www.producthunt.com/products/backdrop","desc":"AI Coworkers that run your projects and operations","zhDesc":"AI Coworkers that run your projects and operations","tags":[],"upvotes":null,"icon":null,"detail":"AI made execution faster. The bottleneck has shifted to deciding what to build while the knowledge behind those decisions is scattered across people, tools, and AI chats. Backdrop provides AI coworkers for projects and operations that understand your company, work with your team,and build shared company context. Across Slack, GitHub, Linear, Notion, Asana, Google Workspace and more, they synthesize customer feedback, create plans and specs, manage tickets, draft documents, and keep work moving.","zhDetail":"Backdrop 专为需要加速产品决策与执行的团队设计，解决了因决策信息分散在人员、工具和AI对话中而导致的效率瓶颈。它通过提供了解公司业务、能与团队协作的AI同事，整合Slack、GitHub、Linear等工具中的客户反馈、计划、文档与工单，自动生成方案并推动工作进展。"},{"rank":9,"name":"Skippr AI","zhName":"Skippr AI","url":"https://www.producthunt.com/products/skippr-3","desc":"The live AI employee inside your product, serving every user","zhDesc":"The live AI employee inside your product, serving every user","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/0614f939-eaa1-4fdc-8a4a-6b56e3aeebbb.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Real-time agents that see, talk, and operate software. They onboard, activate, and unblock your users. On their own. Skippr agents keep agenda and memory across full sessions, speak 10 languages, and act on screen with built-in browser automation. Fully self-serve: spin up an agent in minutes, embed with 2 lines of code, or share a meeting link. Trained on your knowledge, styled to your brand. 200 free credits to start, no card required. Talk to me for the deeper enterprise version.","zhDetail":"Skippr AI 是一款面向SaaS产品的智能助手，能够实时观察、对话并操作软件界面，自动完成用户引导、激活和问题解决。它通过内置浏览器自动化在屏幕上执行操作，支持10种语言，并能在整个会话中保持议程和记忆，帮助企业无需人工即可提升用户转化与留存。只需两行代码即可嵌入，或分享会议链接快速启动，提供200次免费试用，无需信用卡。"},{"rank":10,"name":"LnkFlow","zhName":"LnkFlow","url":"https://www.producthunt.com/products/lnkflow","desc":"Agentic click tracking that shows what grows your business","zhDesc":"Agentic click tracking that shows what grows your business","tags":[],"upvotes":null,"icon":null,"detail":"See which campaigns, channels, and collabs make you money! With reliable, server-side click tracking that counts the visits, ad blockers hide. Turn any URL into a short, branded link tagged by campaign, channel, or creator. Rank creators and platforms by who actually drove clicks, with bots filtered out by default. And it's fully agentic-ready: your AI assistant can create links, tag them, and pull reports in plain language — no dashboard required. Clean links in, clear answers out.","zhDetail":"LnkFlow 是一款面向营销人员、创作者和商务团队的智能链接管理工具。它能通过可靠的服务器端点击追踪，精准统计被广告拦截器隐藏的真实访问量，帮助用户识别哪些营销活动、渠道和合作方真正带来了收益。用户可将任意网址转化为带品牌标识的短链接，并按活动、渠道或创作者自动打标签，同时默认过滤机器人流量，清晰展示谁带来了有效点击。此外，LnkFlow 支持 AI 代理，用户可直接用自然语言让 AI 创建链接、打标签并生成报告，无需打开后台。"},{"rank":11,"name":"Fuzzy AI","zhName":"Fuzzy AI","url":"https://www.producthunt.com/products/fuzzy-ai-2","desc":"We warm your prospects before reaching out","zhDesc":"We warm your prospects before reaching out","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/2ee5bc35-54be-4e1c-ac23-b791bb72f837.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Cold outreach gets ignored because prospects do not know you yet. Fuzzy warms them before you ever reach out by finding people already engaging in your market, helping you stay visible through content and thoughtful comments, then launching personalised LinkedIn and email campaigns in your voice. Research, enrichment, sequences, replies and team workflows live in one place. Customers call it intuitive, seamless and more comprehensive than the tools they used before.","zhDetail":"Fuzzy AI 是一款面向销售和营销团队的外联提效工具，帮助你在正式接触潜在客户前先“暖场”。它通过识别已在你的市场中活跃的用户，让你通过内容互动和深思熟虑的评论保持存在感，再以你的个人风格发起个性化的 LinkedIn 和邮件序列。所有调研、信息补充、跟进流程、回复管理和团队协作都整合在一个平台中，比传统工具更全面且操作直观。"},{"rank":12,"name":"Wispr Flow: Dictation That Works Everywhere","zhName":"Wispr Flow: 随处可用的语音输入工具","url":"https://www.producthunt.com/products/wisprflow","desc":"Stop typing. Start speaking. 4x faster.","zhDesc":"Stop typing. Start speaking. 4x faster.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ebbe0b72-5669-4449-8ea0-f2a8b1f42dcf.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Wispr Flow turns your voice into perfectly formatted text across every app on your device. Speak naturally and Flow handles the rest: real-time auto-edits, tone matching, and context-aware formatting so you never rewrite a single word. Works in 100+ languages including mixed-language dictation like Hinglish. Available on Mac, Windows, iPhone, and Android. One intelligent voice system, every device. Write 4x faster by just talking.","zhDetail":"Wispr Flow 是一款跨平台语音输入工具，面向需要快速书写的职场人士、创作者和多语言用户。它解决了在不同应用中反复切换输入方式、手动修正格式和语气的痛点。用户只需自然说话，Flow 就能实时自动编辑、匹配语气并智能排版，支持 100 多种语言及混合语言输入（如印地英语），在 Mac、Windows、iPhone 和 Android 设备上均可使用，让写作速度提升 4 倍。"},{"rank":13,"name":"Scriptyard","zhName":"Scriptyard","url":"https://www.producthunt.com/products/scriptyard","desc":"A free visual story development workspace","zhDesc":"A free visual story development workspace","tags":[],"upvotes":null,"icon":null,"detail":"Really respect the \"no login, no cloud, doesn't train on your writing\" stance — that's clearly a direct response to what writers are actually worried about right now, not just a feature checkbox. The index-card-wall analogy makes total sense as the thing to digitize. Does it support any kind of collaborative/multiplayer editing yet, or is it intentionally solo-first for now?","zhDetail":"Scriptyard 是一款专为写作者设计的本地优先写作工具，无需登录、不上传云端、不利用你的写作内容进行训练，彻底解决隐私与数据安全焦虑。它通过数字化的“索引卡片墙”来组织写作素材与思路，让创作者在无干扰的环境中专注写作。目前产品以单人使用为核心，暂不支持协作编辑。"},{"rank":14,"name":"Reignat","zhName":"Reignat","url":"https://www.producthunt.com/products/reignat","desc":"Privacy-friendly web analytics with realtime AI insights","zhDesc":"Privacy-friendly web analytics with realtime AI insights","tags":[],"upvotes":null,"icon":null,"detail":"Reignat is a privacy-friendly web analytics platform for founders, startups, and indie makers who want clear insights without the complexity of Google Analytics. Track visitors, pageviews, traffic sources, devices, locations, funnels, and full visitor journeys in real time on a live 3D globe. Connect revenue to see which pages and channels actually earn. Ask the built-in AI assistant about your traffic in plain words and get answers with charts, all from one fast, modern dashboard.","zhDetail":"Reignat 是一款注重隐私的网站分析平台，专为创始人、初创团队和独立开发者设计，帮助他们在不依赖复杂 Google Analytics 的情况下获得清晰的数据洞察。它能实时追踪访客、页面浏览、流量来源、设备、地理位置、转化漏斗及完整访问路径，并通过动态 3D 地球直观展示。你还可以关联收入数据，了解哪些页面和渠道真正带来收益，并用自然语言向内置 AI 助手提问，直接获得带图表的答案——一切都在一个快速、现代的仪表盘中完成。"},{"rank":15,"name":"Viktor.com","zhName":"Viktor.com","url":"https://www.producthunt.com/products/viktor","desc":"An AI coworker that actually does the work","zhDesc":"An AI coworker that actually does the work","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/37038cc7-70ae-4d9f-b264-b20497bae49b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"I run a small energy & internet company in Alberta — team of 4. Viktor legitimately replaced a social media service, a part-time VA, and a couple of SaaS tools within the first few weeks. It logs into our wholesale portal daily (no API — just a web login and CSV exports), syncs our customer database to our CRM, drafts churn recovery emails before I'm even at my desk, runs our entire social media calendar, and built a lead capture to email drip pipeline for a solar campaign. It remembers everything — brand colors, how I write emails, terminology I've corrected once months ago. The daily output is something I genuinely couldn't replicate without hiring 2-3 more people.","zhDetail":"Viktor.com 专为小型能源与互联网公司打造，能替代社交媒体管理、兼职助理及多款SaaS工具。它通过自动登录批发门户、同步客户数据库至CRM、撰写客户挽回邮件、管理社交媒体排期并搭建潜在客户捕获与邮件培育流程，帮助4人团队节省相当于2-3名员工的人力成本。"},{"rank":16,"name":"Autoplot","zhName":"Autoplot","url":"https://www.producthunt.com/products/autoplot","desc":"Unify data analysis and plotting in one powerful workspace","zhDesc":"Unify data analysis and plotting in one powerful workspace","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/156d06f1-7a2a-475e-b328-f99eb5558e69.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"AutoPlot is a Mac native scientific workspace for plotting and exploratory data analysis. Import tabular datasets, create variables, build X&Y plots, histograms, heat maps, correlations, 3D plots, and charts, run fits, then compose figures with vector export. Metal-backed GPU rendering keeps 3D scenes and correlation networks interactive at full dataset size — rotate, zoom, and re-fit without waiting on a redraw. Raw data values never leave your Mac.","zhDetail":"Autoplot 是一款专为科研人员与数据分析师打造的 Mac 原生科学工作台，用于绘图与探索性数据分析。它支持导入表格数据集、创建变量，并快速生成 X-Y 图、直方图、热力图、相关性图、3D 图及图表，同时提供拟合与矢量导出功能。借助 Metal 加速的 GPU 渲染，即使面对完整数据集，3D 场景与相关性网络也能保持流畅交互，且原始数据始终留在你的 Mac 上，确保隐私安全。"},{"rank":17,"name":"CaptureKit","zhName":"CaptureKit","url":"https://www.producthunt.com/products/capturekit-2","desc":"Keep your desktop clean by auto-organizing screenshots.","zhDesc":"Keep your desktop clean by auto-organizing screenshots.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/b666ec00-03c8-4cb9-915e-f34b173d5b48.webp?auto=compress&codec=mozjpeg&cs=strip&dpr=2&fit=max&fm=webp&frame=1&h=48&w=48","detail":"My desktop is basically a screenshot graveyard right now, so this is an instant \"yes\" for me. One thing I'm curious about: does CaptureKit intercept the native macOS shortcuts (Cmd+Shift+3/4/5), or do you have to trigger the capture through CaptureKit's own menu/hotkey for the auto-save-to-folder behavior to kick in? Asking because macOS doesn't make it easy to hook the system screenshot flow — if it's the former that's a genuinely hard problem you've solved.","zhDetail":"CaptureKit 专为经常截屏并希望自动整理保存的用户设计，解决了桌面截图文件散乱堆积、手动归档繁琐的问题。它通过接管或自定义快捷键触发截屏，并将截图自动保存到指定文件夹，让截屏流程更高效、更有序。"},{"rank":18,"name":"Inkling","zhName":"Inkling","url":"https://www.producthunt.com/products/tinker-2","desc":"Open weights 975B multimodal model built for fine-tuning","zhDesc":"Open weights 975B multimodal model built for fine-tuning","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/641f1365-3f13-46e0-97d2-f13d75a72b5f.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"Inkling 是一款面向开发者和AI研究者的开放权重975B多模态模型，专为微调场景设计。它解决了大型模型难以针对特定任务进行定制化优化的问题，通过提供可自由调整的开放权重架构，让用户能够高效地将模型适配到自己的数据和应用需求中。"},{"rank":19,"name":"3. Kobbe","zhName":"Kobbe","url":"https://www.producthunt.com/products/kobbe","desc":"Privacy-friendly web analytics with traffic and revenue.","zhDesc":"Privacy-friendly web analytics with traffic and revenue.","tags":[],"upvotes":null,"icon":null,"detail":"Whether you're building a SaaS, indie project, blog, or online business, Kobbe helps you understand what's working without the complexity of traditional analytics platforms.","zhDetail":"Kobbe 是一款面向 SaaS、独立项目、博客或在线业务的轻量级分析工具，帮助用户快速了解哪些运营策略有效，而无需面对传统分析平台的复杂操作。它通过简化数据洞察流程，让非技术用户也能轻松掌握产品表现。"},{"rank":20,"name":"4. BaseRT","zhName":"BaseRT","url":"https://www.producthunt.com/products/basert","desc":"6.4x faster than llama.cpp, 3.9x faster than MLX","zhDesc":"6.4x faster than llama.cpp, 3.9x faster than MLX","tags":[],"upvotes":null,"icon":null,"detail":"curious how much of this gain is specific to M5's tensor cores vs the general Metal 4 tensor API. I'm running an M4 Pro, plenty of people doing local inference haven't upgraded yet - does BaseRT still beat llama.cpp/MLX meaningfully on M4, just with a smaller multiplier, or is most of the win locked to the new hardware?","zhDetail":"BaseRT 是一款面向 Mac 用户的本地推理加速工具，旨在解决 M4 及更早芯片用户在升级硬件前无法充分利用新模型性能的问题。它通过优化 Metal 4 张量 API 的调用效率，在 M4 Pro 等旧款设备上仍能显著超越 llama.cpp 和 MLX 的推理速度，让用户无需升级硬件即可获得更快的本地 AI 推理体验。"}],"weekly":[{"rank":1,"name":"ClawTeams","zhName":"ClawTeams","url":"https://producthunt.com/products/clawteams","desc":"The first goal-driven, proactive AI team for e-commerce","zhDesc":"The first goal-driven, proactive AI team for e-commerce","tags":[],"upvotes":91,"icon":"https://ph-files.imgix.net/8cf8434d-e4fd-48c3-8654-af7f9e5bc2d5.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","zhDetail":"ClawTeams 是首个面向电商的目标驱动型主动式AI团队，帮助电商卖家自动完成运营、营销和客服等任务。它通过理解业务目标并主动执行，减少人工干预，提升效率和销售额。"},{"rank":2,"name":"Paradigm","zhName":"Paradigm","url":"https://producthunt.com/products/paradigm-3","desc":"Turn any goal into a personalized, adaptive learning path.","zhDesc":"Turn any goal into a personalized, adaptive learning path.","tags":[],"upvotes":130,"icon":"https://ph-files.imgix.net/7c1bc3e9-098d-4b10-9e5b-704460691d83.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Every interaction is graded as it happens, so what you walk away with is **proof of skill, not a transcript.** Anyone can build a course here; ours currently run from let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
</body>
