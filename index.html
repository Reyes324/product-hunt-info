<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月13日</span>
        <span class="updated">更新于 10:02</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-14","updatedAt":"10:02","yesterday":[{"rank":1,"name":"AgentKey","zhName":"AgentKey","url":"https://www.producthunt.com/products/agentkey","desc":"One-stop live data marketplace for your agent","zhDesc":"One-stop live data marketplace for your agent","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/32195c39-aa7c-4a77-ab44-99d4b66f866e.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"AgentKey is a plugin that connects your agent to live external data in one command. Install it into Claude Code, Codex, OpenClaw, or any MCP-based agent and instantly unlock access to search, web pages, social platforms, finance, e-commerce, business and crypto data. No integrations. No setup. Auto failover keeps workflows running.","zhDetail":"AgentKey 是一款插件，能让你的 AI 智能体通过一条命令直接接入实时外部数据。它适用于 Claude Code、Codex、OpenClaw 或任何基于 MCP 的智能体，无需集成和配置，即可快速获取搜索、网页、社交平台、金融、电商、商业和加密货币等数据。内置自动故障转移机制，确保工作流持续稳定运行。"},{"rank":2,"name":"Osaurus","zhName":"Osaurus","url":"https://www.producthunt.com/products/osaurus","desc":"Open source agents that run 100% locally on your Mac","zhDesc":"Open source agents that run 100% locally on your Mac","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/c784cd19-34af-4e58-bca7-584c59e1a47b.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"We started as [Dinoki](https://dinoki.ai/), a 5MB desktop dinosaur, and grew into a full agent platform through open source community feedback. Now at **7K+ GitHub stars and 175K+ downloads** — all by word of mouth.","zhDetail":"Osaurus 是一款面向开发者和技术团队的开源智能体平台，旨在解决传统 AI 工具功能单一、扩展性差的问题。它从轻量级桌面应用起步，通过社区反馈演化为支持多场景任务自动化的完整平台，用户可基于其开源架构灵活构建和部署自定义 AI 代理。"},{"rank":4,"name":"Loomal","zhName":"Loomal","url":"https://www.producthunt.com/products/loomal","desc":"Monetize any MCP server in 5 minutes with no % skim.","zhDesc":"Monetize any MCP server in 5 minutes with no % skim.","tags":[],"upvotes":null,"icon":null,"detail":"Loomal lets you charge for what you sell online — API calls, tools, digital products, or your whole store. One line of code (or a Shopify/WooCommerce plugin) adds an agent-ready paywall: AI agents pay you in USDC, settled in about 2 seconds, and you keep 100% of your revenue — no percentage cut, ever. Free to start, no card; flat monthly plans as you grow. Every paid listing appears on the Loomal Index, where agents discover and pay. Launch offer: first 500 sellers get 1,000 transactions free.","zhDetail":"Loomal 让您轻松为在线销售的内容收费——无论是 API 调用、工具、数字产品还是整个店铺。只需一行代码（或使用 Shopify/WooCommerce 插件）即可添加一个面向 AI 代理的支付墙：AI 代理以 USDC 支付，约 2 秒完成结算，且您保留 100% 的收入，平台从不抽成。免费启动，无需绑定银行卡；随着业务增长可选择固定月费套餐。每笔付费商品都会出现在 Loomal Index 上，供 AI 代理发现并购买。"},{"rank":5,"name":"Playground","zhName":"Playground","url":"https://www.producthunt.com/products/nyx-4","desc":"Earn $100K+ in weekly rewards for hacking AI agents.","zhDesc":"Earn $100K+ in weekly rewards for hacking AI agents.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/7db6ae83-50cf-4635-adee-236755a1014a.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Our first challenge, **The Gatekeeper**, is live now. Kai is an assistant guarding a classified access code. You can start playing without an account, but you’ll need to sign in for a successful break to count toward the weekly leaderboard. We review every submission ourselves. The player with the most approved breaks each week wins, and we publish a new challenge every Monday.","zhDetail":"Playground 是一款面向黑客与解谜爱好者的 AI 挑战平台。它通过每周更新的“守门人”谜题，让玩家在不注册账号即可试玩，但需登录才能将破解记录计入排行榜。团队会人工审核每次破解，每周一发布新挑战，并奖励破解数最多的玩家。"},{"rank":9,"name":"UnitPay","zhName":"UnitPay","url":"https://www.producthunt.com/products/unitpay","desc":"Price, bill, and prove value for your AI product","zhDesc":"Price, bill, and prove value for your AI product","tags":[],"upvotes":null,"icon":null,"detail":"UnitPay is the monetization OS for AI companies. Design pricing, run usage-based billing, track inference costs and margins in real time, and show every customer the value they're actually getting — all in one system. Built ground-up for AI-native products: credits, hybrid pricing, per-token metering, cost tracking. Free until you hit $500K ARR.","zhDetail":"UnitPay 是专为 AI 公司打造的商业化操作系统，帮助它们设计定价方案、运行基于用量的计费系统，并实时追踪推理成本与利润率。通过统一平台支持积分、混合定价、按 token 计量和成本追踪，让每个客户都能清晰看到自己获得的价值。在年经常性收入达到 50 万美元前可免费使用。"},{"rank":10,"name":"Fudge MCP","zhName":"Fudge MCP","url":"https://www.producthunt.com/products/fudge-mcp","desc":"Give your AI agents design taste from existing websites","zhDesc":"Give your AI agents design taste from existing websites","tags":[],"upvotes":null,"icon":null,"detail":"the part I'd want to be careful with is how close \"measured design evidence\" gets to a specific real company's actual brand identity versus generic patterns. pulling fonts/colors/layout from a category of sites as inspiration is fine, but if the agent leans hard on one particular close visual match, the output could end up looking like a clone of that specific brand rather than \"good taste\" in general. is there anything nudging toward blending multiple references instead of over-indexing on the single best match","zhDetail":"Fudge MCP 是一款面向产品设计师和开发者的 AI 设计灵感工具，帮助用户从同类网站中提取字体、颜色和布局等设计模式，避免直接复制单一品牌。它通过融合多个参考来源，生成具有“好品味”的通用设计建议，而非克隆某个特定品牌的视觉风格。"},{"rank":11,"name":"NoMac.app","zhName":"NoMac.app","url":"https://www.producthunt.com/products/nomac","desc":"The headless iOS app publishing pipeline for AI agents.","zhDesc":"The headless iOS app publishing pipeline for AI agents.","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/980bf961-166a-4d55-b832-f19c6f740421.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Me and my friends moved our whole AI agent setup from my Mac to Hetzner. But we still kept getting stuck on the MacBook whenever working on native iOS apps. We didn’t want to pay $100+/month for a cloud Mac, and Mac Minis were out of stock. So we built this: NoMac.app - let your AI agents build and publish native iOS apps without a Mac.","zhDetail":"NoMac.app 专为需要在无 Mac 环境下构建和发布原生 iOS 应用的 AI 代理团队设计。它解决了开发者因无法使用实体 Mac 或负担高昂云 Mac 费用而卡在 iOS 应用开发流程中的痛点。通过云端模拟 Mac 环境，NoMac.app 让 AI 代理直接完成 iOS 应用的构建与发布，无需依赖本地 Mac 设备。"},{"rank":12,"name":"TailMux","zhName":"TailMux","url":"https://www.producthunt.com/products/tailmux","desc":"Multiple Tailscale tailnets at once, no switching + no VM","zhDesc":"Multiple Tailscale tailnets at once, no switching + no VM","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/724918fc-d508-43f9-91c5-5af9c55f124f.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"the fail-closed approach to ambiguous routes is the right instinct, most tools would guess and silently leak traffic down the wrong tunnel. one thing I'm curious about given it's running isolated embedded nodes per tailnet - what's the permission footprint on macOS, does it need a persistent background helper with elevated network privileges, and is it notarized/signed properly given how much trust you're asking for on the network stack","zhDetail":"TailMux 面向需要精确控制网络路由的技术团队，解决了传统工具在路由模糊时可能静默泄漏流量的问题。它采用“故障关闭”策略，在路由不明确时主动阻断而非猜测，并通过为每个 tailnet 运行隔离的嵌入式节点来确保安全。"}],"today":[{"rank":1,"name":"Branda","zhName":"Branda","url":"https://www.producthunt.com/products/branda-open-source-on-brand-ad-maker","desc":"Turn any domain into on-brand ads, MIT Open Source","zhDesc":"Turn any domain into on-brand ads, MIT Open Source","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/50a2d6b0-9eea-4d3e-8344-1a5f4984aa92.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Branda turns any website URL into scroll-stopping, on-brand ads in seconds. Paste a link and Branda pulls the brand's real logo, colors, and campaign imagery via Context.dev's Brand API, reads the homepage so the copy sounds like the brand, and generates ready-to-ship creatives for LinkedIn and X. No login, no design skills, no assets to upload. Open-source and self-hostable.","zhDetail":"Branda 是一款面向营销人员和小企业主的广告创意生成工具，只需粘贴一个网站链接，就能在几秒钟内自动提取品牌真实 Logo、配色和宣传图片，并基于首页内容生成符合品牌语气的文案，最终输出可直接用于 LinkedIn 和 X 平台的广告素材。无需登录、无需设计技能、也无需上传任何素材，开源且可自托管。"},{"rank":2,"name":"Mojave Paint","zhName":"Mojave Paint","url":"https://www.producthunt.com/products/mojave-paint","desc":"Direct manipulation of static images on the Mac platform","zhDesc":"Direct manipulation of static images on the Mac platform","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/3b7a77f9-5d61-4f72-a986-77c487acadf8.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Bitmap images are still, even in 2026, a hugely important medium of communication. Which is why I made Mojave Paint – a Mac-based image editor that lets you really own the production of these bitmap images. They've been making image editors since the original Mac and the Amiga and I'm sure even long before that. But somehow the choices in the modern era fall short. So I have a new option, presented by an upstart software shop in Seattle. If you're looking for AI features, look elsewhere.","zhDetail":"Mojave Paint 是一款面向 Mac 用户的位图图像编辑器，专为那些希望完全掌控图像制作过程、拒绝过度依赖 AI 功能的创作者设计。它回归传统编辑方式，让用户像早期 Mac 和 Amiga 时代的工具一样，亲手精细处理每个像素，弥补了现代图像编辑器在纯粹编辑体验上的不足。"},{"rank":3,"name":"ClipFlow","zhName":"ClipFlow","url":"https://www.producthunt.com/products/clipflow-2","desc":"Small video jobs, without a timeline","zhDesc":"Small video jobs, without a timeline","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/587262e4-4916-4bc3-8cc7-ed3342bf9ce3.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"ClipFlow handles the small video jobs that do not need a timeline. Trim, join, compress, reverse, filter, caption, mute, blur, or convert a clip, then continue with the result. Version 1.9 adds partial reverse and 13 filter styles. Most processing runs on device.","zhDetail":"ClipFlow 是一款面向日常视频处理需求的轻量工具，专为那些不需要复杂时间线编辑的用户设计。它能快速完成视频的裁剪、拼接、压缩、倒放、添加滤镜和字幕等操作，且大部分处理在设备本地运行，保护隐私的同时提升效率。最新版本还新增了局部倒放和13种滤镜风格，让简单剪辑更灵活。"},{"rank":4,"name":"Portero","zhName":"Portero","url":"https://www.producthunt.com/products/portero","desc":"Know exactly what's running on every port of your Mac","zhDesc":"Know exactly what's running on every port of your Mac","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/eb60ce1d-1492-40b4-ae7d-8bbc4dab8209.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Hey congrats on the launch! Q - Does it keep a log of what was running on a port historically, or is it strictly a live snapshot? Thinking about those annoying edge cases where a background task grabs a port and crashes before you can even catch what it was","zhDetail":"Portero 是一款面向开发者的端口管理工具，帮助解决端口被占用时难以快速定位占用进程的痛点。它不仅能实时显示当前端口的使用状态，还能记录端口的历史运行日志，让你在后台任务抢占端口后崩溃时也能追溯问题源头。"},{"rank":5,"name":"Altersend","zhName":"Altersend","url":"https://www.producthunt.com/products/altersend","desc":"File transfer with no cloud storage, no account, no limits","zhDesc":"File transfer with no cloud storage, no account, no limits","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ab0a1d67-1601-4026-995e-9187737a2c0c.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"I'm Denis. I built AlterSend because sending a big file to someone is still way harder than it should be. You upload it to WeTransfer or Google Drive, wait, hit a size limit, send a link, and your file ends up on a server that isn't yours. It's slow, it's capped, and it's not private.","zhDetail":"Altersend 面向需要快速、私密地发送大文件的用户，解决了传统云盘上传慢、有大小限制且文件存储在他人服务器上的隐私问题。它通过直接点对点传输技术，让用户无需上传即可安全发送任意大小的文件。"},{"rank":6,"name":"PgDog","zhName":"PgDog","url":"https://www.producthunt.com/products/pgdog","desc":"Scale PostgreSQL without changing your app","zhDesc":"Scale PostgreSQL without changing your app","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/33f477e1-56ee-407b-940a-9b60d71a816e.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"We've been working on PgDog for over a year. It's running in production, serving over 2M queries per second across dozens of deployments. Sharding is working, too! Building PgDog in the open has been really great: our users and customers contribute features and bug fixes, every day. Give it a try and let us know what you think!","zhDetail":"PgDog 是一款面向高并发数据库场景的 PostgreSQL 连接池与分片代理工具，专为需要处理每秒数百万查询的开发者与运维团队设计。它通过智能连接复用和自动分片能力，解决了传统数据库在高负载下的性能瓶颈与扩展难题，已在生产环境中稳定运行并支持超200万 QPS 的流量。"},{"rank":7,"name":"VocalVia","zhName":"VocalVia","url":"https://www.producthunt.com/products/vocalvia","desc":"Turn documents and articles into editable multi-voice audio","zhDesc":"Turn documents and articles into editable multi-voice audio","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/a24fc092-7a1b-40de-8d1d-869541285ef3.svg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Hi Product Hunt! I built VocalVia after noticing how many useful PDFs and articles I saved but never finished. The goal is to make document-to-audio practical rather than opaque: you can inspect the outline, edit the script, assign voices, and adjust segments before generating the final audio. I’m opening unlimited credits through July 31 while collecting honest feedback. I’d especially love to hear where the upload → script → voice → audio workflow feels confusing, and how well it handles your messiest real-world documents.","zhDetail":"VocalVia 是一款面向知识工作者和阅读爱好者的文档转音频工具，解决“收藏了却读不完”的困扰。它让你在生成最终音频前，可以查看文档大纲、编辑脚本、分配不同声音并调整段落顺序，从而将枯燥的 PDF 和文章转化为清晰、可控的语音内容。"},{"rank":8,"name":"Tines","zhName":"Tines","url":"https://www.producthunt.com/products/tines","desc":"Build agents & automations integrated across your workspace","zhDesc":"Build agents & automations integrated across your workspace","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/83d98ed3-818f-4754-9ab5-e5fa51961593.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Tines offers a secure, trusted, vendor-agnostic platform to build, run, and monitor intelligent workflows.","zhDetail":"Tines 是一款安全、可信且与供应商无关的智能工作流平台，面向安全运维和IT团队。它帮助用户快速构建、运行和监控自动化流程，无需编写代码，从而高效应对重复性任务和复杂事件响应。"},{"rank":9,"name":"Sourclip","zhName":"Sourclip","url":"https://www.producthunt.com/products/sourclip","desc":"Turn NotebookLM into a complete research workflow","zhDesc":"Turn NotebookLM into a complete research workflow","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/ded276d0-4a56-49fb-8616-54690abc67bc.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Sourclip is the research workflow for NotebookLM. It helps you discover high-quality research sources, capture webpages, PDFs, YouTube videos, Reddit posts, and AI chats into NotebookLM with one click. Organize everything with folders, reuse prompts across projects, sync your workspace across devices, and export your research as Markdown, HTML, or PDF. You can also turn NotebookLM Audio Overviews into a private podcast feed for Spotify, Apple Podcasts, Pocket Casts, and other podcast apps.","zhDetail":"Sourclip 是专为 NotebookLM 打造的研究工作流工具，帮助研究人员、学生和知识工作者一键抓取网页、PDF、YouTube 视频、Reddit 帖子及 AI 对话等高质量研究资料，并直接存入 NotebookLM。它支持文件夹整理、跨项目复用提示词、多设备同步，还能将 NotebookLM 的音频概览转为私有播客，在 Spotify、Apple Podcasts 等应用中收听，从而大幅提升信息收集与整理效率。"},{"rank":10,"name":"Flyout","zhName":"Flyout","url":"https://www.producthunt.com/products/flyout","desc":"Rich-text notes that fly out from your Mac's screen edge","zhDesc":"Rich-text notes that fly out from your Mac's screen edge","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/3a9c5c7c-d076-4223-9c1c-cb1f61b28d71.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Nudge your screen edge — or press ⌥⌘N — and a full rich-text editor flies out over whatever you're doing. Checklists, let activeTab = 'yesterday';
let activeUrl = null;

const TAB_IDS = ['yesterday', 'today', 'weekly', 'monthly'];

function switchTab(tab) {
  activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
