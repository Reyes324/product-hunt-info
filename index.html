<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH 热门</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF6154'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='19' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface-2:#FAF9F7;
  --border:#E8E4DC;
  --accent:#FF6154;
  --accent-soft:rgba(255,97,84,0.08);
  --text:#1C1917;
  --text-2:#6B6560;
  --text-3:#B5AFA8;
  --tag-bg:#EDE9E3;
  --tag-text:#57534E;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.06);
  --sidebar-w:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}
a{color:inherit;text-decoration:none}

.app{display:flex;min-height:100vh;transition:padding-right .35s cubic-bezier(.4,0,.2,1)}
.app.panel-open{padding-right:var(--sidebar-w)}
.main{flex:1;max-width:740px;margin:0 auto;padding:0 28px 80px}

header{padding:36px 0 20px}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:11px}
.ph-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,97,84,.35)}
h1{font-size:21px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.header-sub{display:flex;align-items:center;gap:10px;margin-top:8px}
.badge{font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:3px 10px;border-radius:20px;box-shadow:var(--shadow-sm)}
.updated{font-size:12px;color:var(--text-3)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm)}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Segmented tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-align:center;color:var(--text-3);cursor:pointer;transition:all .2s;user-select:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(255,97,84,.4)}
.tab:hover:not(.active){color:var(--text-2);background:var(--surface-2)}

/* Cards */
.list{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rank{width:20px;font-size:12px;font-weight:800;color:var(--text-3);text-align:center;padding-top:3px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rank.gold{color:#D97706}.rank.silver{color:#9CA3AF}.rank.bronze{color:#B45309}
.icon{width:46px;height:46px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.icon img{width:100%;height:100%;object-fit:cover;display:block}
.body{flex:1;min-width:0}
.name-zh{font-size:15px;font-weight:650;letter-spacing:-.15px;margin-bottom:1px;color:var(--text)}
.name-en{font-size:11px;color:var(--text-3);margin-bottom:6px}
.desc{font-size:13px;color:var(--text-2);margin-bottom:9px;line-height:1.6}
.meta{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.1px}
.right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
.votes{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px}
.vote-box{width:28px;height:28px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.card:hover .vote-box{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.vote-count{font-size:11px;font-weight:700;color:var(--text-2)}
.ext-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:.15s}
.ext-btn:hover{background:var(--surface-2);color:var(--accent)}

/* Sidebar */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.sb-head-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.icon-btn{width:30px;height:30px;background:none;border:none;color:var(--text-3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface-2);color:var(--text-2)}
.sb-body{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:65vh}
.sb-product-row{display:flex;gap:14px;margin-bottom:14px}
.sb-icon{width:56px;height:56px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.sb-icon img{width:100%;height:100%;object-fit:cover;display:block}
.sb-name-zh{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3;margin-bottom:3px;color:var(--text)}
.sb-name-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sb-desc{font-size:13px;color:var(--text-2);line-height:1.65}
.sb-stats{display:flex;gap:14px;margin:12px 0}
.sb-stat{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px}
.sb-stat strong{color:var(--accent)}
.sb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sb-btn{display:block;padding:11px 18px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,97,84,.3)}
.sb-btn:hover{opacity:.9}
.sb-btn-sec{display:block;padding:10px 18px;border:1.5px solid var(--border);color:var(--text-2);border-radius:10px;font-size:13px;font-weight:500;text-align:center;margin-top:8px;cursor:pointer;background:none;width:100%;transition:.15s}
.sb-btn-sec:hover{border-color:var(--text-3);color:var(--text)}
.sb-iframe-wrap{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--surface-2)}
.sb-iframe{width:100%;height:100%;border:none;flex:1;display:none;background:#fff}
.sb-no-preview{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3);font-size:13px;text-align:center;padding:32px}

.regen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.regen-overlay.open{display:flex}
.regen-modal{background:var(--surface);border-radius:14px;padding:20px;width:400px;max-width:100%;box-shadow:var(--shadow-lg)}
.regen-head{display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:10px}
.regen-hint{font-size:12px;color:var(--text-3);line-height:1.5;margin-bottom:12px}
.regen-hint code{background:var(--tag-bg);padding:1px 5px;border-radius:4px}
.regen-modal input[type=password]{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.regen-log{background:#111;color:#0f0;font-family:ui-monospace,monospace;font-size:11px;padding:10px;border-radius:8px;white-space:pre-wrap;min-height:20px;max-height:260px;overflow-y:auto;margin-top:12px}
.regen-log:empty{padding:0;margin-top:0}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

@media(max-width:640px){
  :root{--sidebar-w:100vw}
  .main{padding:0 16px 60px}
  .app.panel-open{padding-right:0}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="main">
    <header>
      <div class="header-row">
        <div class="brand">
          <div class="ph-mark">P</div>
          <h1>Product Hunt 热门</h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="refresh-btn" onclick="openRegenModal()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            重新生成
          </button>
          <button class="refresh-btn" onclick="window.location.reload()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            刷新
          </button>
        </div>
      </div>
      <div class="header-sub">
        <span class="badge" id="period-badge">📅 2026年7月15日</span>
        <span class="updated">更新于 10:13</span>
      </div>
    </header>

    <div class="tab-bar">
      <div class="tab active" id="tab-yesterday" onclick="switchTab('yesterday')">昨日榜单</div>
      <div class="tab" id="tab-today" onclick="switchTab('today')">今日上线</div>
      <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">周榜单</div>
      <div class="tab" id="tab-monthly" onclick="switchTab('monthly')">月度榜单</div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-head-title" id="sb-title">产品详情</span>
    <button class="icon-btn" onclick="openNewTab()" title="新标签页打开">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" onclick="closeSidebar()" title="关闭">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-iframe-wrap">
    <iframe class="sb-iframe" id="sb-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div class="sb-no-preview" id="sb-no-preview">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>该页面不支持内嵌预览</span>
    </div>
  </div>
</div>

<div class="regen-overlay" id="regenOverlay">
  <div class="regen-modal">
    <div class="regen-head">
      <span>重新生成榜单</span>
      <button class="icon-btn" onclick="closeRegenModal()" title="关闭">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="regen-hint" id="regenHint">Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。</p>
    <input type="password" id="regenKey" placeholder="DEEPSEEK_API_KEY（可留空）" autocomplete="off">
    <button class="sb-btn" id="regenStart" onclick="runRegen()" style="width:100%;border:none;cursor:pointer">开始生成</button>
    <pre class="regen-log" id="regenLog"></pre>
  </div>
</div>

<script>
const DATA = {"date":"2026-07-16","updatedAt":"10:13","yesterday":[{"rank":1,"name":"V2Fun","zhName":"V2Fun","url":"https://producthunt.com/products/v2fun","desc":"Generate 3D character with 8K textures and AI motion capture","zhDesc":"Generate 3D character with 8K textures and AI motion capture","tags":[],"upvotes":174,"icon":"https://ph-files.imgix.net/1ae953dd-1691-4d3d-8eed-f970b24c8131.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"V2Fun is an AI 3D creation platform built with self-developed 3D modeling and AI motion capture models. It helps creators turn images, prompts, and videos into high-quality 3D models, enhance assets with advanced 8K texture generation, and create motion-ready characters without switching between separate modeling, texturing, and mocap tools. V2Fun also supports image generation through models including Nano Banana and others, so creators can explore visual concepts and bring them into 3D faster.","zhDetail":"V2Fun 是一款基于自研3D建模与AI动作捕捉模型的AI 3D创作平台，帮助创作者将图片、文字提示和视频快速转化为高质量3D模型，并支持8K纹理生成与角色动作绑定。它整合了建模、贴图和动捕功能，无需在多个工具间切换，同时内置Nano Banana等图像生成模型，让创作者能更快地探索视觉概念并转化为3D作品。"},{"rank":2,"name":"Velo 3.0","zhName":"Velo 3.0","url":"https://producthunt.com/products/velo-4","desc":"AI video infrastructure to explain, train, and sell faster.","zhDesc":"AI video infrastructure to explain, train, and sell faster.","tags":[],"upvotes":149,"icon":"https://ph-files.imgix.net/5a395b78-27ac-4662-9eac-cb5ce89d165c.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Velo 3.0 is here, our third and biggest launch yet. Start with a screen recording or a prompt. Describe the video you need, and Velo writes the script, narrates it in your own voice, and builds the finished cut. It stays grounded in your company knowledge, from your docs and tools you connect through connectors and MCP. Edit by typing changes. Localize the finished video into 25+ languages in one click. Recording or prompt, Velo turns either into a polished video you can ship anywhere.","zhDetail":"Velo 3.0 是一款面向企业和内容创作者的 AI 视频制作工具。你只需录制屏幕或输入一段文字描述，它就能自动撰写脚本、用你的声音进行配音并完成剪辑，同时基于你连接的文档和工具确保内容贴合公司知识。你还可以通过打字修改视频，并一键将成品本地化为 25 种以上语言，快速输出可用于任何渠道的精良视频。"},{"rank":3,"name":"Campus","zhName":"Campus","url":"https://producthunt.com/products/flutterflow","desc":"One project space for humans and AI agents","zhDesc":"One project space for humans and AI agents","tags":[],"upvotes":108,"icon":"https://ph-files.imgix.net/f00d0948-3886-474b-870c-48e89e8b2fb3.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Campus gives builders a shared space to build with teammates and AI agents. Keep your repo, terminal, project knowledge, conversations, and agent work together in one persistent workspace, instead of scattering context across Slack threads, docs, tickets, canvases, and one-off AI chats. Campus is organized around the thing you are building, so humans and agents can pick up where the work left off.","zhDetail":"Campus 为开发者和团队提供了一个与队友及 AI 智能体共同构建的共享空间。它将代码仓库、终端、项目知识、对话和智能体工作整合到一个持久的工作区中，避免上下文散落在 Slack 讨论、文档、工单、画布和零散的 AI 对话里。围绕你正在构建的项目组织内容，让人和智能体都能无缝接续工作。"},{"rank":4,"name":"Agently","zhName":"Agently","url":"https://producthunt.com/products/agently","desc":"Your whole stack, running itself!","zhDesc":"Your whole stack, running itself!","tags":[],"upvotes":107,"icon":"https://ph-files.imgix.net/2c44dbb7-be3c-432f-9138-d2931d70132d.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Every other tool answers, retrieves, or runs brittle rules. Agently holds your whole company in context and does the work. 100+ connectors flow into one brain that never forgets. It links a Stripe event to a Slack thread to a Linear ticket on its own. When something needs doing, Jarvis routes it to an agent that runs it end to end: triggered, running, shipped. The work lands without you, nothing falls through the cracks. Connecting takes minutes. The layer between today's AI and tomorrow's AGI.","zhDetail":"Agently 是一款面向企业团队的工作流自动化工具，解决了跨平台任务分散、信息孤岛导致的工作遗漏问题。它通过连接 100 多个应用（如 Stripe、Slack、Linear），将整个公司的上下文整合到一个“永不遗忘”的智能大脑中，并自动将任务路由给对应代理完成从触发到交付的全流程，无需人工干预。"},{"rank":5,"name":"Crustdata Recruiter","zhName":"Crustdata Recruiter","url":"https://producthunt.com/products/crustdata-2","desc":"Claude Skills to turn Claude into a 100x Recruiter","zhDesc":"Claude Skills to turn Claude into a 100x Recruiter","tags":[],"upvotes":63,"icon":"https://ph-files.imgix.net/86c6a32c-14bc-454a-8d97-b04065d688c9.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"This looks like a great tool - congratulations on the launch. 1 billion profiles is pretty impressive! My question is primarily about the way the data is harnessed and the sustainability of that model. Put simply, if you are pulling candidate data from a job board then you are potentially skipping the need for a recruiter to have a licence for that job board? In which case, there is a future risk to the job board's sustainability commercially. And then, of course, you lose that data source. Is that something you've got covered? If so, how do you compensate your data sources?","zhDetail":"面向招聘人员和企业HR，通过整合超过10亿份候选人资料，帮助用户快速找到并筛选潜在人才。该工具直接从数据源抓取信息，无需招聘人员单独购买各招聘平台的许可证，从而简化招聘流程并降低数据获取成本。"},{"rank":6,"name":"Flodesk Studio","zhName":"Flodesk Studio","url":"https://producthunt.com/products/flodesk-studio","desc":"A place to make beautiful emails.","zhDesc":"A place to make beautiful emails.","tags":[],"upvotes":54,"icon":"https://ph-files.imgix.net/4a2a2457-62cc-4548-b68a-ea5e72716d64.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"We're thrilled to launch Flodesk Studio! Flodesk has always believed that great design should be accessible to anyone. That belief took us to build a brand that looks like nothing else in our space. Flodesk Studio is a place to make beautiful emails, built by the world's top designers, accelerated by AI, finished by you. Describe what you want and Studio brings it to life on-brand, ready to refine in chat or perfect by hand. Use it inside Flodesk, or export to any ESP and send from there. Flodesk studio is free to try while we are in beta. We hope you like it!","zhDetail":"Flodesk Studio 是一款面向邮件营销人员和小企业主的智能邮件设计工具，解决了非设计师用户难以快速制作专业美观邮件的问题。它由全球顶级设计师打造，借助 AI 加速生成，用户只需描述需求即可获得品牌风格一致的邮件设计，并可在聊天中微调或手动完善，支持在 Flodesk 内使用或导出至其他邮件发送平台。"},{"rank":7,"name":"YAGNI","zhName":"YAGNI","url":"https://producthunt.com/products/yagni","desc":"Proactive agent teams you manage like humans","zhDesc":"Proactive agent teams you manage like humans","tags":[],"upvotes":66,"icon":"https://ph-files.imgix.net/ccdfa665-0955-48a5-bf1b-16c5216ff894.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"AI changed my own output more than any tool ever has. But it brought the trust problem back in a new form. More output means a worse signal-to-noise ratio, and the moment you try to put agents to work _inside_ a business you hit a wall: where do you even start? Every tool assumes you'll be directive. Either you prompt each task (\"do this thing\"), or you wire up an if-this-then-that graph and hope you predicted the work correctly. That's not how anyone actually runs a team.","zhDetail":"YAGNI 是一款面向团队管理者的 AI 协作工具，解决当前 AI 工具在团队协作中信号噪声比低、无法像真实团队那样自主工作的问题。它摒弃了传统的“指令式”或“预设流程图”模式，让 AI 像团队成员一样主动理解任务边界、自主推进工作，从而真正融入业务流程。"},{"rank":8,"name":"Tiptap AI Toolkit","zhName":"Tiptap AI Toolkit","url":"https://producthunt.com/products/tiptap","desc":"Empower your AI to directly edit documents in real time.","zhDesc":"Empower your AI to directly edit documents in real time.","tags":[],"upvotes":27,"icon":"https://ph-files.imgix.net/7df30036-bdd9-4bf9-b060-c9f3452552f0.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"AI Toolkit is now in production-ready beta — and we’re giving 100 builders a free lifetime license. Chatbots are easy. Editing inside a rich-text doc in real time is deceptively hard. Skip months of engineering: Tiptap delivers a safe, reliable bridge between your AI and the documents where your team actually does its work. Sign up for a Tiptap account and join our giveaway: 100 users get a free, lifetime AI Toolkit license (100k tool calls/mo) in exchange for feedback.","zhDetail":"Tiptap AI Toolkit 专为需要在富文本文档中集成实时 AI 编辑功能的开发者团队打造。它解决了在文档内安全、可靠地调用 AI 进行内容编辑的工程难题，帮助团队跳过数月的开发周期，直接实现 AI 与工作文档的无缝协作。"},{"rank":9,"name":"RecordMeeting","zhName":"RecordMeeting","url":"https://producthunt.com/products/recordmeeting","desc":"Record and transcribe any calls without announcement","zhDesc":"Record and transcribe any calls without announcement","tags":[],"upvotes":26,"icon":"https://ph-files.imgix.net/43d81b34-2c68-4a0b-a736-17085b4ccdaf.jpeg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Hey Product Hunt! Nathan here, founder of Qualtir. We built Record Meeting because most AI notetakers still send a bot into your call. That awkward \"Notetaker has joined\" moment kills the vibe on sales calls, interviews, and internal meetings. Record Meeting works differently. One click inside Google Meet. No bot joins the room. Full video, transcript, and AI summary after the call. Free tier gives you 20 recordings to try on real meetings. I'd love your feedback. What meeting would you record first? Sales, hiring, or internal sync?","zhDetail":"RecordMeeting 是一款专为 Google Meet 用户设计的会议录制与 AI 笔记工具。它解决了传统 AI 笔记工具需要“机器人”加入会议带来的尴尬与干扰问题，只需一键即可在 Google Meet 内完成录制，无需任何机器人进入会议室。会议结束后，系统自动生成完整视频、文字记录和 AI 摘要，适合销售、面试、内部同步等场景，免费版支持录制 20 场真实会议。"},{"rank":10,"name":"CodeNearby 2.0","zhName":"CodeNearby 2.0","url":"https://producthunt.com/products/codenearby","desc":"Tinder for developers! Find coding partners & build together","zhDesc":"Tinder for developers! Find coding partners & build together","tags":[],"upvotes":13,"icon":"https://ph-files.imgix.net/cd6ee0d5-a234-4ffa-a067-8d9dca4e6ac5.jpeg?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"CodeNearby is open-source social network built for developers. Find coding partners by skill, interest, or location, chat real-time, share updates, host virtual meetups, and use AI-Connect to discover collaborators through natural conversation. GitHub-powered profiles, global reach, local focus.","zhDetail":"CodeNearby 是一款面向开发者的开源社交网络，帮助程序员根据技能、兴趣或地理位置找到编程伙伴。它支持实时聊天、动态分享、线上聚会，并通过 AI-Connect 功能以自然对话方式发现合作者，同时集成 GitHub 资料，兼顾全球连接与本地化社交。"},{"rank":11,"name":"Review by Eddie AI","zhName":"Review by Eddie AI","url":"https://producthunt.com/products/eddie-your-ai-video-editor","desc":"Time-stamped feedback on your video frm your team & AI. Free","zhDesc":"Time-stamped feedback on your video frm your team & AI. Free","tags":[],"upvotes":40,"icon":"https://ph-files.imgix.net/bfaf9941-ca6f-4c9e-9865-f5f7fa64bf01.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Eddie Review is the fastest way to get feedback on your cut, in minutes. No login, no re-upload, free. Collect frame-accurate comments from your team, get an AI review of your edit, and turn every note into a to-do list you can act on.","zhDetail":"Review by Eddie AI 是一款面向视频剪辑师和创意团队的快速反馈工具，无需登录或重新上传即可在几分钟内收集剪辑意见。它支持团队成员对视频逐帧标注评论，同时提供 AI 对剪辑内容的自动审阅，并将每条反馈自动转化为可执行的任务清单，帮助用户高效完成修改。"},{"rank":12,"name":"nudge2.0","zhName":"nudge2.0","url":"https://producthunt.com/products/nudge-26","desc":"AI schedules your whole week to take action","zhDesc":"AI schedules your whole week to take action","tags":[],"upvotes":26,"icon":"https://ph-files.imgix.net/01198a53-19e9-494e-a5e9-c0fe0f0e2ec3.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Don't manage. Just do. nudge plans your week so you don't have to - Don't create. Type plain text — AI turns it into real tasks with deadlines. - Don't plan your day. One click, AI schedules around sleep, meals, and fixed events. - Don't let yourself off. Lock $5 on a deadline. Finish and prove it — you pay nothing. - Don't switch apps. Capture and reschedule from Slack & Discord. - Don't get lost. One workspace. $5 first month, then $20/mo. Solo-built by a 20yo engineering student in Tokyo.","zhDetail":"nudge2.0 是一款面向忙碌职场人士和学生的智能日程规划工具。它解决了手动管理任务和日程的繁琐问题——你只需输入自然语言，AI 会自动将其转化为带截止日期的任务，并一键围绕睡眠、用餐和固定事件安排日程。此外，它还支持通过 Slack 和 Discord 捕捉任务、设置 5 美元押金督促自己完成，帮助用户真正“只管执行，无需管理”。"},{"rank":13,"name":"Copresent","zhName":"Copresent","url":"https://producthunt.com/products/co-present","desc":"Turn your phone into a Google Slides remote","zhDesc":"Turn your phone into a Google Slides remote","tags":[],"upvotes":32,"icon":"https://ph-files.imgix.net/e38bd414-6a21-4f15-823f-5c2ab82d95c4.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"this is one of those tools that solves a problem so small everyone just lives with it instead of fixing it, fumbling for the trackpad or asking someone to advance slides for you. the co-present with a shared link and no account for guests is the actually useful part for panel talks or interviews where two people are driving the same deck. does the notes view stay in sync if the presenter jumps around out of order, or does it assume a linear walkthrough?","zhDetail":"Copresent 是一款专为多人协作演示场景设计的工具，主要面向需要共同控制同一份演示文稿的演讲者、访谈嘉宾或小组讨论成员。它解决了传统演示中两人轮流翻页时手忙脚乱、需要借用他人触控板或请求协助的尴尬问题。通过生成共享链接，无需观众注册账号即可让多位演示者同步操控幻灯片，并支持笔记视图随翻页顺序实时同步，确保非线性的演示流程也能顺畅衔接。"},{"rank":14,"name":"Keepresso","zhName":"Keepresso","url":"https://producthunt.com/products/keepresso","desc":"Keep your Mac awake, on your terms. Free and open source","zhDesc":"Keep your Mac awake, on your terms. Free and open source","tags":[],"upvotes":29,"icon":"https://ph-files.imgix.net/d87bdd69-203b-466c-bc2d-7d0d9d5ef2ed.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"What I really wanted was simple to say and surprisingly hard to find. I wanted to close my laptop in the middle of any work, keep it running even on battery with no cable attached, and have the screen stay off inside the closed lid so nothing sat there lit in my bag. And I wanted it to be smart about the other direction too, so that once the job actually finished, the Mac was allowed to sleep instead of burning power all night.","zhDetail":"Keepresso 是一款专为 Mac 用户设计的工具，解决合盖后电脑无法持续运行或屏幕仍亮着的问题。它能让你的 Mac 在合盖且不接电源的情况下继续工作，同时自动关闭屏幕，并在任务完成后智能进入休眠，避免整夜耗电。"},{"rank":15,"name":"Clerk | AI Assistant for Cap Tables","zhName":"Clerk | 股权结构表AI助手","url":"https://producthunt.com/products/withmantle","desc":"Issue grants, model funding rounds, ask it anything equity","zhDesc":"Issue grants, model funding rounds, ask it anything equity","tags":[],"upvotes":13,"icon":"https://ph-files.imgix.net/c18428eb-44c4-4c4b-b68b-580253795fcc.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Everything you need to know about your cap table lives somewhere: in your lawyer's head, in a paralegal's inbox, in a VC's mental model built over decades. Mantle Clerk puts that knowledge in your corner. Ask a question, drop in a document, describe what just closed, and Mantle Clerk answers, records, and drafts what comes next.","zhDetail":"Clerk 专为初创公司创始人、法务及投资人设计，解决股权结构表信息分散在律师、法务助理或投资人脑中难以快速获取的问题。用户只需提问、上传文件或描述最新交易，Clerk 即可自动回答、记录并起草下一步所需文件，将分散的知识集中到你的掌控之中。"},{"rank":16,"name":"Jam-Pod","zhName":"Jam-Pod","url":"https://producthunt.com/products/jam-pod","desc":"A player for people who keep their own music collection","zhDesc":"A player for people who keep their own music collection","tags":[],"upvotes":31,"icon":"https://ph-files.imgix.net/d6903552-4883-41d4-889e-c5a2d1d79206.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"Hey everyone! Maker here. I built Jam-Pod because I missed the feeling of actually scrolling through my own music, instead of getting fed something an algorithm picked for me. I still have a soft spot for the old click-wheel days, so I rebuilt that feeling with a joystick-driven interface and a monochrome screen — no ads, no recommendations, just your library. It plays your local Apple Music library, hi-res/lossless files (FLAC, WAV, ALAC), the Apple Music catalog, and your podcasts, all in one place. It's still early and in TestFlight, so please be gentle — and even more, please tell me what breaks or what feels off. I read every comment. Thanks for checking it out!","zhDetail":"Jam-Pod 是一款专为怀念纯粹音乐浏览体验的用户打造的播放器。它通过摇杆操控界面和单色屏幕，让你像使用经典 iPod 一样自由翻阅本地音乐库，彻底告别算法推荐和广告干扰。目前支持 Apple Music 本地库、高解析无损音频（FLAC、WAV、ALAC）、Apple Music 曲库及播客，所有内容集中一处播放。"},{"rank":17,"name":"ccshare","zhName":"ccshare","url":"https://producthunt.com/products/ccshare","desc":"multiplayer claude code","zhDesc":"multiplayer claude code","tags":[],"upvotes":28,"icon":"https://ph-files.imgix.net/4d65feb0-e24a-4dca-8e96-275218c878d8.png?auto=compress,format&codec=mozjpeg&cs=strip&fit=crop&frame=1&h=48&w=48","detail":"the pairing UX is the fun part but the thing I'd actually want answered before using this on a real project: if someone joins mid-session, do they just see the full scrollback, including anything that got printed or typed before they connected? things like env vars getting echoed, an api key pasted into a prompt earlier, secrets in a stack trace. screen sharing at least you can mute your screen for a second, a shared terminal session feels harder to un-leak once someone's in","zhDetail":"ccshare 是一款面向开发者的终端共享工具，解决远程协作时新加入者无法看到会话历史、以及敏感信息（如环境变量、API 密钥、堆栈中的秘密）可能意外泄露的问题。它通过让新加入者自动获取完整的滚动回放内容，同时保留终端会话的实时同步，从而在协作安全性与信息完整性之间取得平衡。"}],"today":[{"rank":1,"name":"Tines","zhName":"Tines","url":"https://www.producthunt.com/products/tines","desc":"Build agents & automations integrated across your workspace","zhDesc":"Build agents & automations integrated across your workspace","tags":[],"upvotes":null,"icon":"https://ph-files.imgix.net/83d98ed3-818f-4754-9ab5-e5fa51961593.png?auto=compress,format&codec=mozjpeg&cs=st   activeTab = tab;
  TAB_IDS.forEach(id => document.getElementById('tab-' + id).classList.toggle('active', id === tab));
  document.getElementById('period-badge').textContent = '📅 ' + DATA.periods[tab];
  closeSidebar();
  render();
}

function rankClass(i) {
  return ['gold','silver','bronze'][i] || '';
}

function render() {
  const products = DATA[activeTab] || [];
  const list = document.getElementById('list');
  if (!products?.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#444;font-size:13px">暂无数据，请运行脚本更新</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="card" onclick="openSidebar(${i})">
      <div class="rank ${rankClass(i)}">${p.rank}</div>
      <div class="icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div class="body">
        <div class="name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="name-en">${p.name}</div>` : ''}
        <div class="desc">${p.zhDetail || p.desc}</div>
        <div class="meta">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="right">
        <div class="votes">
          <div class="vote-box">
            <svg width="9" height="8" viewBox="0 0 10 8" fill="currentColor"><path d="M5 0L10 8H0z"/></svg>
          </div>
          <span class="vote-count">${p.upvotes ?? '—'}</span>
        </div>
        <a class="ext-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()" title="在 PH 查看">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  `).join('');
}

function openSidebar(i) {
  const p = (DATA[activeTab] || [])[i];
  activeUrl = p.url;
  document.getElementById('sb-title').textContent = p.zhName || p.name;
  document.getElementById('sb-body').innerHTML = `
    <div class="sb-product-row">
      <div class="sb-icon">${p.icon ? `<img src="${p.icon}" alt="" onerror="this.parentElement.innerHTML='🚀'">` : '🚀'}</div>
      <div style="min-width:0">
        <div class="sb-name-zh">${p.zhName || p.name}</div>
        ${p.zhName && p.zhName !== p.name ? `<div class="sb-name-en">${p.name}</div>` : ''}
        <div class="sb-desc">${p.zhDetail || p.desc}</div>
      </div>
    </div>
    ${p.upvotes ? `<div class="sb-stats"><div class="sb-stat">▲ <strong>${p.upvotes}</strong> 票</div></div>` : ''}
    <div class="sb-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <a class="sb-btn" href="${p.url}" target="_blank">在 Product Hunt 查看 →</a>
    <button class="sb-btn-sec" onclick="loadFrame()">尝试内嵌预览</button>
  `;
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-iframe').src = '';
  document.getElementById('sb-no-preview').style.display = 'none';
  document.getElementById('app').classList.add('panel-open');
  document.getElementById('sidebar').classList.add('open');
}

function loadFrame() {
  const frame = document.getElementById('sb-iframe');
  frame.style.display = 'block';
  frame.src = activeUrl;
  const t = setTimeout(showNoPreview, 5000);
  frame.onload = () => {
    clearTimeout(t);
    try { if (!frame.contentDocument?.body) showNoPreview(); } catch { showNoPreview(); }
  };
}

function showNoPreview() {
  document.getElementById('sb-iframe').style.display = 'none';
  document.getElementById('sb-no-preview').style.display = 'flex';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
  document.getElementById('sb-iframe').src = '';
  activeUrl = null;
}

function openNewTab() { if (activeUrl) window.open(activeUrl, '_blank'); }

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function openRegenModal() {
  const hint = document.getElementById('regenHint');
  const keyInput = document.getElementById('regenKey');
  const startBtn = document.getElementById('regenStart');
  if (IS_LOCAL) {
    hint.innerHTML = 'Key 只在浏览器和本地服务之间传递，不会被记录。留空则生成英文原文版本。需通过 <code>node server.mjs</code> 启动的本地服务访问此页面才能使用。';
    keyInput.style.display = 'block';
    startBtn.textContent = '开始生成';
  } else {
    hint.textContent = '将触发云端自动抓取最新榜单并翻译，无需输入任何内容，完成后（约 1-2 分钟）本页会自动刷新。';
    keyInput.style.display = 'none';
    startBtn.textContent = '触发更新';
  }
  document.getElementById('regenLog').textContent = '';
  document.getElementById('regenOverlay').classList.add('open');
}
function closeRegenModal() { document.getElementById('regenOverlay').classList.remove('open'); }

async function runRegen() {
  if (IS_LOCAL) return runRegenLocal();
  return runRegenRemote();
}

async function runRegenLocal() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '';
  const key = document.getElementById('regenKey').value;
  try {
    const res = await fetch('/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      log.textContent += decoder.decode(value);
      log.scrollTop = log.scrollHeight;
    }
    if (log.textContent.includes('✅ 已生成')) {
      log.textContent += '\n即将刷新页面…';
      setTimeout(() => window.location.reload(), 1200);
    }
  } catch (e) {
    log.textContent += '\n请求失败：请确认是通过 node server.mjs 启动的本地服务打开此页面（而不是直接双击 index.html）。';
  }
  btn.disabled = false;
}

async function runRegenRemote() {
  const btn = document.getElementById('regenStart');
  const log = document.getElementById('regenLog');
  btn.disabled = true;
  log.textContent = '正在触发云端更新…';
  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    log.textContent = '✅ 已触发，GitHub Actions 正在云端抓取最新数据（约 1-2 分钟），完成后页面会自动刷新。\n你也可以稍后手动刷新查看。';
    setTimeout(() => window.location.reload(), 100000);
  } catch (e) {
    log.textContent = '❌ 触发失败：' + e.message;
  }
  btn.disabled = false;
}

render();
</script>
